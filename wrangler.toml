name = "agroai-api-edge"
main = "cloudflare/edge-gateway/src/index.ts"
compatibility_date = "2026-07-05"
workers_dev = false

# The browser only sees api.agroai-pilot.com. The edge gateway proxies to the
# controlled upstream API origin and rejects recursive/malformed configuration.
[vars]
EDGE_ENVIRONMENT = "production"
UPSTREAM_API_ORIGIN = "https://api-preview.agroai-pilot.com"
ALLOWED_ORIGINS = "https://app.agroai-pilot.com,https://agroai-pilot.com,https://www.agroai-pilot.com"

[[routes]]
pattern = "api.agroai-pilot.com/v1/*"
zone_name = "agroai-pilot.com"

[[queues.producers]]
binding = "CONNECTOR_TASKS"
queue = "agroai-connector-tasks"

[[queues.consumers]]
queue = "agroai-connector-tasks"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 5
retry_delay = 30
dead_letter_queue = "agroai-connector-tasks-dlq"

[triggers]
crons = ["*/5 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1.0

# Required Worker secrets are provisioned by the production release workflow:
#   QUEUE_PUBLISH_TOKEN
#   QUEUE_CONSUMER_TOKEN
