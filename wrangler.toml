name = "agroai-api-edge"
main = "cloudflare/edge-gateway/src/edge-main-v3.ts"
compatibility_date = "2026-07-05"
workers_dev = false

[vars]
EDGE_ENVIRONMENT = "production"
UPSTREAM_API_ORIGIN = "https://api-preview.agroai-pilot.com"
ALLOWED_ORIGINS = "https://app.agroai-pilot.com,https://platform.agroai-pilot.com,https://agroai-pilot.com,https://www.agroai-pilot.com"

[ai]
binding = "AI"

[secrets]
required = [ "QUEUE_PUBLISH_TOKEN", "QUEUE_CONSUMER_TOKEN" ]

[[routes]]
pattern = "app.agroai-pilot.com/v1/*"
zone_name = "agroai-pilot.com"

# The standalone developer product shares the same authenticated backend and
# production edge. This same-origin route also keeps a future relative /v1
# client configuration possible without creating a second API deployment.
[[routes]]
pattern = "platform.agroai-pilot.com/v1/*"
zone_name = "agroai-pilot.com"

# Preserve the established API hostname used by Stripe live webhooks and older
# API clients while routing it through the same validated production edge.
[[routes]]
pattern = "api.agroai-pilot.com/v1/*"
zone_name = "agroai-pilot.com"

[[queues.producers]]
binding = "CONNECTOR_TASKS"
queue = "agroai-connector-tasks"

[[queues.consumers]]
queue = "agroai-connector-tasks"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 5
retry_delay = 30
max_concurrency = 4
dead_letter_queue = "agroai-connector-tasks-dlq"

# Recovery polling must remain comfortably longer than Neon's five-minute
# scale-to-zero window. A one-minute database poll kept the production compute
# continuously awake and exhausted the Free-plan monthly compute allowance.
# Normal task delivery remains event-driven through Cloudflare Queues; this
# schedule is only the bounded recovery path for stranded outbox rows.
[triggers]
crons = ["*/15 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1.0
