name = "agroai-api-edge"
main = "cloudflare/edge-gateway/src/edge-main-v2.ts"
compatibility_date = "2026-07-05"
workers_dev = false

[vars]
EDGE_ENVIRONMENT = "production"
UPSTREAM_API_ORIGIN = "https://api-preview.agroai-pilot.com"
ALLOWED_ORIGINS = "https://app.agroai-pilot.com,https://agroai-pilot.com,https://www.agroai-pilot.com"

[ai]
binding = "AI"

[secrets]
required = [ "QUEUE_PUBLISH_TOKEN", "QUEUE_CONSUMER_TOKEN" ]

[[routes]]
pattern = "app.agroai-pilot.com/v1/*"
zone_name = "agroai-pilot.com"

# Preserve the established API hostname used by Stripe live webhooks and older
# API clients while routing it through the same validated production edge.
[[routes]]
pattern = "api.agroai-pilot.com/v1/*"
zone_name = "agroai-pilot.com"

[[queues.producers]]
binding = "CONNECTOR_TASKS"
queue = "agroai-connector-tasks"

[[queues.consumers]]
queue = "agroai-connector-tasks"
max_batch_size = 5
max_batch_timeout = 5
max_retries = 5
retry_delay = 30
max_concurrency = 4
dead_letter_queue = "agroai-connector-tasks-dlq"

[triggers]
crons = ["*/5 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1.0
