name = "agroai-platform-api-marketing"
main = "src/index.ts"
compatibility_date = "2026-07-23"
workers_dev = false

[vars]
MARKETING_ORIGIN = "https://agroai-343.pages.dev"
PLATFORM_API_MARKETING_ENABLED = "true"
PLATFORM_API_PUBLIC_DOCS_ENABLED = "true"
PLATFORM_API_INDEXING_ENABLED = "false"

[assets]
directory = "../../platform-api"
binding = "ASSETS"
run_worker_first = true

[[routes]]
pattern = "agroai-pilot.com/"
zone_name = "agroai-pilot.com"

[[routes]]
pattern = "agroai-pilot.com/platform-api"
zone_name = "agroai-pilot.com"

[[routes]]
pattern = "agroai-pilot.com/platform-api/*"
zone_name = "agroai-pilot.com"

[observability]
enabled = true
head_sampling_rate = 1.0
