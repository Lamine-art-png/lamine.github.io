version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://agroai:agroai@postgres:5432/agroai
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production-min-32-chars}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-dev-webhook-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENABLE_METRICS=true
      - ENABLE_WEBHOOKS=true
      - ENABLE_METERING=true
      - ENABLE_SCHEDULER=true
      - SYNC_INTERVAL_MINUTES=${SYNC_INTERVAL_MINUTES:-15}
      - WISECONN_API_KEY=${WISECONN_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    command: >
      sh -c "python scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=agroai
      - POSTGRES_PASSWORD=agroai
      - POSTGRES_DB=agroai
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agroai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
