name = "agroai-local-ai-origin"
main = "cloudflare/ollama-compat/src/index.js"
compatibility_date = "2026-07-07"
workers_dev = false

[ai]
binding = "AI"

[vars]
# Reliability-first edge lane. Hosted GLM 5.2 remains the primary reasoning brain;
# the edge origin must answer quickly when hosted inference is unavailable.
MODEL = "@cf/meta/llama-3.1-8b-instruct-fast"
# Independent Cloudflare-hosted Chinese-model fallback.
FALLBACK_MODEL = "@cf/qwen/qwen3-30b-a3b-fp8"
MODEL_TIMEOUT_MS = "12000"
FALLBACK_TIMEOUT_MS = "22000"

[[routes]]
pattern = "local-ai.agroai-pilot.com/*"
zone_name = "agroai-pilot.com"
