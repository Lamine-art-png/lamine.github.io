name = "agroai-api-native"
main = "src/index.ts"
compatibility_date = "2024-05-29"

# ── Staging ──────────────────────────────────────────────
[env.staging]
name = "agroai-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"
AGROAI_ENV = "staging"
AGROAI_API_VERSION = "v1"
DEMO_MODE = "true"
LIVE_EARTHDAILY_ENABLED = "false"
ALLOWED_ORIGINS = "https://app.agroai-pilot.com,https://agroai-portal.pages.dev,http://localhost:4173,http://127.0.0.1:4173"
AGROAI_LLM_MODEL = "claude-sonnet-4-6"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "agroai_staging2"
database_id = "b05f51b7-9aa3-4e9f-ac8c-505f1f6e4cdf"

[[env.staging.kv_namespaces]]
binding = "EDS_TOKEN_CACHE"
id = "<run: wrangler kv:namespace create EDS_TOKEN_CACHE --env staging>"

[env.staging.durable_objects]
bindings = [
  { name = "TALGIL_SYNC", class_name = "TalgilSyncDO" }
]

[[env.staging.migrations]]
tag = "v1"
new_classes = ["TalgilSyncDO"]

[[env.staging.migrations]]
tag = "v2"
new_sqlite_classes = []

# ── Production ───────────────────────────────────────────
# [env.production]
# Uncomment after 48-hour load test passes
