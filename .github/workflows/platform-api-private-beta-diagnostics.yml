name: Platform API Private Beta Diagnostics

on:
  push:
    branches: ["main"]
    paths:
      - "agroai_api/**"
      - "figma-enterprise-v4/**"
      - "cloudflare/edge-gateway/**"
      - "platform-api/**"
      - "developers/**"
      - "functions/platform-api/**"
      - "functions/developers/**"
      - "index.html"
      - ".github/workflows/platform-api-private-beta-diagnostics.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: platform-api-private-beta-diagnostics
  cancel-in-progress: true

env:
  OPS_ISSUE: "262"
  CUSTOM_UPSTREAM: "https://api-preview.agroai-pilot.com"
  DIRECT_RENDER_UPSTREAM: "https://agroai-api-preview.onrender.com"
  PUBLIC_API: "https://api.agroai-pilot.com"
  PORTAL_URL: "https://app.agroai-pilot.com"
  MARKETING_URL: "https://agroai-pilot.com/platform-api"
  DOCS_URL: "https://agroai-pilot.com/developers"

jobs:
  public-surfaces:
    runs-on: ubuntu-latest
    steps:
      - name: Probe redacted Platform API surfaces
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          probe() {
            local name="$1" url="$2"
            local body code result summary
            body="$(mktemp)"
            code="$(curl -L -sS -o "$body" -w '%{http_code}' --connect-timeout 10 --max-time 60 "$url" 2>/dev/null || printf '000')"
            result="closed"
            if [[ "$code" =~ ^2 ]]; then result="open"; fi
            summary="$(tr '\n' ' ' < "$body" | head -c 180 | sed 's/`/\\`/g')"
            rm -f "$body"
            printf '%s|%s|%s|%s\n' "$name" "$result" "$code" "$summary"
          }

          probe_page() {
            local name="$1" url="$2" marker="$3"
            local body code result summary
            body="$(mktemp)"
            code="$(curl -L -sS -o "$body" -w '%{http_code}' --connect-timeout 10 --max-time 60 "$url" 2>/dev/null || printf '000')"
            result="closed"
            if [[ "$code" =~ ^2 ]]; then
              result="fallback"
              if grep -Fq "$marker" "$body"; then result="open"; fi
            fi
            summary="$(tr '\n' ' ' < "$body" | head -c 180 | sed 's/`/\\`/g')"
            rm -f "$body"
            printf '%s|%s|%s|%s\n' "$name" "$result" "$code" "$summary"
          }

          {
            probe custom_upstream_health "${CUSTOM_UPSTREAM}/v1/health"
            probe direct_render_health "${DIRECT_RENDER_UPSTREAM}/v1/health"
            probe public_edge_health "${PUBLIC_API}/v1/edge-health"
            probe public_api_health "${PUBLIC_API}/v1/health"
            probe enterprise_portal "${PORTAL_URL}/"
            probe_page platform_api_marketing "${MARKETING_URL}" '<title>AGRO-AI Platform API</title>'
            probe_page developer_documentation "${DOCS_URL}" '<title>AGRO-AI Platform API Documentation</title>'
          } > probes.txt

          {
            echo "## Platform API private-beta public diagnostics"
            echo
            echo "- workflow SHA: \`${GITHUB_SHA}\`"
            echo "- run: \`${GITHUB_RUN_ID}\`"
            echo "- page state \`fallback\` means HTTP 2xx returned the homepage or another document instead of the required API page marker"
            echo
            echo '| Probe | State | HTTP | Redacted preview |'
            echo '|---|---:|---:|---|'
            while IFS='|' read -r name result code summary; do
              echo "| ${name} | ${result} | ${code} | \`${summary}\` |"
            done < probes.txt
          } > comment.md

          gh issue comment "${OPS_ISSUE}" --repo "${GITHUB_REPOSITORY}" --body-file comment.md

  authenticated-readiness:
    runs-on: ubuntu-latest
    environment: production
    env:
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
    steps:
      - name: Probe redacted exact-SHA readiness
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          report_contract() {
            local url="$1"
            local payload code
            payload="$(mktemp)"
            code="$(curl -sS -o "$payload" -w '%{http_code}' --connect-timeout 10 --max-time 60 \
              -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN:-}" \
              "$url" 2>/dev/null || printf '000')"
            if jq -e . "$payload" >/dev/null 2>&1; then
              jq -c --arg required_sha "$GITHUB_SHA" '{status,contract,build_sha,exact_sha_current:(.build_sha == $required_sha),schema_current,queue_configured,object_storage_configured,object_storage_reachable,production_ready,production_blocker_codes,platform_api_enabled}' "$payload"
            else
              printf '{"status":"unavailable","http":"%s","exact_sha_current":false}' "$code"
            fi
            rm -f "$payload"
          }

          custom="$(report_contract "${CUSTOM_UPSTREAM}/v1/internal/release/health")"
          direct="$(report_contract "${DIRECT_RENDER_UPSTREAM}/v1/internal/release/health")"

          {
            echo "## Platform API private-beta authenticated readiness"
            echo
            echo "- workflow SHA: \`${GITHUB_SHA}\`"
            echo "- required exact SHA: \`${GITHUB_SHA}\`"
            echo
            echo "### Custom upstream"
            echo '```json'
            echo "$custom" | jq . 2>/dev/null || echo "$custom"
            echo '```'
            echo
            echo "### Direct Render upstream"
            echo '```json'
            echo "$direct" | jq . 2>/dev/null || echo "$direct"
            echo '```'
          } > comment.md

          gh issue comment "${OPS_ISSUE}" --repo "${GITHUB_REPOSITORY}" --body-file comment.md

  marketing-pages-topology:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Report redacted marketing Pages topology
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          payload="$(mktemp)"
          code="$(curl -sS -o "$payload" -w '%{http_code}' --connect-timeout 10 --max-time 60 \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN:-}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID:-}/pages/projects?per_page=100" 2>/dev/null || printf '000')"

          if jq -e '.success == true' "$payload" >/dev/null 2>&1; then
            project="$(jq -c '[.result[] | select((.domains // []) | index("agroai-pilot.com"))][0] // null | if . == null then {status:"not_found"} else {status:"found",name,subdomain,domains,production_branch,build_config,source:{type:.source.type,config:{owner:.source.config.owner,repo_name:.source.config.repo_name,production_branch:.source.config.production_branch,deployments_enabled:.source.config.deployments_enabled,production_deployments_enabled:.source.config.production_deployments_enabled,preview_deployment_setting:.source.config.preview_deployment_setting}}} end' "$payload")"
          else
            project="$(printf '{"status":"unavailable","http":"%s"}' "$code")"
          fi
          rm -f "$payload"

          {
            echo "## Marketing Cloudflare Pages topology"
            echo
            echo "- workflow SHA: \`${GITHUB_SHA}\`"
            echo '```json'
            echo "$project" | jq . 2>/dev/null || echo "$project"
            echo '```'
          } > comment.md

          gh issue comment "${OPS_ISSUE}" --repo "${GITHUB_REPOSITORY}" --body-file comment.md
