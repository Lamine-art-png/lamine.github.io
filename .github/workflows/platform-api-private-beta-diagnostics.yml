name: Platform API Private Beta Diagnostics

on:
  push:
    branches: ["main"]
    paths:
      - "agroai_api/**"
      - "figma-enterprise-v4/**"
      - "cloudflare/edge-gateway/**"
      - "platform-api/**"
      - "developers/**"
      - "functions/platform-api/**"
      - "functions/developers/**"
      - "index.html"
      - ".github/workflows/platform-api-private-beta-diagnostics.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: platform-api-private-beta-diagnostics
  cancel-in-progress: true

env:
  OPS_ISSUE: "262"
  CUSTOM_UPSTREAM: "https://api-preview.agroai-pilot.com"
  DIRECT_RENDER_UPSTREAM: "https://agroai-api-preview.onrender.com"
  PUBLIC_API: "https://api.agroai-pilot.com"
  PORTAL_URL: "https://app.agroai-pilot.com"
  MARKETING_URL: "https://agroai-pilot.com/platform-api"
  DOCS_URL: "https://agroai-pilot.com/developers"

jobs:
  public-surfaces:
    runs-on: ubuntu-latest
    steps:
      - name: Probe redacted Platform API surfaces
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          probe() {
            local name="$1" url="$2"
            local body code result summary
            body="$(mktemp)"
            code="$(curl -L -sS -o "$body" -w '%{http_code}' --connect-timeout 10 --max-time 60 "$url" 2>/dev/null || printf '000')"
            result="closed"
            if [[ "$code" =~ ^2 ]]; then result="open"; fi
            summary="$(tr '\n' ' ' < "$body" | head -c 180 | sed 's/`/\\`/g')"
            rm -f "$body"
            printf '%s|%s|%s|%s\n' "$name" "$result" "$code" "$summary"
          }

          {
            probe custom_upstream_health "${CUSTOM_UPSTREAM}/v1/health"
            probe direct_render_health "${DIRECT_RENDER_UPSTREAM}/v1/health"
            probe public_edge_health "${PUBLIC_API}/v1/edge-health"
            probe public_api_health "${PUBLIC_API}/v1/health"
            probe enterprise_portal "${PORTAL_URL}/"
            probe platform_api_marketing "${MARKETING_URL}"
            probe developer_documentation "${DOCS_URL}"
          } > probes.txt

          {
            echo "## Platform API private-beta public diagnostics"
            echo
            echo "- workflow SHA: \`${GITHUB_SHA}\`"
            echo "- run: \`${GITHUB_RUN_ID}\`"
            echo
            echo '| Probe | State | HTTP | Redacted preview |'
            echo '|---|---:|---:|---|'
            while IFS='|' read -r name result code summary; do
              echo "| ${name} | ${result} | ${code} | \`${summary}\` |"
            done < probes.txt
          } > comment.md

          gh issue comment "${OPS_ISSUE}" --repo "${GITHUB_REPOSITORY}" --body-file comment.md

  authenticated-readiness:
    runs-on: ubuntu-latest
    environment: production
    env:
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
    steps:
      - name: Probe redacted exact-SHA readiness
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          report_contract() {
            local url="$1"
            local payload code
            payload="$(mktemp)"
            code="$(curl -sS -o "$payload" -w '%{http_code}' --connect-timeout 10 --max-time 60 \
              -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN:-}" \
              "$url" 2>/dev/null || printf '000')"
            if jq -e . "$payload" >/dev/null 2>&1; then
              jq -c '{status,contract,build_sha,schema_current,queue_configured,object_storage_configured,object_storage_reachable,production_ready,production_blocker_codes,platform_api_enabled}' "$payload"
            else
              printf '{"status":"unavailable","http":"%s"}' "$code"
            fi
            rm -f "$payload"
          }

          custom="$(report_contract "${CUSTOM_UPSTREAM}/v1/internal/release/health")"
          direct="$(report_contract "${DIRECT_RENDER_UPSTREAM}/v1/internal/release/health")"

          {
            echo "## Platform API private-beta authenticated readiness"
            echo
            echo "- workflow SHA: \`${GITHUB_SHA}\`"
            echo "- required exact SHA: \`${GITHUB_SHA}\`"
            echo
            echo "### Custom upstream"
            echo '```json'
            echo "$custom" | jq . 2>/dev/null || echo "$custom"
            echo '```'
            echo
            echo "### Direct Render upstream"
            echo '```json'
            echo "$direct" | jq . 2>/dev/null || echo "$direct"
            echo '```'
          } > comment.md

          gh issue comment "${OPS_ISSUE}" --repo "${GITHUB_REPOSITORY}" --body-file comment.md
