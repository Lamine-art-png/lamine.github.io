name: Velia CI

on:
  push:
    branches:
      - main
      - "claude/**"
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend — install, syntax, test, eval
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/velia-ai-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/velia-ai-api/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Syntax check — all source files
        run: |
          find src -name "*.js" | sort | xargs -I{} node --check {}
          echo "Syntax OK"

      - name: Run backend tests
        env:
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
          WEATHER_PROVIDER: mock
          VECTOR_PROVIDER: local
          MEMORY_PROVIDER: json
          MEMORY_FILE: /tmp/velia-ci-memory.json
          VECTOR_INDEX_FILE: /tmp/velia-ci-vector.json
          WEATHER_CACHE_FILE: /tmp/velia-ci-weather.json
        run: npm test

      - name: Run evaluation fixtures
        env:
          LLM_PROVIDER: mock
          EMBEDDING_PROVIDER: mock
          WEATHER_PROVIDER: mock
        run: npm run eval

  mobile:
    name: Mobile — install, syntax, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/velia-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check — all mobile JS files
        run: |
          find js sw.js -name "*.js" | sort | xargs -I{} node --check {}
          echo "Mobile syntax OK"

      - name: Run mobile tests
        run: npm test
