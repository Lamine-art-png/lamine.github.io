name: Apply Edge Request Generic Fix

on:
  push:
    branches: [i18n-network-fallback-157]
    paths:
      - '.github/workflows/apply-edge-request-generic-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: i18n-network-fallback-157
      - name: Patch base fetch delegate type
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('cloudflare/edge-gateway/src/production-wrapper.ts')
          text = path.read_text()
          old = '(input: Request, runtimeEnv: BaseEnv) => Promise<Response>'
          new = '(input: unknown, runtimeEnv: BaseEnv) => Promise<Response>'
          if old not in text:
              raise SystemExit('expected delegate signature not found')
          path.write_text(text.replace(old, new, 1))
          PY
          rm -f .github/workflows/apply-edge-request-generic-fix.yml
      - name: Commit exact fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'agroai-release-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A cloudflare/edge-gateway/src/production-wrapper.ts .github/workflows/apply-edge-request-generic-fix.yml
          git commit -m 'fix(edge): accept generic request metadata in base delegation'
          git push origin HEAD:i18n-network-fallback-157
