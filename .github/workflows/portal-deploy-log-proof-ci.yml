name: Portal Deploy Log Proof

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/portal-deploy-log-proof-ci.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      PORTAL_JOB_ID: '85350218925'
    steps:
      - name: Download and sanitize exact-main portal job log
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p portal-log
          curl --fail --silent --show-error -L \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/${PORTAL_JOB_ID}/logs" \
            > portal-log/full.log
          grep -E 'wrangler pages deploy|pages\.dev|Deployment complete|Uploaded|Success|project-name|branch main|Smoke production portal' portal-log/full.log \
            | sed -E 's/(CLOUDFLARE_[A-Z_]+=).*/\1[redacted]/' \
            | tee portal-log/relevant.log
          test -s portal-log/relevant.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: portal-deploy-log-proof
          path: portal-log/relevant.log
          retention-days: 2
