name: I18n Fastpath Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - 'cloudflare/edge-gateway/**'
      - 'wrangler.toml'
      - '.github/workflows/i18n-fastpath-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install edge dependencies
        working-directory: cloudflare/edge-gateway
        run: npm ci --no-audit --no-fund
      - name: Capture exact edge check
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set +e
          npm run check > edge-check.log 2>&1
          status=$?
          cat edge-check.log
          echo "$status" > edge-check.exit
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: i18n-fastpath-edge-diagnostic
          path: |
            cloudflare/edge-gateway/edge-check.log
            cloudflare/edge-gateway/edge-check.exit
          if-no-files-found: error
          retention-days: 1
