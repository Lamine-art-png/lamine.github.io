name: I18n Edge Release

on:
  push:
    branches: ["main"]
    paths:
      - "cloudflare/edge-gateway/src/i18n-*.ts"
      - "cloudflare/edge-gateway/src/edge-main-v3.ts"
      - "cloudflare/edge-gateway/src/edge-main-v3.test.ts"
      - "shared/ui-*.json"
      - "shared/supported-locales.json"
      - ".github/workflows/deploy-i18n-edge.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agroai-i18n-edge-production
  cancel-in-progress: true

env:
  API_URL: https://app.agroai-pilot.com
  PORTAL_ORIGIN: https://app.agroai-pilot.com

jobs:
  deploy:
    name: Deploy and prove all 59 dynamic locales
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare/edge-gateway/package-lock.json

      - name: Validate exact edge bundle
        working-directory: cloudflare/edge-gateway
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run check

      - name: Deploy exact edge bundle
        working-directory: cloudflare/edge-gateway
        run: |
          set -euo pipefail
          npx wrangler deploy --config ../../wrangler.toml

      - name: Smoke production edge
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --max-time 15 "${API_URL}/v1/edge-health" | jq -e '.status == "ok"' >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          exit 1

      - name: Prove all 59 live browser-readable locales
        shell: bash
        run: |
          set -euo pipefail
          jq -r '.enabledUiLocales[] | select(. != "auto" and . != "en" and . != "fr-FR")' shared/supported-locales.json > dynamic-locales.txt
          dynamic_count="$(wc -l < dynamic-locales.txt | tr -d ' ')"
          test "$dynamic_count" -eq 58

          passed=0
          : > locale-matrix.jsonl
          while IFS= read -r locale; do
            headers="headers-${locale}.txt"
            body="body-${locale}.json"
            status="$(curl --silent --show-error --max-time 60 \
              -D "$headers" \
              -o "$body" \
              -w '%{http_code}' \
              -H "Origin: ${PORTAL_ORIGIN}" \
              -H 'Content-Type: application/json' \
              -d "{\"locale\":\"${locale}\",\"source\":{\"language\":\"Language\",\"save\":\"Save\"}}" \
              "${API_URL}/v1/i18n/catalog")"

            test "$status" = "200"
            tr -d '\r' < "$headers" | grep -Fi "access-control-allow-origin: ${PORTAL_ORIGIN}" >/dev/null
            jq -e --arg locale "$locale" '
              .status == "ok" and
              .locale == $locale and
              (.catalog.language | type == "string" and length > 0) and
              (.catalog.save | type == "string" and length > 0) and
              ((.catalog.language != "Language") or (.catalog.save != "Save"))
            ' "$body" >/dev/null

            jq -c . "$body" >> locale-matrix.jsonl
            rm -f "$headers" "$body"
            passed=$((passed + 1))
            echo "PASS ${locale}"
          done < dynamic-locales.txt

          test "$passed" -eq 58
          echo '{"status":"ok","locale":"fr-FR","source":"bundled_static_catalog"}' >> locale-matrix.jsonl
          total=$((passed + 1))
          test "$total" -eq 59
          echo "live_non_english_locale_matrix=${total}/59"

      - name: Upload immutable locale evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-i18n-59-matrix-${{ github.sha }}
          path: |
            dynamic-locales.txt
            locale-matrix.jsonl
          if-no-files-found: ignore
          retention-days: 30
