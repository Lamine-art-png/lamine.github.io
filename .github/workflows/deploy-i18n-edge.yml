name: I18n Edge Release
# Browser-visible production proof gate.

on:
  push:
    branches: ["main"]
    paths:
      - "cloudflare/edge-gateway/src/i18n-*.ts"
      - "cloudflare/edge-gateway/src/edge-main-v3.ts"
      - "cloudflare/edge-gateway/src/edge-main-v3.test.ts"
      - "agroai_api/app/services/local_ui_translation.py"
      - "agroai_api/app/services/model_router.py"
      - "shared/ui-*.json"
      - "shared/supported-locales.json"
      - ".github/workflows/deploy-i18n-edge.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agroai-i18n-edge-production
  cancel-in-progress: true

env:
  API_URL: https://app.agroai-pilot.com
  PORTAL_ORIGIN: https://app.agroai-pilot.com
  I18N_EDGE_RELEASE: provider-chain-v2

jobs:
  deploy:
    name: Deploy and prove all 59 dynamic locales
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare/edge-gateway/package-lock.json

      - name: Validate exact edge bundle
        working-directory: cloudflare/edge-gateway
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run check

      - name: Validate local translation backend syntax
        run: |
          set -euo pipefail
          python -m py_compile \
            agroai_api/app/services/local_ui_translation.py \
            agroai_api/app/services/model_router.py

      - name: Fail closed on missing canary credential
        run: |
          set -euo pipefail
          test -n "${QUEUE_CONSUMER_TOKEN:-}"

      - name: Deploy exact edge bundle
        working-directory: cloudflare/edge-gateway
        run: |
          set -euo pipefail
          npx wrangler deploy --config ../../wrangler.toml

      - name: Wait for exact i18n edge release on custom domain
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 40); do
            status="$(curl --silent --show-error --max-time 20 -D release-headers.txt -o release-body.json -w '%{http_code}' \
              -H "Origin: ${PORTAL_ORIGIN}" \
              -H 'Content-Type: application/json' \
              -d '{"locale":"sq","source":{"__release_probe__":"probe"}}' \
              "${API_URL}/v1/i18n/catalog" || true)"
            marker="$(tr -d '\r' < release-headers.txt | sed -n 's/^x-agroai-i18n-release:[[:space:]]*//Ip' | head -1)"
            if [ "$status" = "409" ] && [ "$marker" = "$I18N_EDGE_RELEASE" ]; then
              echo "exact_i18n_edge_release=${marker}"
              exit 0
            fi
            sleep 2
          done
          echo "Exact i18n edge release marker not visible on custom domain"
          cat release-headers.txt || true
          cat release-body.json || true
          exit 1

      - name: Smoke production edge
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 15 "${API_URL}/v1/edge-health" | jq -e '.status == "ok"' >/dev/null

      - name: Prove all 59 live browser-readable locales
        shell: bash
        run: |
          set -euo pipefail
          jq -r '.enabledUiLocales[] | select(. != "auto" and . != "en" and . != "fr-FR")' shared/supported-locales.json > dynamic-locales.txt
          test "$(wc -l < dynamic-locales.txt | tr -d ' ')" -eq 58
          : > locale-matrix.jsonl
          : > first-failure.txt
          passed=0

          while IFS= read -r locale; do
            headers="headers.txt"
            body="body.json"
            status="$(curl --silent --show-error --max-time 75 -D "$headers" -o "$body" -w '%{http_code}' \
              -H "Origin: ${PORTAL_ORIGIN}" \
              -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN}" \
              -H 'Content-Type: application/json' \
              -d "{\"locale\":\"${locale}\"}" \
              "${API_URL}/v1/i18n/internal/canary")"

            cors_ok=no
            if tr -d '\r' < "$headers" | grep -Fi "access-control-allow-origin: ${PORTAL_ORIGIN}" >/dev/null; then cors_ok=yes; fi
            release_ok=no
            if tr -d '\r' < "$headers" | grep -Fi "x-agroai-i18n-release: ${I18N_EDGE_RELEASE}" >/dev/null; then release_ok=yes; fi
            body_ok=no
            if jq -e --arg locale "$locale" '.status == "ok" and .locale == $locale and .changed_count >= 2 and .key_count == 4' "$body" >/dev/null 2>&1; then body_ok=yes; fi

            if [ "$status" != "200" ] || [ "$cors_ok" != "yes" ] || [ "$release_ok" != "yes" ] || [ "$body_ok" != "yes" ]; then
              {
                echo "locale=${locale}"
                echo "http_status=${status}"
                echo "cors_ok=${cors_ok}"
                echo "release_ok=${release_ok}"
                echo "body_ok=${body_ok}"
                echo "body="
                cat "$body"
              } > first-failure.txt
              cat first-failure.txt
              exit 1
            fi

            jq -c . "$body" >> locale-matrix.jsonl
            passed=$((passed + 1))
            echo "PASS ${locale}"
          done < dynamic-locales.txt

          test "$passed" -eq 58
          echo '{"status":"ok","locale":"fr-FR","source":"bundled_static_catalog"}' >> locale-matrix.jsonl
          test "$((passed + 1))" -eq 59
          echo "live_non_english_locale_matrix=59/59"

      - name: Upload immutable locale evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-i18n-59-matrix-${{ github.sha }}
          path: |
            dynamic-locales.txt
            locale-matrix.jsonl
            first-failure.txt
            release-headers.txt
            release-body.json
          if-no-files-found: ignore
          retention-days: 30
