name: Source Library PR Debug

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  portal-contract-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install portal dependencies
        working-directory: figma-enterprise-v4
        run: npm ci
      - name: Capture full committed inventory diff
        working-directory: figma-enterprise-v4
        shell: bash
        run: |
          python3 - <<'PY'
          import importlib.util
          import json
          from pathlib import Path

          script_path = Path('scripts/check_ui_literal_inventory.py').resolve()
          spec = importlib.util.spec_from_file_location('inventory', script_path)
          module = importlib.util.module_from_spec(spec)
          assert spec and spec.loader
          spec.loader.exec_module(module)
          expected = module.build_catalog()
          current = {}
          for path in sorted((module.REPO_ROOT / 'shared').glob(module.LITERAL_CATALOG_GLOB)):
              current.update(json.loads(path.read_text(encoding='utf-8')))
          payload = {
              'missing': {key: expected[key] for key in sorted(set(expected) - set(current))},
              'extra': {key: current[key] for key in sorted(set(current) - set(expected))},
              'changed': {
                  key: {'current': current[key], 'expected': expected[key]}
                  for key in sorted(set(current).intersection(expected))
                  if current[key] != expected[key]
              },
              'expected_count': len(expected),
              'current_count': len(current),
          }
          Path('/tmp/source-library-inventory-diff.json').write_text(json.dumps(payload, indent=2, ensure_ascii=False), encoding='utf-8')
          print(json.dumps(payload, indent=2, ensure_ascii=False))
          PY
      - name: Run portal contracts with captured output
        working-directory: figma-enterprise-v4
        shell: bash
        run: |
          set +e
          npm run test:i18n 2>&1 | tee /tmp/source-library-test-i18n.log
          status=${PIPESTATUS[0]}
          echo "$status" > /tmp/source-library-test-i18n.status
          exit "$status"
      - name: Upload exact contract output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-library-test-i18n
          path: |
            /tmp/source-library-test-i18n.log
            /tmp/source-library-test-i18n.status
            /tmp/source-library-inventory-diff.json
          if-no-files-found: warn
