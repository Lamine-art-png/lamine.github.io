name: Diagnose Local AI Route

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/diagnose-local-ai-route.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Inspect Worker, route, Tunnel, and public DNS
        run: |
          set -euo pipefail
          auth="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          zone_id="$(curl --fail --silent --show-error -H "$auth" 'https://api.cloudflare.com/client/v4/zones?name=agroai-pilot.com' | jq -r '.result[0].id')"
          test -n "$zone_id"

          curl --fail --silent --show-error -H "$auth" "https://api.cloudflare.com/client/v4/zones/${zone_id}/workers/routes" \
            | jq '{routes:[.result[] | select((.pattern // "") | contains("local-ai")) | {id,pattern,script}]}' > local-ai-routes.json

          curl --fail --silent --show-error -H "$auth" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/domains" \
            | jq '{domains:[.result[] | select((.hostname // "") == "local-ai.agroai-pilot.com") | {id,hostname,service,zone_id}]}' > local-ai-domains.json

          cname="$(dig +short CNAME local-ai.agroai-pilot.com | head -1 | sed 's/\.$//' || true)"
          a_records="$(dig +short A local-ai.agroai-pilot.com | paste -sd, - || true)"
          jq -n --arg cname "$cname" --arg a "$a_records" '{cname:$cname,a_records:($a|split(",")|map(select(length>0)))}' > local-ai-dns.json

          curl --silent --show-error -H "$auth" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel?name=agroai-local-ai&is_deleted=false" \
            | jq '{success,errors,tunnels:[(.result // [])[] | {id,name,status,connections}]}' > local-ai-tunnel.json || true

          curl --silent --show-error -H "$auth" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/agroai-local-ai-origin/content" \
            -o local-ai-worker-content.txt || true

          cat local-ai-routes.json
          cat local-ai-domains.json
          cat local-ai-dns.json
          cat local-ai-tunnel.json
          echo "worker_bytes=$(wc -c < local-ai-worker-content.txt 2>/dev/null || echo 0)"

      - uses: actions/upload-artifact@v4
        with:
          name: local-ai-route-diagnostics-${{ github.sha }}
          path: |
            local-ai-routes.json
            local-ai-domains.json
            local-ai-dns.json
            local-ai-tunnel.json
            local-ai-worker-content.txt
          retention-days: 7

      - name: Publish diagnostic status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            let statusContext = 'diagnostic/local-ai-route/failed';
            if (state === 'success') {
              const routes = JSON.parse(fs.readFileSync('local-ai-routes.json', 'utf8')).routes || [];
              const tunnelsDoc = JSON.parse(fs.readFileSync('local-ai-tunnel.json', 'utf8'));
              const routeScript = routes[0]?.script || (routes.length ? 'route-no-script' : 'no-route');
              const tunnel = (tunnelsDoc.tunnels || [])[0];
              const tunnelState = tunnel ? String(tunnel.status || 'found') : 'no-tunnel';
              statusContext = `diagnostic/local-ai/${routeScript}/tunnel-${tunnelState}`.slice(0, 100);
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: statusContext,
              description: 'local-ai Worker and Tunnel inspection',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
