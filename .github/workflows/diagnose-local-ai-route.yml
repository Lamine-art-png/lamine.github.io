name: Diagnose Local AI Route

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/diagnose-local-ai-route.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Inspect Worker metadata, Tunnels, and prior Quick Tunnels
        run: |
          set -euo pipefail
          auth="Authorization: Bearer ${CLOUDFLARE_API_TOKEN}"
          zone_id="$(curl --fail --silent --show-error -H "$auth" 'https://api.cloudflare.com/client/v4/zones?name=agroai-pilot.com' | jq -r '.result[0].id')"
          test -n "$zone_id"

          curl --fail --silent --show-error -H "$auth" "https://api.cloudflare.com/client/v4/zones/${zone_id}/workers/routes" \
            | jq '{routes:[.result[] | select((.pattern // "") | contains("local-ai")) | {id,pattern,script}]}' > local-ai-routes.json

          curl --silent --show-error -H "$auth" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/cfd_tunnel?is_deleted=false&per_page=100" \
            | jq '{success,errors,tunnels:[(.result // [])[] | {id,name,status,connections}]}' > all-active-tunnels.json || true

          curl --silent --show-error -H "$auth" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/agroai-local-ai-origin/settings" \
            | jq '{success,errors,result}' > local-ai-worker-settings.json || true

          curl --silent --show-error -H "$auth" "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/workers/scripts/agroai-local-ai-origin/deployments" \
            | jq '{success,errors,deployments:(.result.deployments // .result // [])}' > local-ai-worker-deployments.json || true

          probe() {
            name="$1"
            url="$2"
            status="$(curl --silent --show-error --location --max-time 20 -o "${name}.body" -w '%{http_code}' "${url}/api/tags" || true)"
            body_ok=no
            if jq -e '.models | type == "array"' "${name}.body" >/dev/null 2>&1; then body_ok=yes; fi
            jq -n --arg name "$name" --arg url "$url" --arg status "$status" --arg body_ok "$body_ok" '{name:$name,url:$url,http_status:$status,ollama_tags_ok:($body_ok=="yes")}'
          }

          {
            probe seeing-barbara https://seeing-barbara-equity-dual.trycloudflare.com
            probe shoes-operator https://shoes-operator-thing-focusing.trycloudflare.com
          } | jq -s '{probes:.}' > quick-tunnel-probes.json

          cat local-ai-routes.json
          cat all-active-tunnels.json
          cat local-ai-worker-settings.json
          cat local-ai-worker-deployments.json
          cat quick-tunnel-probes.json

      - uses: actions/upload-artifact@v4
        with:
          name: local-ai-route-diagnostics-${{ github.sha }}
          path: |
            local-ai-routes.json
            all-active-tunnels.json
            local-ai-worker-settings.json
            local-ai-worker-deployments.json
            quick-tunnel-probes.json
          retention-days: 7

      - name: Publish diagnostic status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const state = '${{ job.status }}' === 'success' ? 'success' : 'failure';
            let statusContext = 'diagnostic/local-ai-probe/failed';
            if (state === 'success') {
              const probes = JSON.parse(fs.readFileSync('quick-tunnel-probes.json', 'utf8')).probes || [];
              const active = probes.find((probe) => probe.ollama_tags_ok);
              statusContext = active ? `diagnostic/local-ai/quick-${active.name}-active` : 'diagnostic/local-ai/no-quick-tunnel';
            }
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: statusContext,
              description: 'probe prior AGRO-AI Quick Tunnel URLs',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
