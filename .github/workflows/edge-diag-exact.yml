name: Edge Diagnostic Exact

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        working-directory: cloudflare/edge-gateway
        run: npm ci --no-audit --no-fund
      - name: Check
        working-directory: cloudflare/edge-gateway
        run: npm run check
