name: CF DNS Token Check
on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/cf-dns-token-check.yml']
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    environment: production
    env:
      DNS_TOKEN: ${{ secrets.CLOUDFLARE_DNS_API_TOKEN }}
    steps:
      - run: |
          if [ -n "${DNS_TOKEN:-}" ]; then echo present=yes; else echo present=no; fi
