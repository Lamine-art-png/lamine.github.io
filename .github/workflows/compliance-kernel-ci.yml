name: Compliance Kernel CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compliance-kernel:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agroai_compliance_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Compile backend modules
        run: python -m compileall app tests scripts
      - name: Check migration syntax
        run: |
          python -m py_compile alembic/versions/002_california_compliance_pack.py
          python -m py_compile alembic/versions/003_global_compliance_kernel.py
          python -m py_compile scripts/compliance_migration_preflight.py
          python -m py_compile scripts/postgres_precreated_compliance_smoke.py
      - name: Run compliance tests and SQLite migration smoke tests
        run: pytest tests/unit/test_compliance_pack.py
      - name: Run Talgil route tests
        run: pytest tests/unit/test_talgil_routes.py
      - name: Bootstrap PostgreSQL legacy baseline tables
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agroai_compliance_ci
        run: |
          python - <<'PY'
          from app.db.base import Base, engine
          from app.models.tenant import Tenant
          from app.models.block import Block
          Base.metadata.create_all(bind=engine, tables=[Tenant.__table__, Block.__table__])
          PY
      - name: PostgreSQL migration smoke test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agroai_compliance_ci
        run: alembic upgrade head
      - name: PostgreSQL pre-created compliance schema smoke test
        env:
          ALLOW_COMPLIANCE_SMOKE_RESET: "1"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agroai_compliance_precreated_ci
        run: python scripts/postgres_precreated_compliance_smoke.py

  command-center-v2:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agroai-command-center-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/agroai-command-center-v2/package-lock.json
      - name: Install V2 dependencies
        run: npm ci
      - name: Build V2
        run: npm run build
      - name: Run existing V2 tests
        run: npm run test

  legacy-portal-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Legacy portal JavaScript syntax checks
        run: find customer-portal/js -name '*.js' -print0 | xargs -0 -n1 node --check
