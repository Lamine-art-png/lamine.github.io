name: Field Intelligence Conflict-Safe Integration Report

on:
  pull_request_target:
    branches:
      - automation/field-intelligence-runner
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: read

jobs:
  report:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ github.token }}
      - name: Generate durable conflict report
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git config user.name "agroai-integration-bot"
          git config user.email "integration-bot@agroai-pilot.com"
          git fetch origin main integration/field-intelligence-main-sync
          main_head="$(git rev-parse origin/main)"
          set +e
          git merge --no-commit --no-ff origin/main
          rc=$?
          set -e
          mkdir -p /tmp/fi-report
          {
            echo "# Field Intelligence integration conflict report"
            echo
            echo "- feature head: \`$HEAD_SHA\`"
            echo "- feature ref: \`$HEAD_REF\`"
            echo "- current main head: \`$main_head\`"
            echo "- merge exit: \`$rc\`"
            echo
            echo "## Conflicting files"
            echo '```'
            git diff --name-only --diff-filter=U | sort
            echo '```'
            echo
            echo "## Conflict excerpts"
            while IFS= read -r path; do
              [ -n "$path" ] || continue
              echo
              echo "### \`$path\`"
              echo '```diff'
              sed -n '/^<<<<<<< /,/^>>>>>>> /p' "$path" | head -n 300 || true
              echo '```'
            done < <(git diff --name-only --diff-filter=U | sort)
          } > /tmp/fi-report/field-intelligence-integration-conflicts.md
          git merge --abort >/dev/null 2>&1 || true
          git checkout -B integration/field-intelligence-main-sync origin/integration/field-intelligence-main-sync
          mkdir -p scratchpad
          cp /tmp/fi-report/field-intelligence-integration-conflicts.md scratchpad/
          git add scratchpad/field-intelligence-integration-conflicts.md
          if git diff --cached --quiet; then
            echo "Conflict report unchanged."
          else
            git commit -m "docs: refresh Field Intelligence integration conflict report"
            git push origin HEAD:integration/field-intelligence-main-sync
          fi
