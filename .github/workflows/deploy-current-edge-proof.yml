name: Deploy Current Edge Proof

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/deploy-current-edge-proof.yml']

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate edge
        working-directory: cloudflare/edge-gateway
        run: |
          npm ci --no-audit --no-fund
          npm run check
      - name: Deploy edge
        run: npx --yes wrangler@4.107.0 deploy --config wrangler.toml
