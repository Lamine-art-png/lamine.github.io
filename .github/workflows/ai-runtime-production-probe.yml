name: AI Runtime Production Probe

on:
  pull_request:
    branches: [main]
    paths:
      - 'agroai_api/**'
      - 'figma-enterprise-v4/**'
      - '.github/workflows/ai-runtime-production-probe.yml'

permissions:
  contents: read

jobs:
  public-runtime-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe production API and edge runtime
        shell: bash
        run: |
          set +e
          probe() {
            name="$1"
            url="$2"
            echo "=== ${name} ==="
            curl -sS -i --max-time 25 "$url" | head -c 12000
            echo
            echo
          }
          probe "API health" "https://api.agroai-pilot.com/health"
          probe "AI router status" "https://api.agroai-pilot.com/v1/runtime/ai-router-status"
          probe "Edge health" "https://local-ai.agroai-pilot.com/health"

          echo "=== Edge chat unauthenticated smoke ==="
          curl -sS -i --max-time 45 \
            -H 'Content-Type: application/json' \
            -d '{"model":"@cf/zai-org/glm-4.7-flash","messages":[{"role":"user","content":"Reply exactly: EDGE_OK"}],"stream":false,"options":{"num_predict":30}}' \
            "https://local-ai.agroai-pilot.com/api/chat" | head -c 12000
          echo
