name: Apply Release Language Smoke Fix

on:
  push:
    branches: [release146]
    paths:
      - '.github/workflows/apply-release-language-smoke-fix.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release146
      - name: Repair production language bundle smoke marker
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/deploy.yml')
          text = path.read_text()
          old = "          grep -F 'agroai_ui_catalog_v3:' portal-smoke/all-js.txt >/dev/null\n          printf 'portal_global_language_bundle=ok\\n'"
          new = "          grep -F 'agroai_ui_catalog_v4:' portal-smoke/all-js.txt >/dev/null\n          grep -F 'Full UI translation unavailable' portal-smoke/all-js.txt >/dev/null\n          printf 'portal_global_language_bundle=ok\\n'"
          if old not in text:
              raise SystemExit('stale v3 production smoke marker not found')
          path.write_text(text.replace(old, new, 1))
          PY
          rm -f .github/workflows/apply-release-language-smoke-fix.yml
      - name: Commit release smoke repair
        run: |
          git config user.name 'agroai-release-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A .github/workflows
          git commit -m 'fix(release): verify v4 core-first language runtime'
          git push origin HEAD:release146
