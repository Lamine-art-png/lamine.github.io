name: Field Intelligence CI

on:
  pull_request:
  push:
    branches: [feature/field-intelligence, feature/field-intelligence-launch, feature/whatsapp-field-intelligence]
  workflow_dispatch:

jobs:
  postgres-migration-roundtrip:
    name: PostgreSQL migration 027→028→027→028 and concurrency
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: agroai_field_intelligence_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: agroai_api
    env:
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/agroai_field_intelligence_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Upgrade current-main baseline
        run: alembic upgrade 027_field_intelligence_launch
      - name: Upgrade baseline to repository head
        run: alembic upgrade head
      - name: Downgrade only the WhatsApp Field Intelligence revision
        run: alembic downgrade 027_field_intelligence_launch
      - name: Prove WhatsApp tables are gone and protected schemas survive
        run: |
          python - <<'PY'
          import os
          import sqlalchemy as sa
          engine = sa.create_engine(os.environ["DATABASE_URL"])
          inspector = sa.inspect(engine)
          tables = set(inspector.get_table_names())
          removed = {
              "whatsapp_contact_bindings",
              "whatsapp_inbound_events",
              "whatsapp_outbound_messages",
          }
          assert not (removed & tables), sorted(removed & tables)
          preserved = {
              "field_capture_sessions", "field_observations", "field_observation_assets",
              "field_observation_processing_runs", "field_observation_audit_events",
              "field_storage_reservations", "field_runtime_flags", "field_worker_heartbeats",
              "organization_verification_profiles", "security_audit_events",
              "account_access_appeals", "api_projects", "platform_api_keys",
              "platform_webhook_outbox", "platform_webhook_audit_events",
              "platform_api_applications", "platform_program_enrollments",
              "platform_live_access_requests", "platform_partner_dossiers",
              "platform_terms_documents", "platform_terms_acceptances",
              "platform_api_plans", "platform_api_operation_costs",
              "platform_api_subscriptions", "platform_credit_reservations",
              "platform_status_components", "platform_abuse_events",
          }
          missing = preserved - tables
          assert not missing, f"downgrade removed protected tables: {sorted(missing)}"
          user_columns = {c["name"] for c in inspector.get_columns("users")}
          assert {"account_status", "access_restriction_reason", "access_restricted_at"} <= user_columns
          print({"removed_whatsapp_tables": sorted(removed), "preserved_tables": sorted(preserved)})
          PY
      - name: Re-upgrade to repository head
        run: alembic upgrade head
      - name: Prove persisted revision equals repository head
        run: |
          python - <<'PY'
          import os
          import sqlalchemy as sa
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config("alembic.ini")
          heads = sorted(ScriptDirectory.from_config(cfg).get_heads())
          assert heads == ["028_whatsapp_field_intelligence"], heads
          engine = sa.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as connection:
              versions = sorted(row[0] for row in connection.execute(sa.text("SELECT version_num FROM alembic_version")))
          assert versions == heads, {"persisted": versions, "repository": heads}
          print({"persisted_heads": versions})
          PY
      - name: Real PostgreSQL concurrency suites
        env:
          FIELD_INTELLIGENCE_TEST_DATABASE_URL: postgresql://postgres@127.0.0.1:5432/agroai_field_intelligence_concurrency
        run: |
          python - <<'PY'
          import sqlalchemy as sa
          engine = sa.create_engine("postgresql://postgres@127.0.0.1:5432/postgres", isolation_level="AUTOCOMMIT")
          with engine.connect() as connection:
              connection.execute(sa.text("CREATE DATABASE agroai_field_intelligence_concurrency"))
          PY
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p no:debugging -q --tb=short \
            tests/unit/test_field_intelligence_postgres.py

  backend-field-intelligence:
    name: Backend Field Intelligence, WhatsApp, worker, staging, and R2 tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
      - name: Compile backend and migration tree
        run: python -m compileall -q app alembic scripts
      - name: Field Intelligence suites
        id: field_intelligence_suite
        shell: bash
        run: |
          set +e
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p no:debugging -q -x --tb=short \
            tests/unit/test_field_intelligence.py \
            tests/unit/test_field_intelligence_hardening.py \
            tests/unit/test_field_intelligence_launch.py \
            tests/unit/test_field_intelligence_plan_access.py \
            tests/unit/test_field_intelligence_staging_contract.py \
            tests/unit/test_field_operating_loop.py \
            tests/unit/test_live_field_context.py \
            tests/unit/test_object_storage.py \
            tests/unit/test_production_readiness.py \
            tests/unit/test_whatsapp_field_intelligence.py 2>&1 | tee field-intelligence-test-output.txt
          suite_status=${PIPESTATUS[0]}
          echo "status=${suite_status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Preserve Field Intelligence diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: field-intelligence-test-output
          path: agroai_api/field-intelligence-test-output.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce Field Intelligence result
        if: steps.field_intelligence_suite.outputs.status != '0'
        run: exit 1

  release-contracts:
    name: Release and revision contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Release contract suite
        run: >-
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p no:debugging -q --tb=short
          tests/unit/test_release_contract.py
          tests/unit/test_alembic_revision_contract.py
          tests/unit/test_schema_adoption_contract.py

  portal:
    name: Portal build, i18n, offline, PWA, map, media, and staging contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - run: npm run test:field-intelligence
      - run: npm run test:field-intelligence-launch
      - run: npm run test:i18n
      - run: npm run build
