name: Apply Platform Product Experience Patch

on:
  pull_request:
    branches: ["main"]
    paths:
      - "scripts/apply_platform_product_experience_patch.py"
      - "scripts/reconcile_ui_literal_inventory.py"
      - ".github/workflows/apply-platform-product-experience-patch.yml"
  push:
    branches: ["feat/platform-product-discovery-console-v2"]
    paths:
      - "scripts/apply_platform_product_experience_patch.py"
      - "scripts/reconcile_ui_literal_inventory.py"
      - ".github/workflows/apply-platform-product-experience-patch.yml"

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/platform-product-discovery-console-v2
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json

      - name: Apply deterministic product patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 scripts/apply_platform_product_experience_patch.py 2>&1 | tee platform-product-patch.log
          python3 scripts/reconcile_ui_literal_inventory.py 2>&1 | tee -a platform-product-patch.log

      - name: Upload exact patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-product-patch-${{ github.sha }}
          path: platform-product-patch.log
          retention-days: 7

      - name: Enforce patch result
        if: steps.patch.outcome != 'success'
        run: |
          cat platform-product-patch.log
          exit 1

      - name: Validate bundled marketing Worker
        run: |
          set -o pipefail
          node cloudflare/platform-api-marketing-worker/tests/contract.mjs 2>&1 | tee worker-contract.log
          npx --yes wrangler@4.107.0 deploy --dry-run --config cloudflare/platform-api-marketing-worker/wrangler.toml 2>&1 | tee worker-dry-run.log

      - name: Install Portal dependencies
        working-directory: figma-enterprise-v4
        run: npm ci

      - name: Validate Portal localization
        id: portal-i18n
        continue-on-error: true
        working-directory: figma-enterprise-v4
        shell: bash
        run: |
          set -o pipefail
          npm run test:i18n 2>&1 | tee ../portal-i18n.log

      - name: Validate unified developer console contract
        id: portal-contract
        continue-on-error: true
        working-directory: figma-enterprise-v4
        shell: bash
        run: |
          set -o pipefail
          node tests/platform-api-console-contract.mjs 2>&1 | tee ../platform-console-contract.log

      - name: Build unified Portal product
        id: portal-build
        continue-on-error: true
        working-directory: figma-enterprise-v4
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../platform-console-build.log

      - name: Upload Portal validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-console-validation-${{ github.sha }}
          path: |
            portal-i18n.log
            platform-console-contract.log
            platform-console-build.log
          retention-days: 7

      - name: Enforce unified Portal validation
        if: steps.portal-i18n.outcome != 'success' || steps.portal-contract.outcome != 'success' || steps.portal-build.outcome != 'success'
        run: |
          cat portal-i18n.log || true
          cat platform-console-contract.log || true
          cat platform-console-build.log || true
          exit 1

      - name: Validate clean diff
        run: git diff --check

      - name: Commit validated product experience
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            index.html \
            platform-api \
            figma-enterprise-v4/src/app/components/MainLayout.tsx \
            figma-enterprise-v4/src/app/routes.tsx \
            figma-enterprise-v4/tests/platform-api-console-contract.mjs \
            shared/ui-literals.en.*.json
          if git diff --cached --quiet; then
            echo "Validated Platform product experience already applied"
          else
            git commit -m "Expose the unified Platform API product experience"
            git push origin HEAD:feat/platform-product-discovery-console-v2
          fi
