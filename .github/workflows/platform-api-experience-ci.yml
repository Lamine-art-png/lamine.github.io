name: Platform API Experience CI

# Quality gate for the standalone developer platform (platform-api/).
# Static site, no build step — we validate JavaScript syntax and run a
# stdlib-only structural/accessibility/link/secret check. Path-filtered so it
# only runs when the developer platform changes.

on:
  pull_request:
    branches: [main]
    paths:
      - "platform-api/**"
      - "_headers"
      - ".github/workflows/platform-api-experience-ci.yml"
  push:
    branches:
      - "feat/api-platform-experience"
    paths:
      - "platform-api/**"
      - "_headers"
      - ".github/workflows/platform-api-experience-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JavaScript syntax check
        run: |
          for f in platform-api/assets/*.js; do
            echo "node --check $f"
            node --check "$f"
          done

      - name: JSON spec parses
        run: node -e "JSON.parse(require('fs').readFileSync('platform-api/assets/openapi.json','utf8')); console.log('openapi.json OK')"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Structural, accessibility, link & secret validation
        run: python3 platform-api/tests/validate_platform.py
