name: Repair Field Intelligence Render Blueprint

on:
  push:
    branches:
      - ops/field-intelligence-staging-provision
    paths:
      - .github/workflows/fix-fi-render-blueprint.yml
  pull_request:
    branches:
      - feature/field-intelligence-launch
    paths:
      - .github/workflows/fix-fi-render-blueprint.yml

permissions:
  contents: write

jobs:
  repair-blueprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops/field-intelligence-staging-provision
          fetch-depth: 0
          token: ${{ github.token }}
      - name: Replace startup override and synchronize tested application SHA
        shell: bash
        env:
          APPLICATION_SHA: abecf34ba8fde3068be8c00cc5dd99d753f441df
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("render-field-intelligence-staging.yaml")
          text = path.read_text(encoding="utf-8")
          old = "dockerCommand: cd /app/agroai_api && ./start-production.sh"
          new = "dockerCommand: /bin/sh /app/agroai_api/start-production.sh"
          if old not in text and new not in text:
              raise SystemExit("unexpected Render startup command")
          text = text.replace(old, new, 1)
          sha = os.environ["APPLICATION_SHA"]
          text, count = re.subn(
              r"(\n\s*- key: GIT_SHA\n\s*value: )[0-9a-f]{40}",
              rf"\g<1>{sha}",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("GIT_SHA field not found")
          path.write_text(text, encoding="utf-8")
          PY
          grep -Fq 'dockerCommand: /bin/sh /app/agroai_api/start-production.sh' render-field-intelligence-staging.yaml
          grep -Fq "value: $APPLICATION_SHA" render-field-intelligence-staging.yaml
          ! grep -Fq 'dockerCommand: cd /app/agroai_api && ./start-production.sh' render-field-intelligence-staging.yaml
      - name: Commit repaired Blueprint source
        run: |
          set -euo pipefail
          git config user.name "agroai-operations-bot"
          git config user.email "operations-bot@agroai-pilot.com"
          git add render-field-intelligence-staging.yaml
          git commit -m "fix: use image-native Field Intelligence startup command"
          git push origin HEAD:ops/field-intelligence-staging-provision
