name: Local AI Origin

on:
  pull_request:
    paths:
      - 'cloudflare/ollama-compat/**'
      - 'wrangler.local-ai.toml'
      - '.github/workflows/local-ai-origin.yml'
  push:
    branches: [main]
    paths:
      - 'cloudflare/ollama-compat/**'
      - 'wrangler.local-ai.toml'
      - '.github/workflows/local-ai-origin.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npx --yes wrangler@4.107.0 deploy --dry-run --config wrangler.local-ai.toml

  deploy:
    if: github.event_name == 'push'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npx --yes wrangler@4.107.0 deploy --config wrangler.local-ai.toml
      - name: Smoke edge health
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 10 https://local-ai.agroai-pilot.com/health \
              | jq -e '.status == "ok" and .provider == "cloudflare-workers-ai"' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Edge health never became ready"
              exit 1
            fi
            sleep 5
          done
      - name: Smoke real edge inference
        run: |
          set -euo pipefail
          response="$(curl -fsS --max-time 40 \
            -H 'Content-Type: application/json' \
            -d '{"model":"edge-smoke","messages":[{"role":"user","content":"Reply exactly: EDGE_OK"}],"stream":false,"options":{"num_predict":30}}' \
            https://local-ai.agroai-pilot.com/api/chat)"
          echo "$response" | jq -e '
            .done == true and
            .provider == "cloudflare-workers-ai" and
            (.model | type == "string") and
            ((.message.content // .response // "") | length > 0)
          ' >/dev/null
          echo "$response" | jq '{provider, model, fallback_used, latency_ms, done}'
