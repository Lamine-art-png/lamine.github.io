name: Locale Browser Contract CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  locale-browser-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - name: Install portal and browser test dependencies
        run: |
          npm ci
          npm install --no-save --no-package-lock @playwright/test@1.55.0
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Validate localization contract
        run: |
          set -o pipefail
          npm run test:i18n 2>&1 | tee locale-i18n-contract.log
      - name: Build production portal
        run: |
          set -o pipefail
          npm run build 2>&1 | tee locale-production-build.log
      - name: Run global locale switching contracts
        run: |
          set -euo pipefail
          npx vite preview --host 127.0.0.1 --port 4173 > locale-vite-preview.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/settings >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat locale-vite-preview.log
              exit 1
            fi
            sleep 1
          done
          set +e
          npx playwright test \
            tests/browser/locale-migration.spec.mjs \
            tests/browser/locale-preference-sync.spec.mjs \
            tests/browser/global-language-switching.spec.mjs \
            --config=playwright.contract.config.ts --browser=chromium --reporter=line 2>&1 | tee locale-playwright.log
          status=${PIPESTATUS[0]}
          exit $status
      - name: Upload locale browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locale-browser-contract
          path: |
            figma-enterprise-v4/locale-i18n-contract.log
            figma-enterprise-v4/locale-production-build.log
            figma-enterprise-v4/locale-vite-preview.log
            figma-enterprise-v4/locale-playwright.log
            figma-enterprise-v4/test-results
          if-no-files-found: ignore
          retention-days: 2
