name: Field Intelligence Integration Runner

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/field-intelligence-integration-runner.yml
      - scripts/finish_field_intelligence_production_launch.py

permissions:
  contents: write

jobs:
  production-launch-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/field-intelligence-launch
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Apply the reviewed production launch patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "agroai-integration-bot"
          git config user.email "integration-bot@agroai-pilot.com"
          git fetch --quiet origin integration/field-intelligence-resolved-v2:refs/remotes/origin/integration/field-intelligence-resolved-v2
          git show origin/integration/field-intelligence-resolved-v2:scripts/finish_field_intelligence_production_launch.py > /tmp/finish_field_intelligence_production_launch.py
          python3 /tmp/finish_field_intelligence_production_launch.py
          git diff --check

      - name: Validate backend launch, rollout, provider, storage, and worker contracts
        working-directory: agroai_api
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -q -r requirements.txt pytest
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg
          python -m compileall -q app alembic scripts
          test "$(alembic heads)" = "027_field_intelligence_launch (head)"
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p no:debugging -q --tb=short \
            tests/unit/test_field_intelligence.py \
            tests/unit/test_field_intelligence_hardening.py \
            tests/unit/test_field_intelligence_launch.py \
            tests/unit/test_object_storage.py \
            tests/unit/test_production_readiness.py

      - name: Validate production portal capture and build contracts
        working-directory: figma-enterprise-v4
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run test:field-intelligence
          npm run test:field-intelligence-launch
          npm run test:i18n
          VITE_API_BASE_URL=https://api.agroai-pilot.com \
          VITE_DEPLOYMENT_ENVIRONMENT=production \
          VITE_BUILD_SHA="$(git rev-parse HEAD)" npm run build

      - name: Validate protected Workers AI edge bridge
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run check

      - name: Commit and push the tested production launch patch
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git add agroai_api/app/services/field_transcription.py \
                  agroai_api/app/services/production_readiness.py \
                  agroai_api/tests/unit/test_field_intelligence_launch.py
          git commit -m "Ship Field Intelligence internal production launch"
          git push origin HEAD:feature/field-intelligence-launch
