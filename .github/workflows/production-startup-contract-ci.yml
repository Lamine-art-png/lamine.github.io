name: Production Startup Contract CI

on:
  pull_request:
    paths:
      - 'agroai_api/Dockerfile'
      - 'agroai_api/start-production.sh'
      - 'agroai_api/verify-production-migration.sh'
      - 'agroai_api/app/services/release_migration.py'
      - 'agroai_api/alembic/**'
      - 'shared/**'
      - '.github/workflows/production-startup-contract-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  locked-migration-startup-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: agroai_startup_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: agroai_api
    env:
      DATABASE_URL: postgresql://postgres@127.0.0.1:5432/agroai_startup_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Validate production launcher shell
        run: sh -n start-production.sh
      - name: Execute locked production migration choreography
        run: sh verify-production-migration.sh
      - name: Prove exact persisted Alembic head
        run: |
          python scripts/deployment_db_preflight.py --output startup-preflight.json
          grep -q 'C_current_head' startup-preflight.json
      - name: Build the deployable API image
        run: |
          cd ..
          docker build --pull -f agroai_api/Dockerfile -t agroai-api-startup-contract .
      - name: Verify packaged repository runtime assets
        run: |
          docker run --rm --entrypoint /bin/sh agroai-api-startup-contract -c '
            set -eu
            test -s /app/shared/supported-locales.json
            test -s /app/shared/chatgpt-language-targets.json
            test -s /app/shared/ui-catalog.en.json
            test -s /app/shared/ui-commercial-boundary.en.json
            cd /app/agroai_api
            python -c "from app.main import app; assert app.title == \"AGRO-AI API\""
          '
      - name: Boot the exact image CMD against PostgreSQL
        run: |
          set -eu
          container_id="$(docker run -d --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e APP_ENV=staging \
            -e FIELD_INTELLIGENCE_WORKER_ENABLED=false \
            -e GIT_SHA="$GITHUB_SHA" \
            agroai-api-startup-contract)"
          cleanup() {
            docker logs "$container_id" || true
            docker rm -f "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          healthy=false
          for _attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8000/v1/health >/tmp/agroai-health.json; then
              healthy=true
              break
            fi
            if ! docker inspect -f '{{.State.Running}}' "$container_id" | grep -q true; then
              break
            fi
            sleep 2
          done
          test "$healthy" = true
          grep -q '"status"' /tmp/agroai-health.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: production-startup-contract-${{ github.sha }}
          path: agroai_api/startup-preflight.json
          retention-days: 14
