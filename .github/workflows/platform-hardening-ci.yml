name: Platform Hardening CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    uses: ./.github/workflows/hardening-backend-reusable.yml

  portal-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - run: npm run test:i18n
      - run: npm run build

  cloudflare-edge-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/edge-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npx wrangler deploy --dry-run --config ../../wrangler.toml

  cloudflare-queue-backend-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - run: >-
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q --tb=short
          tests/unit/test_cloudflare_task_queue.py
          tests/unit/test_cloudflare_queue_runtime.py
          tests/unit/test_cloudflare_queue_routes.py
          tests/unit/test_task_outbox.py
          tests/unit/test_production_readiness.py
