name: Platform Hardening CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    uses: ./.github/workflows/hardening-backend-reusable.yml

  portal-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - run: npm run test:i18n
      - run: npm run build
