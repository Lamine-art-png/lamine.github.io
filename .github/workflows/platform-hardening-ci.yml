name: Platform Hardening CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  identity-integrity:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: agroai_hardening_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: python -m pip install -q -r requirements.txt pytest
      - name: Compile identity and migrations
        run: |
          python -m py_compile alembic/versions/010_account_recovery.py
          python -m py_compile alembic/versions/011_operational_records_and_preferences.py
          python -m py_compile alembic/versions/012_connector_security_and_workers.py
          python -m py_compile alembic/versions/013_task_outbox.py
          python -m py_compile app/services/credential_recovery.py
          python -m py_compile app/services/password_policy.py
          python -m py_compile app/db/schema_contract.py
          python -m py_compile app/api/v1/recovery_v2.py
      - name: Run identity security regressions
        run: python -m pytest -q --tb=short tests/unit/test_credential_recovery.py
      - name: Enforce Alembic revision contract
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q --confcutdir=tests/unit tests/unit/test_alembic_revision_contract.py
      - name: Bootstrap PostgreSQL baseline
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/agroai_hardening_ci
        run: |
          python - <<'PY'
          from app.db.base import Base, engine
          from app.models.tenant import Tenant
          from app.models.block import Block
          Base.metadata.create_all(bind=engine, tables=[Tenant.__table__, Block.__table__])
          PY
      - name: Migrate and verify persisted hardening schema
        env:
          DATABASE_URL: postgresql://postgres@localhost:5432/agroai_hardening_ci
        run: |
          alembic upgrade head
          python - <<'PY'
          import os
          import sqlalchemy as sa
          engine = sa.create_engine(os.environ["DATABASE_URL"])
          inspector = sa.inspect(engine)
          tables = set(inspector.get_table_names())
          required = {
              "account_recovery_tokens", "user_preferences", "connector_connections",
              "data_sources", "ingestion_jobs", "evidence_records", "intelligence_runs",
              "generated_artifacts", "chat_conversations", "chat_messages",
              "oauth_state_nonces", "connector_credentials", "task_outbox",
          }
          missing = sorted(required - tables)
          assert not missing, f"persisted hardening schema missing tables: {missing}"
          assert "credentials_changed_at" in {item["name"] for item in inspector.get_columns("users")}
          assert {"content_sha256", "object_size_bytes"}.issubset({item["name"] for item in inspector.get_columns("data_sources")})
          assert {"idempotency_key", "attempt_count", "lease_expires_at"}.issubset({item["name"] for item in inspector.get_columns("ingestion_jobs")})
          assert {"provenance_json", "freshness_json"}.issubset({item["name"] for item in inspector.get_columns("intelligence_runs")})
          with engine.connect() as connection:
              revision = connection.execute(sa.text("SELECT version_num FROM alembic_version")).scalar_one()
          assert revision == "013_task_outbox", revision
          print(f"persisted hardening head verified: {revision}")
          PY

  connector-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Compile connector custody and worker plane
        run: |
          python -m py_compile app/services/oauth_state_store.py
          python -m py_compile app/services/connector_vault.py
          python -m py_compile app/services/object_storage.py
          python -m py_compile app/services/redis_task_queue.py
          python -m py_compile app/services/task_outbox_service.py
          python -m py_compile app/services/ingestion_job_runner.py
          python -m py_compile app/workers/connector_worker.py
          python -m py_compile app/api/v1/connector_oauth_secure.py
      - name: Run connector security and infrastructure contracts
        run: |
          python -m pytest -q --tb=short \
            tests/unit/test_oauth_state_store.py \
            tests/unit/test_connector_vault.py \
            tests/unit/test_object_storage.py \
            tests/unit/test_redis_task_queue.py

  schema-adoption:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Run partial-schema and migration contracts
        run: |
          python -m pytest -q --tb=short \
            tests/unit/test_schema_adoption_contract.py \
            tests/unit/test_runtime_schema_contract.py

  multilingual-intelligence:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Compile multilingual runtime
        run: |
          python -m py_compile app/services/language_registry.py
          python -m py_compile app/services/language.py
          python -m py_compile app/services/live_intelligence.py
      - name: Run multilingual contracts
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p no:debugging -q --tb=short \
            tests/unit/test_language_registry_contract.py \
            tests/unit/test_i18n_language_integration.py \
            tests/unit/test_operational_invariants.py \
            tests/unit/test_model_router_language_failure.py

  decision-safety:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Compile decision provenance boundary
        run: |
          python -m py_compile app/services/decision_safety.py
          python -m py_compile app/services/evidence_freshness.py
          python -m py_compile app/services/claim_provenance.py
          python -m py_compile app/api/v1/brain_safety.py
      - name: Run deterministic decision and provenance regressions
        run: |
          python -m pytest -q --tb=short \
            tests/unit/test_decision_safety.py \
            tests/unit/test_claim_provenance.py

  scale-readiness-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Compile readiness and streaming boundaries
        run: |
          python -m py_compile app/services/production_readiness.py
          python -m py_compile app/services/ingestion_stream.py
          python -m py_compile app/services/connector_ingestion_pipeline.py
          python -m py_compile app/api/v1/connector_stream_api.py
      - name: Run scale and bounded streaming contracts
        run: |
          python -m pytest -q --tb=short \
            tests/unit/test_production_readiness.py \
            tests/unit/test_ingestion_stream.py

  inherited-backend-gates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Run inherited backend regressions
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p no:debugging -q --tb=short \
            tests/unit/test_i18n_language_integration.py \
            tests/unit/test_operational_invariants.py \
            tests/unit/test_model_router_language_failure.py \
            tests/unit/test_telemetry_recommendations_migration.py

  portal-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - run: npm run test:i18n
      - run: npm run build

  recovery-browser-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - name: Install transient browser test runtime
        run: npm install --no-save --package-lock=false @playwright/test@1.52.0
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run recovery browser lifecycle
        run: npx playwright test tests/recovery.e2e.spec.ts
