name: Terraform Infra Deploy

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - "terraform/**"
      - ".github/workflows/infra-deploy.yml"
  push:
    branches: [ "main" ]
    paths:
      - "terraform/**"
      - ".github/workflows/infra-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    # ✅ This is the key fix for Secrets Manager error
    env:
      TF_VAR_openweather_api_key: ${{ secrets.OPENWEATHER_API_KEY }}
      TF_IN_AUTOMATION: "true"

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::292039821285:role/infra_deploy_role
          aws-region: us-west-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        run: terraform plan -input=false -no-color

      # ✅ Apply only on main (not on PRs)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: terraform apply -auto-approve -input=false -no-color
