name: Live Hotfix Proof

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/live-hotfix-proof.yml']

permissions:
  actions: read
  contents: read

jobs:
  prove:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      EXPECTED_SHA: 744f5f2228aa2c3c7ba95fd57e728c77cff50fdc
      PORTAL_URL: https://app.agroai-pilot.com
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Wait for exact production release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p proof
          url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/runs?event=push&branch=main&per_page=50"
          for i in $(seq 1 120); do
            curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$url" > proof/runs.json
            jq --arg sha "$EXPECTED_SHA" '[.workflow_runs[]|select(.head_sha==$sha)]|sort_by(.created_at)|reverse|.[0]//null' proof/runs.json > proof/release.json
            status="$(jq -r '.status//"missing"' proof/release.json)"
            conclusion="$(jq -r '.conclusion//"pending"' proof/release.json)"
            echo "$i $status $conclusion"
            if [ "$status" = completed ] && [ "$conclusion" = success ]; then break; fi
            if [ "$status" = completed ] && [ "$conclusion" != success ]; then exit 1; fi
            sleep 15
          done
          jq -e '.status=="completed" and .conclusion=="success" and .head_sha==env.EXPECTED_SHA' proof/release.json >/dev/null
          jq -r '.id' proof/release.json > proof/run-id.txt
      - name: Prove release jobs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          id="$(cat proof/run-id.txt)"
          curl -fsS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${id}/jobs?per_page=100" > proof/jobs.json
          for name in "Validate release candidate" "Deploy API edge and queues" "Deploy enterprise portal" "Record release evidence"; do
            jq -e --arg n "$name" '[.jobs[]|select(.name==$n and .conclusion=="success")]|length==1' proof/jobs.json >/dev/null
          done
      - name: Prove live health and languages
        run: |
          set -euo pipefail
          curl -fsS "${PORTAL_URL}/v1/edge-health" > proof/edge.json
          curl -fsS "${PORTAL_URL}/v1/health" > proof/health.json
          curl -fsS "${PORTAL_URL}/v1/readiness" > proof/readiness.json
          curl -fsS "${PORTAL_URL}/v1/i18n/languages" > proof/languages.json
          jq -e '.status=="ok"' proof/edge.json >/dev/null
          jq -e '.status=="ok"' proof/health.json >/dev/null
          jq -e '.status=="ready" and .production.ready==true and (.production.blockers|length==0)' proof/readiness.json >/dev/null
          jq -e '.status=="ok" and .count>=61' proof/languages.json >/dev/null
      - name: Prove exact Cloudflare deployment
        run: |
          set -euo pipefail
          base="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/agroai-portal"
          curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$base/deployments?per_page=25" > proof/cf.json
          jq -e --arg sha "$EXPECTED_SHA" '[.result[]|select(.environment=="production" and .latest_stage.status=="success" and .deployment_trigger.metadata.commit_hash==$sha)]|length>=1' proof/cf.json >/dev/null
          jq -e '[.result[]|select(.environment=="preview" and .latest_stage.status=="active")]|length==0' proof/cf.json >/dev/null
      - name: Prove live bundle
        run: |
          set -euo pipefail
          mkdir -p proof/assets
          curl -fsSL "${PORTAL_URL}/" > proof/index.html
          grep -oE '/assets/[A-Za-z0-9._/-]+\.js' proof/index.html | sed 's#^/##' > proof/queue.txt
          : > proof/seen.txt
          for pass in 1 2 3 4; do
            sort -u proof/queue.txt -o proof/queue.txt
            while IFS= read -r a; do
              [ -n "$a" ] || continue
              grep -Fx "$a" proof/seen.txt >/dev/null 2>&1 && continue
              echo "$a" >> proof/seen.txt
              f="proof/assets/$(basename "$a")"
              curl -fsS "${PORTAL_URL}/${a}" > "$f"
              grep -oE 'assets/[A-Za-z0-9._/-]+\.js' "$f" >> proof/queue.txt || true
              grep -oE '\./[A-Za-z0-9._/-]+\.js' "$f" | sed 's#^\./#assets/#' >> proof/queue.txt || true
            done < proof/queue.txt
          done
          cat proof/assets/*.js > proof/all-js.txt
          grep -F 'agroai_ui_catalog_v4:' proof/all-js.txt >/dev/null
          grep -F '/v1/i18n/catalog' proof/all-js.txt >/dev/null
          grep -F 'العربية' proof/all-js.txt >/dev/null
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-hotfix-proof
          path: proof
          retention-days: 7
