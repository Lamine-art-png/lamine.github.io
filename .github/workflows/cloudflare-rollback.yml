name: Cloudflare Emergency Rollback

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type ROLLBACK to authorize production rollback
        required: true
        type: string
      worker_version_id:
        description: Optional Worker version ID to restore
        required: false
        type: string
      pages_deployment_id:
        description: Optional successful production Pages deployment ID to restore
        required: false
        type: string
      reason:
        description: Incident or rollback reason
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

env:
  API_URL: https://api.agroai-pilot.com
  PORTAL_URL: https://app.agroai-pilot.com
  PORTAL_PROJECT: agroai-portal

jobs:
  authorize:
    runs-on: ubuntu-latest
    outputs:
      worker_requested: ${{ steps.validate.outputs.worker_requested }}
      pages_requested: ${{ steps.validate.outputs.pages_requested }}
    steps:
      - id: validate
        shell: bash
        env:
          CONFIRM: ${{ inputs.confirm }}
          WORKER_VERSION_ID: ${{ inputs.worker_version_id }}
          PAGES_DEPLOYMENT_ID: ${{ inputs.pages_deployment_id }}
        run: |
          set -euo pipefail
          test "$CONFIRM" = "ROLLBACK" || { echo "Rollback confirmation mismatch"; exit 1; }
          if [ -z "$WORKER_VERSION_ID" ] && [ -z "$PAGES_DEPLOYMENT_ID" ]; then
            echo "At least one rollback target is required"
            exit 1
          fi
          if [ -n "$WORKER_VERSION_ID" ]; then echo "worker_requested=true" >> "$GITHUB_OUTPUT"; else echo "worker_requested=false" >> "$GITHUB_OUTPUT"; fi
          if [ -n "$PAGES_DEPLOYMENT_ID" ]; then echo "pages_requested=true" >> "$GITHUB_OUTPUT"; else echo "pages_requested=false" >> "$GITHUB_OUTPUT"; fi

  rollback-worker:
    needs: authorize
    if: needs.authorize.outputs.worker_requested == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
      WORKER_VERSION_ID: ${{ inputs.worker_version_id }}
      ROLLBACK_REASON: ${{ inputs.reason }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fail closed on missing rollback credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          test -n "${QUEUE_CONSUMER_TOKEN:-}"
          test -n "${WORKER_VERSION_ID:-}"
      - name: Install pinned edge tooling
        working-directory: cloudflare/edge-gateway
        run: npm install --no-audit --no-fund
      - name: Roll back Worker to explicit version
        working-directory: cloudflare/edge-gateway
        run: >-
          npx wrangler rollback "$WORKER_VERSION_ID"
          --name agroai-api-edge
          --config ../../wrangler.toml
          --message "${ROLLBACK_REASON} (GitHub run ${GITHUB_RUN_ID})"
          --yes
      - name: Smoke rolled-back edge, proxy, and backend contract
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            edge_ok=false
            proxy_ok=false
            contract_ok=false
            if curl --fail --silent --show-error --max-time 15 "${API_URL}/v1/edge-health" | jq -e '.status == "ok"' >/dev/null 2>&1; then
              edge_ok=true
            fi
            if curl --fail --silent --show-error --max-time 20 "${API_URL}/v1/health" | jq -e '.status == "ok"' >/dev/null 2>&1; then
              proxy_ok=true
            fi
            if curl --fail --silent --show-error --max-time 20 \
              -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN}" \
              "${API_URL}/v1/internal/release/health" | \
              jq -e '.status == "ok" and .contract == "agroai-release-v1" and .schema_current == true and .queue_configured == true and .object_storage_reachable == true and .production_ready == true' \
              >/dev/null 2>&1; then
              contract_ok=true
            fi
            if [ "$edge_ok" = true ] && [ "$proxy_ok" = true ] && [ "$contract_ok" = true ]; then
              exit 0
            fi
            sleep 3
          done
          echo "Worker rollback smoke contract failed"
          exit 1

  rollback-pages:
    needs: authorize
    if: needs.authorize.outputs.pages_requested == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PAGES_DEPLOYMENT_ID: ${{ inputs.pages_deployment_id }}
    steps:
      - name: Fail closed on missing Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          test -n "${PAGES_DEPLOYMENT_ID:-}"
      - name: Roll back Pages to explicit successful production deployment
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/${PORTAL_PROJECT}/deployments/${PAGES_DEPLOYMENT_ID}/rollback")"
          printf '%s' "$response" | jq -e '.success == true and .result.id != null' >/dev/null
          printf '%s' "$response" > pages-rollback-response.json
      - name: Smoke rolled-back portal
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --location --max-time 20 "${PORTAL_URL}" >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Pages rollback smoke check failed"
          exit 1
      - uses: actions/upload-artifact@v4
        with:
          name: pages-rollback-response-${{ github.run_id }}
          path: pages-rollback-response.json
          retention-days: 30

  evidence:
    needs: [authorize, rollback-worker, rollback-pages]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Record immutable rollback evidence
        env:
          WORKER_RESULT: ${{ needs.rollback-worker.result }}
          PAGES_RESULT: ${{ needs.rollback-pages.result }}
          WORKER_VERSION_ID: ${{ inputs.worker_version_id }}
          PAGES_DEPLOYMENT_ID: ${{ inputs.pages_deployment_id }}
          ROLLBACK_REASON: ${{ inputs.reason }}
        run: |
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "actor=${GITHUB_ACTOR}"
            echo "reason=${ROLLBACK_REASON}"
            echo "worker_version_id=${WORKER_VERSION_ID}"
            echo "worker_result=${WORKER_RESULT}"
            echo "pages_deployment_id=${PAGES_DEPLOYMENT_ID}"
            echo "pages_result=${PAGES_RESULT}"
          } | tee rollback-evidence.txt
      - uses: actions/upload-artifact@v4
        with:
          name: cloudflare-rollback-evidence-${{ github.run_id }}
          path: rollback-evidence.txt
          retention-days: 90
