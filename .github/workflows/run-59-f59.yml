name: Run 59 F59

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/run-59-f59.yml']

permissions:
  contents: read

jobs:
  matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
      API_URL: https://app.agroai-pilot.com
      I18N_MATRIX_WORKERS: '3'
      I18N_MATRIX_ATTEMPTS: '4'
      I18N_MATRIX_TIMEOUT_SECONDS: '60'
      I18N_MATRIX_OUTPUT_DIR: i18n-matrix
    steps:
      - uses: actions/checkout@v4
      - name: Verify 59 locales
        run: python agroai_api/scripts/verify_production_i18n_matrix_v2.py
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: matrix-f59-${{ github.sha }}
          path: i18n-matrix
          if-no-files-found: error
          retention-days: 30
