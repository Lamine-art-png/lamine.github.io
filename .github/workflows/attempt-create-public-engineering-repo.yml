name: Attempt create AGRO-AI public engineering repository

on:
  pull_request:
    paths:
      - ".github/workflows/attempt-create-public-engineering-repo.yml"

permissions:
  contents: write

jobs:
  create-repository:
    runs-on: ubuntu-latest
    steps:
      - name: Attempt repository creation with repository-scoped token
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload='{"name":"agro-ai-public-engineering","description":"Public-safe engineering documentation and synthetic reference examples from AGRO-AI.","private":false,"auto_init":true,"has_issues":false,"has_projects":false,"has_wiki":false}'
          status="$(curl -sS -o response.json -w '%{http_code}' \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/repos \
            -d "$payload")"
          cat response.json
          if [ "$status" = "201" ]; then
            echo "repository_created=true"
            exit 0
          fi
          if [ "$status" = "422" ] && grep -F 'name already exists' response.json >/dev/null; then
            echo "repository_already_exists=true"
            exit 0
          fi
          echo "repository_creation_status=$status"
          exit 1
