name: Release Run Inspector 2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release-run-inspector-2.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect latest production workflow and failed deploy tail
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --repo "${GITHUB_REPOSITORY}" --workflow deploy.yml --limit 4 \
            --json databaseId,headSha,status,conclusion,event,createdAt,updatedAt,url
          echo '--- failed deploy log tail ---'
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/85322662374/logs" > deploy.log
          tail -n 140 deploy.log
