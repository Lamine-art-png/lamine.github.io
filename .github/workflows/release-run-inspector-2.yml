name: Release Run Inspector 2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release-run-inspector-2.yml'

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: List latest production workflow runs
        shell: bash
        run: |
          set -euo pipefail
          echo "inspection_refresh=2"
          curl -fsSL "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/runs?per_page=8" \
            | jq '{runs: [.workflow_runs[] | {id,head_sha,status,conclusion,event,created_at,updated_at,html_url}]}'
