name: Release Run Inspector 2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release-run-inspector-2.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Show edge deploy job error lines
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run view 28776717405 --repo "${GITHUB_REPOSITORY}" --job 85322662374 --log | tail -n 35
