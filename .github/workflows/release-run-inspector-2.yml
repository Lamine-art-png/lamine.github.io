name: Release Run Inspector 2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release-run-inspector-2.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: List latest production workflow runs
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "inspection_refresh=4"
          gh run list --repo "${GITHUB_REPOSITORY}" --workflow deploy.yml --limit 8 \
            --json databaseId,headSha,status,conclusion,event,createdAt,updatedAt,url
