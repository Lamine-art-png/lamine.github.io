name: Release Run Inspector 2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release-run-inspector-2.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect current production release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --repo "${GITHUB_REPOSITORY}" --workflow deploy.yml --limit 5 --json databaseId,headSha,status,conclusion,event,createdAt,updatedAt,url
