name: Release Run Inspector 2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/release-run-inspector-2.yml'

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Cloudflare deploy failure
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/85322662374/logs" > deploy.log
          grep -i -E -C 4 'error|failed|custom.domain|route|wrangler|10000|authentication|conflict|already exists' deploy.log | tail -n 180 || true
