name: One-time Edge Install Mode Hardener

on:
  push:
    branches: ["platform-production-hardening"]
    paths:
      - ".github/workflows/edge-install-mode-hardener.yml"

permissions:
  contents: write

jobs:
  harden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: platform-production-hardening
          fetch-depth: 0
      - name: Require lockfile installs in production workflows
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          targets = [
              Path('.github/workflows/deploy.yml'),
              Path('.github/workflows/cloudflare-rollback.yml'),
          ]
          for path in targets:
              text = path.read_text()
              old = 'npm install --no-audit --no-fund'
              if old not in text:
                  raise SystemExit(f'expected install command missing in {path}')
              path.write_text(text.replace(old, 'npm ci --no-audit --no-fund'))
          PY
          git diff --check
          grep -q 'npm ci --no-audit --no-fund' .github/workflows/deploy.yml
          grep -q 'npm ci --no-audit --no-fund' .github/workflows/cloudflare-rollback.yml
          ! grep -q 'npm install --no-audit --no-fund' .github/workflows/deploy.yml
          ! grep -q 'npm install --no-audit --no-fund' .github/workflows/cloudflare-rollback.yml
      - name: Commit exact install-mode hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "agroai-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add .github/workflows/deploy.yml .github/workflows/cloudflare-rollback.yml
          git commit -m "Enforce locked edge installs in release workflows"
          git push origin HEAD:platform-production-hardening
