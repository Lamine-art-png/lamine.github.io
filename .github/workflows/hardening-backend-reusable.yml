name: Hardening Backend Reusable

on:
  workflow_call:

jobs:
  backend-postgres-and-unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: agroai_hardening_ci
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Install ffmpeg (Field Intelligence bounded media verification)
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
      - name: Compile backend and migration tree
        run: python -m compileall -q app alembic scripts
      - name: Enforce revision graph contract
        run: |
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q --confcutdir=tests/unit tests/unit/test_alembic_revision_contract.py
          test "$(alembic heads)" = "027_field_intelligence_launch (head)"
      - name: Migrate real PostgreSQL to repository head
        env:
          DATABASE_URL: postgresql://postgres@127.0.0.1:5432/agroai_hardening_ci
        run: alembic upgrade head
      - name: Prove persisted revision equals repository head
        env:
          DATABASE_URL: postgresql://postgres@127.0.0.1:5432/agroai_hardening_ci
        run: |
          python - <<'PY'
          import os
          import sqlalchemy as sa
          from alembic.config import Config
          from alembic.script import ScriptDirectory
          cfg = Config("alembic.ini")
          heads = sorted(ScriptDirectory.from_config(cfg).get_heads())
          engine = sa.create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as connection:
              versions = sorted(row[0] for row in connection.execute(sa.text("SELECT version_num FROM alembic_version")))
          assert versions == heads, {"persisted": versions, "repository": heads}
          print({"persisted_heads": versions})
          PY
      - name: Prove PostgreSQL idempotency concurrency with independent sessions
        env:
          PLATFORM_API_POSTGRES_TEST_URL: postgresql://postgres@127.0.0.1:5432/agroai_hardening_ci
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q tests/integration/test_platform_api_idempotency_postgres.py
      - name: Prove quota and delivery outbox concurrency with independent sessions
        env:
          PLATFORM_API_POSTGRES_TEST_URL: postgresql://postgres@127.0.0.1:5432/agroai_hardening_ci
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q tests/integration/test_platform_api_product_concurrency_postgres.py
      - name: Run complete backend unit suite
        id: backend_unit_suite
        shell: bash
        run: |
          set +e
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p no:debugging -q --tb=short tests/unit 2>&1 | tee backend-unit-output.txt
          suite_status=${PIPESTATUS[0]}
          echo "status=${suite_status}" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Preserve backend unit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-unit-output
          path: agroai_api/backend-unit-output.txt
          if-no-files-found: error
          retention-days: 7
      - name: Enforce backend unit result
        if: steps.backend_unit_suite.outputs.status != '0'
        run: exit 1
