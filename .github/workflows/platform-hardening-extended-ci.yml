name: Platform Hardening Extended CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  connector-worker-contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Compile worker and connector security modules
        run: |
          python -m py_compile app/services/oauth_state_store.py
          python -m py_compile app/services/connector_vault.py
          python -m py_compile app/services/object_storage.py
          python -m py_compile app/services/redis_task_queue.py
          python -m py_compile app/services/task_outbox_service.py
          python -m py_compile app/services/ingestion_job_runner.py
          python -m py_compile app/workers/connector_worker.py
          python -m py_compile app/api/v1/connector_stream_api.py
      - name: Run worker and connector contracts
        run: |
          python -m pytest -q --tb=short \
            tests/unit/test_connector_secure_routes.py \
            tests/unit/test_distributed_ingestion_route.py \
            tests/unit/test_task_outbox.py \
            tests/unit/test_ingestion_job_leases.py

  scale-contract-split:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Run readiness contracts
        run: python -m pytest -q --tb=short tests/unit/test_production_readiness.py
      - name: Run stream contracts
        run: python -m pytest -q --tb=short tests/unit/test_ingestion_stream.py

  backend-unit-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -q -r requirements.txt pytest
      - name: Run complete backend unit suite
        run: PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -p no:debugging -q --tb=short tests/unit
