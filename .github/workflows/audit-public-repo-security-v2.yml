name: Audit Public Repository Security V2

on:
  pull_request:
    paths:
      - ".github/workflows/audit-public-repo-security-v2.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan all reachable Git history for high-confidence credentials
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import io
          import re
          import subprocess
          from collections import Counter

          patterns = {
              "aws_access_key": re.compile(rb"\b(?:AKIA|ASIA)[A-Z0-9]{16}\b"),
              "google_api_key": re.compile(rb"\bAIza[0-9A-Za-z_-]{35}\b"),
              "github_token": re.compile(rb"\bgh[pousr]_[A-Za-z0-9_]{20,}\b"),
              "stripe_secret": re.compile(rb"\bsk_(?:live|test)_[0-9A-Za-z]{16,}\b"),
              "slack_token": re.compile(rb"\bxox[baprs]-[0-9A-Za-z-]{20,}\b"),
              "private_key": re.compile(rb"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"),
              "openai_style_key": re.compile(rb"\bsk-[A-Za-z0-9_-]{24,}\b"),
              "openrouter_key": re.compile(rb"\bsk-or-v1-[A-Za-z0-9]{32,}\b"),
              "generic_32_hex_provider_key": re.compile(rb"(?i)(?:api[_-]?key|token)[^\n\r]{0,80}[\"'=:\s]([a-f0-9]{32})\b"),
          }

          raw = subprocess.check_output(["git", "rev-list", "--objects", "--all"], text=True, errors="replace")
          path_by_sha = {}
          for line in raw.splitlines():
              parts = line.split(" ", 1)
              if parts:
                  path_by_sha.setdefault(parts[0], parts[1] if len(parts) > 1 else "<unknown>")
          shas = list(path_by_sha)

          checked = subprocess.run(
              ["git", "cat-file", "--batch-check=%(objectname) %(objecttype) %(objectsize)"],
              input=("\n".join(shas) + "\n").encode(),
              stdout=subprocess.PIPE,
              check=True,
          ).stdout.decode(errors="replace")
          eligible = []
          for line in checked.splitlines():
              parts = line.split()
              if len(parts) == 3 and parts[1] == "blob" and int(parts[2]) <= 2_000_000:
                  eligible.append(parts[0])

          findings = []
          chunk_size = 20
          for start in range(0, len(eligible), chunk_size):
              chunk = eligible[start:start + chunk_size]
              payload = subprocess.run(
                  ["git", "cat-file", "--batch"],
                  input=("\n".join(chunk) + "\n").encode(),
                  stdout=subprocess.PIPE,
                  check=True,
              ).stdout
              stream = io.BytesIO(payload)
              for expected_sha in chunk:
                  header = stream.readline().decode(errors="replace").strip().split()
                  if len(header) < 3 or header[1] != "blob":
                      continue
                  size = int(header[2])
                  data = stream.read(size)
                  stream.read(1)
                  for name, pattern in patterns.items():
                      if pattern.search(data):
                          findings.append((name, path_by_sha.get(expected_sha, "<unknown>"), expected_sha))

          unique = sorted(set(findings))
          print(f"HISTORY_OBJECTS_SCANNED={len(eligible)}")
          print(f"HISTORY_HIGH_CONFIDENCE_COUNT={len(unique)}")
          counts = Counter(name for name, _, _ in unique)
          for name, count in sorted(counts.items()):
              print(f"HISTORY_RULE {name} {count}")
          for name, path, sha in unique[:150]:
              print(f"HISTORY_FINDING {name} path={path} blob={sha[:12]}")
          if len(unique) > 150:
              print(f"HISTORY_FINDINGS_TRUNCATED={len(unique)-150}")
          PY

      - name: Inventory current public product source and internal material
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          roots = ["agroai_api", "terraform", "cloudflare", "agroai-cloudflare-worker", "apps", "figma-enterprise-v4", "docs", ".github/workflows"]
          code_exts = {".py", ".ts", ".tsx", ".js", ".jsx", ".tf", ".sql", ".sh", ".yml", ".yaml"}
          docs_exts = {".md", ".txt", ".html"}
          total = code = docs = 0
          for root in roots:
              p = Path(root)
              if not p.exists():
                  continue
              files = [f for f in p.rglob("*") if f.is_file()]
              root_code = sum(f.suffix.lower() in code_exts for f in files)
              root_docs = sum(f.suffix.lower() in docs_exts for f in files)
              print(f"EXPOSED_ROOT {root} files={len(files)} code={root_code} docs={root_docs}")
              total += len(files); code += root_code; docs += root_docs
          print(f"EXPOSED_TOTAL files={total} code={code} docs={docs}")

          categories = {
              "customer_or_agency_names": ["Manulife", "PGIM", "Fox Canyon", "Upper Republican", "URNRD", "Gladstone", "Waterford"],
              "integration_partners": ["John Deere", "WiseConn", "Talgil", "OpenET", "Salesforce", "Dropbox", "Microsoft", "Google"],
              "internal_delivery_language": ["PILOT-READY", "delivery summary", "pilot playbook", "Codex", "Claude instructions", "runtime diagnosis"],
          }
          readable = [f for root in roots for f in Path(root).rglob("*") if f.is_file() and f.stat().st_size < 2_000_000]
          for category, terms in categories.items():
              paths = set()
              for f in readable:
                  try:
                      text = f.read_text(encoding="utf-8", errors="ignore")
                  except Exception:
                      continue
                  if any(term.lower() in text.lower() for term in terms):
                      paths.add(str(f))
              print(f"SENSITIVE_CATEGORY {category} files={len(paths)}")
              for path in sorted(paths)[:60]:
                  print(f"SENSITIVE_PATH {category} {path}")
              if len(paths) > 60:
                  print(f"SENSITIVE_PATHS_TRUNCATED {category} {len(paths)-60}")
          PY

      - name: Check current tree for high-confidence credential prefixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path
          patterns = {
              "aws_access_key": re.compile(r"\b(?:AKIA|ASIA)[A-Z0-9]{16}\b"),
              "google_api_key": re.compile(r"\bAIza[0-9A-Za-z_-]{35}\b"),
              "github_token": re.compile(r"\bgh[pousr]_[A-Za-z0-9_]{20,}\b"),
              "stripe_secret": re.compile(r"\bsk_(?:live|test)_[0-9A-Za-z]{16,}\b"),
              "slack_token": re.compile(r"\bxox[baprs]-[0-9A-Za-z-]{20,}\b"),
              "private_key": re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"),
              "openai_style_key": re.compile(r"\bsk-[A-Za-z0-9_-]{24,}\b"),
              "openrouter_key": re.compile(r"\bsk-or-v1-[A-Za-z0-9]{32,}\b"),
              "generic_32_hex_provider_key": re.compile(r"(?i)(?:api[_-]?key|token)[^\n\r]{0,80}[\"'=:\s]([a-f0-9]{32})\b"),
          }
          ignored = {".git", "node_modules", "dist", "build", ".venv", "venv"}
          findings = []
          for f in Path('.').rglob('*'):
              if not f.is_file() or any(part in ignored for part in f.parts) or f.stat().st_size > 2_000_000:
                  continue
              try:
                  text = f.read_text(encoding='utf-8', errors='ignore')
              except Exception:
                  continue
              for name, pattern in patterns.items():
                  if pattern.search(text):
                      findings.append((name, str(f)))
          unique = sorted(set(findings))
          print(f"HIGH_CONFIDENCE_CURRENT_COUNT={len(unique)}")
          for name, path in unique:
              print(f"HIGH_CONFIDENCE_CURRENT {name} {path}")
          PY
