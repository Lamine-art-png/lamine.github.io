name: Platform API Literal Catalog Refresh

# Branch-only generation aid for the Platform API product build. The generated
# catalog is committed back to this feature branch, then the normal i18n
# inventory remains the authority. The bot-authored follow-up push is skipped,
# preventing a workflow loop. This workflow is removed before merge.
on:
  push:
    branches: [feat/api-platform-experience-v2]
    paths:
      - "figma-enterprise-v4/src/app/components/PlatformApplicationGate.tsx"
      - "figma-enterprise-v4/src/app/components/PlatformConsole.tsx"
      - "figma-enterprise-v4/src/app/components/PlatformSafetyNotice.tsx"
      - "figma-enterprise-v4/src/app/components/AuthScreen.tsx"
      - "figma-enterprise-v4/scripts/check_ui_literal_inventory.py"
      - ".github/workflows/platform-api-literal-catalog-refresh.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: platform-api-literal-catalog-refresh
  cancel-in-progress: true

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/api-platform-experience-v2
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate the exact missing literal catalog part
        working-directory: figma-enterprise-v4
        run: python3 scripts/check_ui_literal_inventory.py --write-delta shared/ui-literals.en.9.json
      - name: Verify the complete catalog
        working-directory: figma-enterprise-v4
        run: python3 scripts/check_ui_literal_inventory.py --check
      - name: Commit generated catalog when source changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- shared/ui-literals.en.9.json; then
            echo "Literal catalog is already current."
            exit 0
          fi
          git config user.name "agroai-localization-bot"
          git config user.email "localization-bot@agroai-pilot.com"
          git add shared/ui-literals.en.9.json
          git commit -m "i18n(platform-api): refresh generated UI literal catalog"
          git push origin HEAD:feat/api-platform-experience-v2
