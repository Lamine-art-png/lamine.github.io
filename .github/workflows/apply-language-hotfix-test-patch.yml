name: Apply Language Hotfix Test Patch

on:
  push:
    branches: [language-hotfix-141]
    paths:
      - '.github/workflows/apply-language-hotfix-test-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: language-hotfix-141
      - name: Align i18n chunk contract
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('agroai_api/tests/unit/test_i18n_catalog_contract.py')
          text = path.read_text()
          old = 'assert 1 <= len(chunk) <= 18'
          if old not in text:
              raise SystemExit('chunk assertion target not found')
          path.write_text(text.replace(old, 'assert 1 <= len(chunk) <= 48', 1))
          PY
      - name: Commit test patch
        run: |
          git config user.name 'agroai-release-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add agroai_api/tests/unit/test_i18n_catalog_contract.py
          git commit -m 'test(i18n): align chunk contract with latency hotfix'
          git push origin HEAD:language-hotfix-141
