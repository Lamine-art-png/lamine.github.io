name: Apply GLM Output Shape Fix

on:
  push:
    branches: [ai-origin-repair]
    paths: ['.github/workflows/apply-glm-output-shape-fix.yml']

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ai-origin-repair
      - run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('cloudflare/ollama-compat/src/index.js')
          s = p.read_text()
          old = 'result?.response ?? result?.result?.response ?? ""'
          new = 'result?.response ?? result?.result?.response ?? result?.choices?.[0]?.message?.content ?? ""'
          if old not in s: raise SystemExit('target missing')
          p.write_text(s.replace(old, new, 1))
          PY
          rm .github/workflows/apply-glm-output-shape-fix.yml
          git config user.name agroai-release-bot
          git config user.email actions@users.noreply.github.com
          git add -A
          git commit -m 'fix(ai): support GLM Workers AI response schema'
          git push origin HEAD:ai-origin-repair
