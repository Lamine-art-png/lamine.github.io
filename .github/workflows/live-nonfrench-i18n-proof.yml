name: Live Non-French I18n Proof

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/live-nonfrench-i18n-proof.yml'

permissions:
  actions: read
  contents: read

jobs:
  prove:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      EXPECTED_SHA: 8efa71b410b0f253fd39259dac70e7d4fa2b80d8
      PORTAL_URL: https://app.agroai-pilot.com
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Wait for exact production release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p proof
          url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/runs?event=push&branch=main&per_page=50"
          for attempt in $(seq 1 120); do
            curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$url" > proof/runs.json
            jq --arg sha "$EXPECTED_SHA" '
              [.workflow_runs[] | select(.head_sha == $sha)]
              | sort_by(.created_at) | reverse | .[0] // null
            ' proof/runs.json > proof/release.json
            status="$(jq -r '.status // "missing"' proof/release.json)"
            conclusion="$(jq -r '.conclusion // "pending"' proof/release.json)"
            echo "attempt=${attempt} status=${status} conclusion=${conclusion}"
            if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then break; fi
            if [ "$status" = "completed" ] && [ "$conclusion" != "success" ]; then cat proof/release.json; exit 1; fi
            sleep 15
          done
          jq -e '.status == "completed" and .conclusion == "success" and .head_sha == env.EXPECTED_SHA' proof/release.json >/dev/null
          jq -r '.id' proof/release.json > proof/run-id.txt
          jq '{id,name,status,conclusion,head_sha,created_at,updated_at,html_url}' proof/release.json

      - name: Prove every production release job succeeded
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          run_id="$(cat proof/run-id.txt)"
          curl -fsS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" > proof/jobs.json
          for job in "Validate release candidate" "Deploy API edge and queues" "Deploy enterprise portal" "Record release evidence"; do
            jq -e --arg name "$job" '[.jobs[] | select(.name == $name and .status == "completed" and .conclusion == "success")] | length == 1' proof/jobs.json >/dev/null
          done
          jq '[.jobs[] | {name,status,conclusion}]' proof/jobs.json

      - name: Prove live backend exact SHA readiness and AI runtime
        shell: bash
        run: |
          set -euo pipefail
          test -n "${QUEUE_CONSUMER_TOKEN:-}"
          curl -fsS "${PORTAL_URL}/v1/edge-health" > proof/edge.json
          curl -fsS "${PORTAL_URL}/v1/health" > proof/health.json
          curl -fsS "${PORTAL_URL}/v1/readiness" > proof/readiness.json
          curl -fsS "${PORTAL_URL}/v1/i18n/languages" > proof/languages.json
          curl -fsS "${PORTAL_URL}/v1/runtime/ai-status" > proof/ai-status.json
          curl -fsS \
            -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN}" \
            "${PORTAL_URL}/v1/internal/release/health" > proof/release-health.json
          jq -e '.status == "ok"' proof/edge.json >/dev/null
          jq -e '.status == "ok"' proof/health.json >/dev/null
          jq -e '.status == "ready" and .schema.ready == true and .production.ready == true and (.production.blockers | length == 0)' proof/readiness.json >/dev/null
          jq -e '.status == "ok" and .count >= 61 and ([.languages[].code] | index("de") != null) and ([.languages[].code] | index("es") != null) and ([.languages[].code] | index("ar") != null) and ([.languages[].code] | index("ja") != null)' proof/languages.json >/dev/null
          jq -e '.status == "ok" and .configured == true and .mode != "offline" and (.missing_env | length == 0)' proof/ai-status.json >/dev/null
          jq -e --arg sha "$EXPECTED_SHA" '.status == "ok" and .build_sha == $sha and .schema_current == true and .production_ready == true' proof/release-health.json >/dev/null
          jq '{configured,provider,mode,selected_model,missing_env,profiles}' proof/ai-status.json

      - name: Prove exact Cloudflare production deployment and no queue backlog
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          base="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/agroai-portal"
          curl -fsS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "$base/deployments?per_page=25" > proof/cf.json
          jq -e --arg sha "$EXPECTED_SHA" '[.result[] | select(.environment == "production" and .latest_stage.status == "success" and .deployment_trigger.metadata.commit_hash == $sha)] | length >= 1' proof/cf.json >/dev/null
          jq -e '[.result[] | select(.environment == "preview" and .latest_stage.status == "active")] | length == 0' proof/cf.json >/dev/null
          jq --arg sha "$EXPECTED_SHA" '[.result[] | select(.environment == "production" and .deployment_trigger.metadata.commit_hash == $sha) | {id,url,created_on,status:.latest_stage.status,commit_hash:.deployment_trigger.metadata.commit_hash}] | .[0]' proof/cf.json

      - name: Prove live portal bundle contains core-first v4 runtime
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p proof/assets
          curl -fsSL "${PORTAL_URL}/" > proof/index.html
          title="$(sed -n 's:.*<title>\(.*\)</title>.*:\1:p' proof/index.html | head -1)"
          test "$title" = "AGRO-AI Enterprise Portal"
          grep -oE '/assets/[A-Za-z0-9._/-]+\.js' proof/index.html | sed 's#^/##' > proof/queue.txt
          : > proof/seen.txt
          for pass in 1 2 3 4; do
            sort -u proof/queue.txt -o proof/queue.txt
            while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              grep -Fx "$asset" proof/seen.txt >/dev/null 2>&1 && continue
              echo "$asset" >> proof/seen.txt
              target="proof/assets/$(basename "$asset")"
              curl -fsS "${PORTAL_URL}/${asset}" > "$target"
              grep -oE 'assets/[A-Za-z0-9._/-]+\.js' "$target" >> proof/queue.txt || true
              grep -oE '\./[A-Za-z0-9._/-]+\.js' "$target" | sed 's#^\./#assets/#' >> proof/queue.txt || true
            done < proof/queue.txt
          done
          cat proof/assets/*.js > proof/all-js.txt
          grep -F 'agroai_ui_catalog_v4:' proof/all-js.txt >/dev/null
          grep -F '/v1/i18n/catalog' proof/all-js.txt >/dev/null
          grep -F 'Full UI translation unavailable' proof/all-js.txt >/dev/null
          grep -F 'Kiswahili' proof/all-js.txt >/dev/null
          grep -F 'Deutsch' proof/all-js.txt >/dev/null
          grep -F 'Español' proof/all-js.txt >/dev/null
          grep -F 'العربية' proof/all-js.txt >/dev/null
          echo "live_core_first_nonfrench_i18n_runtime=ok"

      - name: Record immutable proof summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg checked_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg expected_sha "$EXPECTED_SHA" \
            --slurpfile release proof/release.json \
            '{checked_at:$checked_at,expected_sha:$expected_sha,release:($release[0] // null)}' | tee proof/summary.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-nonfrench-i18n-proof
          path: proof
          if-no-files-found: error
          retention-days: 7
