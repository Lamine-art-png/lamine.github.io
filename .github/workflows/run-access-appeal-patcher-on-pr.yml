name: Run access appeal patcher on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-test-commit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - name: Extract and run patch script
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/one-time-finish-access-appeals.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          lines = source[start:end].splitlines()
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in lines) + "\n"
          script = script.replace("                       <td", "                      <td")
          Path('/tmp/apply_access_appeals.py').write_text(script, encoding='utf-8')
          PY
          python /tmp/apply_access_appeals.py
      - name: Install backend dependencies
        working-directory: agroai_api
        run: python -m pip install -q -r requirements.txt pytest
      - name: Validate backend
        working-directory: agroai_api
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          python -m compileall -q app alembic/versions
          python -m pytest -q --tb=short tests/unit/test_account_verification_security.py tests/unit/test_platform_admin.py tests/unit/test_alembic_revisions.py
          python -m pytest -q --tb=short tests/unit
      - name: Validate portal
        working-directory: figma-enterprise-v4
        run: |
          npm ci --no-audit --no-fund
          npm run test:i18n
          npm run build
      - name: Commit validated implementation
        shell: bash
        run: |
          git config user.name "AGRO-AI Security Automation"
          git config user.email "security@agroai-pilot.com"
          git add agroai_api figma-enterprise-v4 shared
          git commit -m "Complete secure account suspension and appeal review"
          git rm .github/workflows/one-time-finish-access-appeals.yml .github/workflows/run-access-appeal-patcher-on-pr.yml .github/workflows/debug-access-appeal-patcher.yml
          git commit -m "Remove one-time access appeal workflows"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
