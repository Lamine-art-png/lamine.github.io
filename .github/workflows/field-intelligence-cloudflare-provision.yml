name: Provision Field Intelligence Cloudflare Staging

on:
  push:
    branches: [ops/field-intelligence-staging-provision]
    paths:
      - .github/workflows/field-intelligence-cloudflare-provision.yml

permissions:
  contents: write

jobs:
  provision:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      STAGING_PAGES_PROJECT: agroai-field-intelligence-staging
      STAGING_PAGES_BRANCH: field-intelligence-staging
      STAGING_R2_BUCKET: agroai-field-intelligence-staging
      PRODUCTION_PAGES_PROJECT: agroai-portal
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops/field-intelligence-staging-provision
          token: ${{ github.token }}

      - name: Create or verify isolated Pages and R2 resources atomically
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scratchpad
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          account = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          pages = os.environ["STAGING_PAGES_PROJECT"]
          branch = os.environ["STAGING_PAGES_BRANCH"]
          bucket = os.environ["STAGING_R2_BUCKET"]
          production_pages = os.environ["PRODUCTION_PAGES_PROJECT"]
          base = "https://api.cloudflare.com/client/v4"
          created = {"bucket": False, "pages": False}

          if not token or not account:
              raise SystemExit("Cloudflare credentials are missing")
          if "staging" not in pages or "staging" not in bucket:
              raise SystemExit("staging resource names must contain staging")
          if pages == production_pages:
              raise SystemExit("staging Pages project equals production")

          def call(method, path, body=None):
              data = json.dumps(body).encode("utf-8") if body is not None else None
              request = urllib.request.Request(base + path, data=data, method=method)
              request.add_header("Authorization", f"Bearer {token}")
              request.add_header("Accept", "application/json")
              request.add_header("User-Agent", "agroai-field-intelligence-staging-provisioner")
              if data is not None:
                  request.add_header("Content-Type", "application/json")
              try:
                  with urllib.request.urlopen(request, timeout=45) as response:
                      raw = response.read().decode("utf-8")
                      payload = json.loads(raw) if raw else {}
                      return response.status, payload
              except urllib.error.HTTPError as exc:
                  raw = exc.read().decode("utf-8", errors="replace")
                  try:
                      payload = json.loads(raw) if raw else {}
                  except Exception:
                      payload = {"errors": [{"message": raw[:500]}]}
                  return exc.code, payload

          def require_ok(status, payload, operation):
              if status < 200 or status >= 300 or payload.get("success") is not True:
                  messages = [str(item.get("message") or item.get("code")) for item in payload.get("errors") or []]
                  raise RuntimeError(f"{operation} failed ({status}): {'; '.join(messages)[:500]}")
              return payload.get("result")

          def get_bucket():
              return call("GET", f"/accounts/{account}/r2/buckets/{bucket}")

          def get_pages():
              return call("GET", f"/accounts/{account}/pages/projects/{pages}")

          bucket_status, bucket_payload = get_bucket()
          pages_status, pages_payload = get_pages()
          bucket_existed = bucket_status == 200 and bucket_payload.get("success") is True
          pages_existed = pages_status == 200 and pages_payload.get("success") is True
          if bucket_status not in {200, 404}:
              require_ok(bucket_status, bucket_payload, "inspect staging R2 bucket")
          if pages_status not in {200, 404}:
              require_ok(pages_status, pages_payload, "inspect staging Pages project")

          try:
              if not bucket_existed:
                  status, payload = call("POST", f"/accounts/{account}/r2/buckets", {
                      "name": bucket,
                      "locationHint": "wnam",
                      "storageClass": "Standard",
                  })
                  require_ok(status, payload, "create staging R2 bucket")
                  created["bucket"] = True

              if not pages_existed:
                  status, payload = call("POST", f"/accounts/{account}/pages/projects", {
                      "name": pages,
                      "production_branch": branch,
                  })
                  require_ok(status, payload, "create staging Pages project")
                  created["pages"] = True

              bucket_status, bucket_payload = get_bucket()
              pages_status, pages_payload = get_pages()
              bucket_result = require_ok(bucket_status, bucket_payload, "verify staging R2 bucket")
              pages_result = require_ok(pages_status, pages_payload, "verify staging Pages project")

              if str(bucket_result.get("name") or "") != bucket:
                  raise RuntimeError("verified R2 bucket identity mismatch")
              if str(pages_result.get("name") or "") != pages:
                  raise RuntimeError("verified Pages project identity mismatch")
              if str(pages_result.get("production_branch") or "") != branch:
                  raise RuntimeError("verified Pages production branch mismatch")

              report = {
                  "contract": "field-intelligence-cloudflare-staging-resources-v1",
                  "account_id": account,
                  "resources": {
                      "r2": {
                          "name": bucket,
                          "fingerprint": f"{account}:{bucket}",
                          "endpoint": f"https://{account}.r2.cloudflarestorage.com",
                          "private_by_default": True,
                          "created_by_this_run": created["bucket"],
                      },
                      "pages": {
                          "name": pages,
                          "production_branch": branch,
                          "url": f"https://{pages}.pages.dev",
                          "created_by_this_run": created["pages"],
                      },
                  },
                  "dedicated_r2_runtime_credentials_created": False,
                  "remaining_blocker": "Cloudflare token cannot create subordinate API tokens and GitHub token cannot store environment secrets",
              }
              with open("scratchpad/staging-cloudflare-resources.json", "w", encoding="utf-8") as handle:
                  json.dump(report, handle, indent=2, sort_keys=True)
              print(json.dumps(report, sort_keys=True))
          except Exception:
              # Preserve atomicity for resources created by this exact run.
              if created["pages"]:
                  call("DELETE", f"/accounts/{account}/pages/projects/{pages}")
              if created["bucket"]:
                  call("DELETE", f"/accounts/{account}/r2/buckets/{bucket}")
              raise
          PY

      - name: Persist non-secret resource identities
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "agroai-staging-provision-bot"
          git config user.email "staging-provision@agroai-pilot.com"
          git add scratchpad/staging-cloudflare-resources.json
          git commit -m "docs: record isolated Cloudflare staging resources" || exit 0
          git push origin HEAD:ops/field-intelligence-staging-provision
