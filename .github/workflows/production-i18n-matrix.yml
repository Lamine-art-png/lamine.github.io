name: Production I18n Matrix

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-every-ui-locale:
    name: Verify every real production UI language
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
      API_URL: https://app.agroai-pilot.com
    steps:
      - uses: actions/checkout@v4
      - name: Wait for exact backend SHA
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            payload="$(curl --fail --silent --show-error --max-time 20 -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN}" https://api-preview.agroai-pilot.com/v1/internal/release/health 2>/dev/null || true)"
            if printf '%s' "$payload" | jq -e --arg sha "$GITHUB_SHA" '.status == "ok" and .build_sha == $sha and .schema_current == true and .production_ready == true' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          exit 1
      - name: Verify every locale through real production generation
        run: python agroai_api/scripts/verify_production_i18n_matrix.py
      - name: Upload production matrix evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-i18n-matrix-${{ github.sha }}
          path: i18n-matrix
          if-no-files-found: error
          retention-days: 30
