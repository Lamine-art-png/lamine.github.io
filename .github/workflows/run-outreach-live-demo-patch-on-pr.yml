name: Run outreach live demo patch on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-outreach-live-demo-email.yml
      - .github/workflows/run-outreach-live-demo-patch-on-pr.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Execute the verified patch embedded in the staging workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          workflow = Path('.github/workflows/apply-outreach-live-demo-email.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          script = dedent(workflow[start:end])
          exec(compile(script, 'apply-outreach-live-demo-email', 'exec'), {})
          PY

      - name: Run focused outreach tests
        run: |
          python -m pip install --disable-pip-version-check -q pytest fastapi pydantic pydantic-settings httpx requests sqlalchemy
          cd agroai_api
          python -m pytest -q \
            tests/unit/test_outreach_live_demo_email.py \
            tests/unit/test_outreach_production_mount.py \
            tests/unit/test_outreach_warm_buyer_reengagement.py

      - name: Commit verified product changes
        run: |
          git config user.name "AGRO-AI Automation"
          git config user.email "agroaicontact@gmail.com"
          git rm .github/workflows/apply-outreach-live-demo-email.yml \
                 .github/workflows/run-outreach-live-demo-patch-on-pr.yml
          git add agroai_api/app/outreach/config.py \
                  agroai_api/app/outreach/router.py \
                  agroai_api/app/outreach/templates.py \
                  agroai_api/tests/unit/test_outreach_live_demo_email.py
          git diff --cached --check
          git commit -m "Add live demo CTA and HD thumbnail to outreach emails"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
