name: Run outreach live demo patch on PR

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-outreach-live-demo-email.yml
      - .github/workflows/run-outreach-live-demo-patch-on-pr.yml
      - .github/scripts/apply_outreach_live_demo.py

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply deterministic production patch
        run: |
          set +e
          python .github/scripts/apply_outreach_live_demo.py > /tmp/outreach-live-demo-patch.log 2>&1
          status=$?
          cat /tmp/outreach-live-demo-patch.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/outreach-live-demo-patch.log outreach-live-demo-patch-error.txt
            git config user.name "AGRO-AI Automation"
            git config user.email "agroaicontact@gmail.com"
            git add outreach-live-demo-patch-error.txt
            git commit -m "chore: capture live demo patch failure"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit "$status"
          fi

          python - <<'PY'
          from pathlib import Path

          path = Path("agroai_api/tests/unit/test_outreach_live_demo_email.py")
          text = path.read_text(encoding="utf-8")
          old = '''def test_live_demo_is_a_first_party_tracked_destination():
    from app.outreach import router

    assert "live_demo" in router._TRACKED_LINK_KEYS
    assert router._tracking_destinations()["live_demo"] == router.settings.live_demo_url
'''
          new = '''def test_live_demo_is_a_first_party_tracked_destination():
    import importlib

    router_module = importlib.import_module("app.outreach.router")
    assert "live_demo" in router_module._TRACKED_LINK_KEYS
    assert router_module._tracking_destinations()["live_demo"] == router_module.settings.live_demo_url
'''
          if text.count(old) != 1:
              raise SystemExit("generated tracking test did not match expected source")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

      - name: Run focused outreach tests
        run: |
          set +e
          python -m pip install --disable-pip-version-check -q \
            -r agroai_api/requirements-enterprise.txt \
            -r requirements.txt
          cd agroai_api
          python -m pytest -q --confcutdir=tests/unit \
            tests/unit/test_outreach_live_demo_email.py \
            tests/unit/test_outreach_warm_buyer_reengagement.py \
            > /tmp/outreach-live-demo-tests.log 2>&1
          status=$?
          cat /tmp/outreach-live-demo-tests.log
          cd ..
          if [ "$status" -ne 0 ]; then
            cp /tmp/outreach-live-demo-tests.log outreach-live-demo-patch-error.txt
            git config user.name "AGRO-AI Automation"
            git config user.email "agroaicontact@gmail.com"
            git add outreach-live-demo-patch-error.txt
            git commit -m "chore: capture live demo test failure"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
            exit "$status"
          fi

      - name: Commit verified product changes
        run: |
          git config user.name "AGRO-AI Automation"
          git config user.email "agroaicontact@gmail.com"
          git rm -f .github/workflows/apply-outreach-live-demo-email.yml \
                    .github/workflows/run-outreach-live-demo-patch-on-pr.yml \
                    .github/scripts/apply_outreach_live_demo.py
          git rm -f outreach-live-demo-patch-error.txt 2>/dev/null || true
          git add agroai_api/app/outreach/config.py \
                  agroai_api/app/outreach/router.py \
                  agroai_api/app/outreach/templates.py \
                  agroai_api/tests/unit/test_outreach_live_demo_email.py
          git diff --cached --check
          git commit -m "Add live demo CTA and HD thumbnail to outreach emails"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
