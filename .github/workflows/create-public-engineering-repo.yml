name: Create public engineering repository

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Refuse to run without an explicit cross-repository token
        shell: bash
        env:
          AGROAI_PUBLIC_REPO_TOKEN: ${{ secrets.AGROAI_PUBLIC_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${AGROAI_PUBLIC_REPO_TOKEN:-}" ]; then
            echo "AGROAI_PUBLIC_REPO_TOKEN is not configured; repository creation is intentionally blocked."
            exit 1
          fi
