name: Verify URNRD Capability Review Live

on:
  pull_request:
    paths:
      - ".github/workflows/verify-urnrd-capability-review-live.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Prove exact customer URL
        shell: bash
        run: |
          set -euo pipefail
          url="https://agroai-pilot.com/urnrd-capability-review-2026/"
          for attempt in $(seq 1 20); do
            status="$(curl -sS -L -o review.html -w '%{http_code}' --max-time 20 "$url" || true)"
            echo "attempt=$attempt status=$status"
            if [ "$status" = "200" ] && \
               grep -F "AGRO-AI Capability & Selected Work" review.html >/dev/null && \
               grep -F "Upper Republican Natural Resources District" review.html >/dev/null; then
              echo "review_route=verified"
              exit 0
            fi
            sleep 5
          done
          echo "review_route=failed"
          sed -n '1,40p' review.html || true
          exit 1
