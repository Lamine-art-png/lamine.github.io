name: Language Interaction Contract CI

on:
  pull_request:
    paths:
      - 'figma-enterprise-v4/src/app/**'
      - 'figma-enterprise-v4/tests/browser/global-language-switching.spec.mjs'
      - 'figma-enterprise-v4/tests/i18n-contract.mjs'
      - '.github/workflows/apply-language-hotfix-patch.yml'
  push:
    branches: [main]
    paths:
      - 'figma-enterprise-v4/src/app/**'
      - 'figma-enterprise-v4/tests/browser/global-language-switching.spec.mjs'
      - 'figma-enterprise-v4/tests/i18n-contract.mjs'
      - '.github/workflows/apply-language-hotfix-patch.yml'

permissions:
  contents: read

jobs:
  language-interaction:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - run: npm run test:i18n
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - name: Run language interaction browser contract
        shell: bash
        run: |
          set -euo pipefail
          npx vite preview --host 127.0.0.1 --port 4173 > /tmp/agroai-language-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill $preview_pid 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4173/settings >/dev/null; then break; fi
            sleep 1
          done
          npx playwright test tests/browser/global-language-switching.spec.mjs --config=playwright.contract.config.ts --browser=chromium --reporter=line
