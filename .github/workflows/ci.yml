name: CI - Cloudflare Release Contract

on:
  pull_request:
    paths:
      - 'cloudflare/**'
      - 'wrangler.toml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
      - 'figma-enterprise-v4/**'

permissions:
  contents: read

jobs:
  edge_release_contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install edge dependencies
        working-directory: cloudflare/edge-gateway
        run: npm install --no-audit --no-fund

      - name: Typecheck and test edge gateway
        working-directory: cloudflare/edge-gateway
        run: npm run check

      - name: Validate Wrangler deployment bundle
        working-directory: cloudflare/edge-gateway
        run: npx wrangler deploy --dry-run --config ../../wrangler.toml

  portal_release_contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - run: npm run test:i18n
      - name: Build portal against custom API edge domain
        env:
          VITE_API_BASE_URL: https://api.agroai-pilot.com
        run: npm run build
