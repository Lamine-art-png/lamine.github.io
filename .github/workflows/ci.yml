name: CI - Cloudflare Release Contract

on:
  pull_request:
    paths:
      - 'agroai_api/**'
      - 'cloudflare/**'
      - 'wrangler.toml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
      - 'figma-enterprise-v4/**'
  push:
    branches:
      - 'assistant/commercial-intelligence-control-plane-finish'

permissions:
  contents: read

jobs:
  commercial_control_plane:
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/assistant/commercial-intelligence-control-plane-finish'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agroai_api/requirements.txt
      - name: Install backend dependencies
        run: pip install -r requirements.txt
      - name: Compile backend
        run: python -m compileall app
      - name: Import FastAPI application
        run: python -c "from app.main import app; assert app is not None"
      - name: Run commercial control-plane contracts
        run: pytest tests/unit/test_commercial_control_plane.py tests/unit/test_commercial_migration_contract.py tests/unit/test_connector_commercial_guard.py tests/unit/test_commercial_runtime_guards.py -vv --tb=short 2>&1 | tee commercial-test-output.log
      - name: Upload focused commercial test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: commercial-test-output
          path: agroai_api/commercial-test-output.log
          if-no-files-found: error
          retention-days: 3
      - name: Run full unit suite
        run: pytest tests/unit -q
      - name: Verify single Alembic head
        run: test "$(alembic heads | wc -l)" -eq 1
      - name: Upgrade clean temporary database through head
        env:
          DATABASE_URL: sqlite:////tmp/agroai-commercial-control-plane.db
        run: |
          rm -f /tmp/agroai-commercial-control-plane.db
          alembic upgrade head
          alembic current

  edge_release_contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: cloudflare/edge-gateway/package-lock.json

      - name: Install locked edge dependencies
        working-directory: cloudflare/edge-gateway
        run: npm ci --no-audit --no-fund

      - name: Typecheck and test edge gateway
        working-directory: cloudflare/edge-gateway
        run: npm run check

      - name: Validate Wrangler deployment bundle
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set -euo pipefail
          secrets_file="$(mktemp)"
          trap 'rm -f "$secrets_file"' EXIT
          printf '%s' '{"QUEUE_PUBLISH_TOKEN":"ci-dry-run-only","QUEUE_CONSUMER_TOKEN":"ci-dry-run-only"}' > "$secrets_file"
          npx wrangler deploy --dry-run --config ../../wrangler.toml --secrets-file "$secrets_file"

  portal_release_contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - run: npm run test:i18n
      - name: Build portal against custom API edge domain
        env:
          VITE_API_BASE_URL: https://api.agroai-pilot.com
        run: npm run build
