name: Install outreach custom live demo thumbnail

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  install-and-verify:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Download the exact approved thumbnail and produce email HD asset
        env:
          THUMBNAIL_URL: "https://media.canva.com/v2/document-image/hash:-2104416253/height:335/id:DAHPeqV73fs/type:B/width:595?brand=BAFYBq7dkQk&csig=AAAAAAAAAAAAAAAAAAAAAKs5tVGCozXiBU7YhMaSryYCMuDcETEXQ0-KH-lXc8aD&disableexport=T&exp=1784142732&fallback=https%3A%2F%2Fs3.amazonaws.com%2Fdocument-export.canva.com%2FV73fs%2FDAHPeqV73fs%2F1%2Fthumbnail%2F0001.png%3FX-Amz-Algorithm%3DAWS4-HMAC-SHA256%26X-Amz-Credential%3DAKIAQYCGKMUHXSTDDERN%252F20260715%252Fus-east-1%252Fs3%252Faws4_request%26X-Amz-Date%3D20260715T101757Z%26X-Amz-Expires%3D32055%26X-Amz-Signature%3D83c9d9e9e1bc572b13a526e8a176356d5cc547062cb7e5c6cb862fb46829e751%26X-Amz-SignedHeaders%3Dhost%26response-expires%3DWed%252C%252015%2520Jul%25202026%252019%253A12%253A12%2520GMT&osig=AAAAAAAAAAAAAAAAAAAAAFMPy1TVb62IBBK9piHlTzIte7S5GEA_fEV9jEfpW5c5&page=1&signed=brand%2Cdisableexport%2Cfallback%2Cpage%2Cversion&signer=document-rpc&version=1"
        run: |
          python -m pip install --disable-pip-version-check -q pillow
          mkdir -p agroai_api/app/outreach/assets
          curl --fail --location --retry 3 --retry-delay 2 "$THUMBNAIL_URL" -o /tmp/approved-thumbnail
          python - <<'PY'
          from PIL import Image, ImageEnhance, ImageFilter
          from pathlib import Path

          source = Image.open('/tmp/approved-thumbnail').convert('RGB')
          target = source.resize((1600, 900), Image.Resampling.LANCZOS)
          target = ImageEnhance.Sharpness(target).enhance(1.25)
          target = ImageEnhance.Contrast(target).enhance(1.04)
          target = target.filter(ImageFilter.UnsharpMask(radius=1.2, percent=85, threshold=2))
          output = Path('agroai_api/app/outreach/assets/live-demo-thumbnail.jpg')
          target.save(output, 'JPEG', quality=94, optimize=True, progressive=True, subsampling=0)
          print(f'Created {output} at {target.size[0]}x{target.size[1]}')
          PY

      - name: Patch backend asset endpoint and configuration
        run: |
          python - <<'PY'
          from pathlib import Path

          config = Path('agroai_api/app/outreach/config.py')
          router = Path('agroai_api/app/outreach/router.py')

          config_text = config.read_text(encoding='utf-8')
          old_url = '"https://i.ytimg.com/vi/4KgH4R57tco/maxresdefault.jpg"'
          new_url = '"https://api.agroai-pilot.com/v1/outreach/assets/live-demo-thumbnail.jpg"'
          if config_text.count(old_url) != 1:
              raise SystemExit(f'Expected one old live-demo thumbnail default, found {config_text.count(old_url)}')
          config.write_text(config_text.replace(old_url, new_url, 1), encoding='utf-8')

          router_text = router.read_text(encoding='utf-8')
          router_text = router_text.replace('from typing import Any\n', 'from pathlib import Path\nfrom typing import Any\n', 1)
          router_text = router_text.replace(
              'from fastapi.responses import HTMLResponse, RedirectResponse, Response\n',
              'from fastapi.responses import FileResponse, HTMLResponse, RedirectResponse, Response\n',
              1,
          )
          anchor = '\n\n@router.get("/status")\n'
          endpoint = '''\n\n@router.get("/assets/live-demo-thumbnail.jpg", include_in_schema=False)\nasync def live_demo_thumbnail() -> FileResponse:\n    asset_path = Path(__file__).resolve().parent / "assets" / "live-demo-thumbnail.jpg"\n    if not asset_path.is_file():\n        raise HTTPException(status_code=404, detail="Live demo thumbnail is unavailable")\n    return FileResponse(\n        asset_path,\n        media_type="image/jpeg",\n        headers={\n            "Cache-Control": "public, max-age=31536000, immutable",\n            "X-Content-Type-Options": "nosniff",\n        },\n    )\n'''
          if anchor not in router_text:
              raise SystemExit('Could not locate outreach status endpoint anchor')
          router.write_text(router_text.replace(anchor, endpoint + anchor, 1), encoding='utf-8')
          PY

      - name: Verify image and backend source
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          image_path = Path('agroai_api/app/outreach/assets/live-demo-thumbnail.jpg')
          image = Image.open(image_path)
          image.verify()
          image = Image.open(image_path)
          width, height = image.size
          if (width, height) != (1600, 900):
              raise SystemExit(f'Unexpected thumbnail size: {width}x{height}')
          expected = 'https://api.agroai-pilot.com/v1/outreach/assets/live-demo-thumbnail.jpg'
          assert expected in Path('agroai_api/app/outreach/config.py').read_text(encoding='utf-8')
          router = Path('agroai_api/app/outreach/router.py').read_text(encoding='utf-8')
          assert '@router.get("/assets/live-demo-thumbnail.jpg"' in router
          assert 'media_type="image/jpeg"' in router
          print(f'VERIFIED approved custom thumbnail: {width}x{height}, {image_path.stat().st_size} bytes')
          PY
          python -m compileall -q agroai_api/app/outreach

      - name: Commit production changes and remove temporary workflow
        run: |
          git config user.name "AGRO-AI Automation"
          git config user.email "agroaicontact@gmail.com"
          git rm .github/workflows/install-outreach-custom-thumbnail.yml
          git add agroai_api/app/outreach/config.py \
                  agroai_api/app/outreach/router.py \
                  agroai_api/app/outreach/assets/live-demo-thumbnail.jpg
          git diff --cached --check
          git commit -m "Use approved custom image for outreach live demo thumbnail"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
