name: Hybrid Router Debug

on:
  push:
    branches:
      - feat/hybrid-model-router-v1
  pull_request:
    branches:
      - main
    paths:
      - 'agroai_api/**'
      - 'cloudflare/ollama-compat/**'
      - '.github/workflows/hybrid-router-debug.yml'

permissions:
  contents: read

jobs:
  focused-backend-unit-debug:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Run backend unit suite into artifact log
        id: tests
        shell: bash
        run: |
          set +e
          python3 -m pip install -q -r requirements.txt pytest >/tmp/pip.log 2>&1
          install_status=$?
          if [ "$install_status" -ne 0 ]; then
            cp /tmp/pip.log /tmp/pytest.log
            echo "status=$install_status" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python3 -m pytest -p no:debugging -q --tb=short tests/unit > /tmp/pytest.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload backend unit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hybrid-router-pytest-log
          path: /tmp/pytest.log
          retention-days: 1
          if-no-files-found: error
      - name: Fail when unit suite failed
        shell: bash
        run: |
          status='${{ steps.tests.outputs.status }}'
          echo "=== PYTEST TAIL ==="
          tail -n 70 /tmp/pytest.log
          test "${status:-1}" = "0"
