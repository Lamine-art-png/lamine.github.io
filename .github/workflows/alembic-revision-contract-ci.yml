name: Alembic Revision Contract CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  alembic-revision-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install focused test dependency
        run: python -m pip install -q pytest
      - name: Enforce revision length and uniqueness
        run: |
          set +e
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q --confcutdir=tests/unit tests/unit/test_alembic_revision_contract.py 2>&1 | tee alembic-revision-contract.log
          status=${PIPESTATUS[0]}
          tail -n 120 alembic-revision-contract.log > alembic-revision-contract-tail.txt
          exit $status
      - name: Upload revision contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alembic-revision-contract-tail
          path: agroai_api/alembic-revision-contract-tail.txt
          retention-days: 1
