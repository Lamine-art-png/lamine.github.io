name: Alembic Revision Contract CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  alembic-revision-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install focused test dependency
        run: python -m pip install -q pytest
      - name: Enforce revision length and uniqueness
        run: python -m pytest -q tests/unit/test_alembic_revision_contract.py
