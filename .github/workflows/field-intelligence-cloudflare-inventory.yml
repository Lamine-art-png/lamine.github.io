name: Inventory Cloudflare Resource Identities

on:
  push:
    branches: [ops/field-intelligence-staging-provision]
    paths:
      - .github/workflows/field-intelligence-cloudflare-inventory.yml

permissions:
  contents: write

jobs:
  inventory:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops/field-intelligence-staging-provision
          token: ${{ github.token }}
      - name: Read only Pages project and R2 bucket names
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scratchpad
          python3 - <<'PY'
          import json, os, urllib.error, urllib.request

          token = os.environ["CLOUDFLARE_API_TOKEN"]
          account = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          base = "https://api.cloudflare.com/client/v4"

          def get(path):
              request = urllib.request.Request(base + path)
              request.add_header("Authorization", f"Bearer {token}")
              request.add_header("Accept", "application/json")
              request.add_header("User-Agent", "agroai-resource-identity-inventory")
              try:
                  with urllib.request.urlopen(request, timeout=45) as response:
                      payload = json.load(response)
                      return response.status, payload
              except urllib.error.HTTPError as exc:
                  try:
                      payload = json.loads(exc.read().decode("utf-8", errors="replace"))
                  except Exception:
                      payload = {}
                  return exc.code, payload

          pages_status, pages_payload = get(f"/accounts/{account}/pages/projects?per_page=100")
          r2_status, r2_payload = get(f"/accounts/{account}/r2/buckets?per_page=100")

          projects_result = pages_payload.get("result") if isinstance(pages_payload, dict) else []
          projects = projects_result if isinstance(projects_result, list) else []
          r2_result = r2_payload.get("result") if isinstance(r2_payload, dict) else {}
          if isinstance(r2_result, dict):
              buckets = r2_result.get("buckets") or []
          elif isinstance(r2_result, list):
              buckets = r2_result
          else:
              buckets = []

          report = {
              "contract": "cloudflare-resource-identity-inventory-v2",
              "account_id": account,
              "pages_status": pages_status,
              "r2_status": r2_status,
              "pages_success": bool(isinstance(pages_payload, dict) and pages_payload.get("success") is True),
              "r2_success": bool(isinstance(r2_payload, dict) and r2_payload.get("success") is True),
              "pages_projects": sorted({str(item.get("name") or "") for item in projects if isinstance(item, dict) and item.get("name")}),
              "r2_buckets": sorted({str(item.get("name") or "") for item in buckets if isinstance(item, dict) and item.get("name")}),
              "object_contents_read": False,
              "resource_changes": False,
          }
          with open("scratchpad/cloudflare-resource-identities.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2, sort_keys=True)
          print(json.dumps(report, sort_keys=True))
          PY
      - name: Persist non-secret inventory
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "agroai-resource-inventory-bot"
          git config user.email "resource-inventory@agroai-pilot.com"
          git add scratchpad/cloudflare-resource-identities.json
          git commit -m "docs: record Cloudflare resource identities" || exit 0
          git push origin HEAD:ops/field-intelligence-staging-provision
