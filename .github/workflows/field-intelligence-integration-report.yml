name: Field Intelligence Integration Report

on:
  push:
    branches:
      - integration/field-intelligence-main-sync
    paths:
      - .github/workflows/field-intelligence-integration-report.yml

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: integration/field-intelligence-main-sync
      - name: Generate conflict report and push it
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "agroai-integration-bot"
          git config user.email "integration-bot@agroai-pilot.com"
          git fetch origin feature/field-intelligence-launch main
          branch_head="$(git rev-parse HEAD)"
          main_head="$(git rev-parse origin/main)"
          feature_head="$(git rev-parse origin/feature/field-intelligence-launch)"
          set +e
          git merge --no-commit --no-ff origin/feature/field-intelligence-launch
          rc=$?
          set -e
          mkdir -p scratchpad
          {
            echo "# Field Intelligence integration conflict report"
            echo
            echo "- integration branch head: \`$branch_head\`"
            echo "- current main head: \`$main_head\`"
            echo "- feature head: \`$feature_head\`"
            echo "- merge exit: \`$rc\`"
            echo
            echo "## Conflicting files"
            echo '```'
            git diff --name-only --diff-filter=U | sort
            echo '```'
            echo
            echo "## Conflict excerpts"
            for path in $(git diff --name-only --diff-filter=U | sort); do
              echo
              echo "### \`$path\`"
              echo '```diff'
              sed -n '/^<<<<<<< /,/^>>>>>>> /p' "$path" | head -n 240 || true
              echo '```'
            done
          } > scratchpad/field-intelligence-integration-conflicts.md
          git merge --abort >/dev/null 2>&1 || true
          git add scratchpad/field-intelligence-integration-conflicts.md
          git commit -m "docs: record Field Intelligence integration conflicts"
          git push origin HEAD:integration/field-intelligence-main-sync
