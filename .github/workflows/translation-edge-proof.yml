name: Translation Edge Proof

on:
  pull_request:
    branches: [main]
    paths: ['.github/workflows/translation-edge-proof.yml']

permissions:
  contents: read

jobs:
  deploy-and-prove:
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate exact edge bundle
        working-directory: cloudflare/edge-gateway
        run: |
          npm ci --no-audit --no-fund
          npm run check
      - name: Deploy exact merged edge hotfix
        run: npx --yes wrangler@4.107.0 deploy --config wrangler.toml
      - name: Prove representative production locales
        shell: bash
        run: |
          set -euo pipefail
          for locale in de ar ja am hi sw; do
            started="$(date +%s)"
            curl --fail --silent --show-error --max-time 45 \
              -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN}" \
              -H 'Content-Type: application/json' \
              --data "{\"locale\":\"${locale}\"}" \
              https://app.agroai-pilot.com/v1/i18n/internal/canary \
              -o "${locale}.json"
            jq -e --arg locale "$locale" '.status == "ok" and .locale == $locale and .key_count == 4 and .changed_count >= 2 and (.providers | length > 0) and (.models | length > 0)' "${locale}.json"
            jq '{status,locale,changed_count,providers,models,catalog_sha256}' "${locale}.json"
            echo "locale=${locale} elapsed=$(( $(date +%s) - started ))s"
          done
