name: Platform API Foundation CI

on:
  pull_request:
    paths:
      - "agroai_api/**"
      - "figma-enterprise-v4/**"
      - "cloudflare/edge-gateway/**"
      - "sdk/**"
      - "docs/platform-api-*"
      - "docs/earthdaily-integration-readiness.md"
      - "docs/valley-integration-readiness.md"
      - "docs/connector-provider-contract.md"
      - ".github/workflows/platform-api-foundation-ci.yml"

jobs:
  backend-platform-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m pytest tests/unit/test_platform_api_foundation.py tests/unit/test_production_readiness.py tests/unit/test_saas_foundation.py tests/unit/test_connector_vault.py tests/unit/test_cloudflare_queue_routes.py

  portal-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: figma-enterprise-v4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - run: npm ci
      - run: npm run build

  edge-contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare/edge-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloudflare/edge-gateway/package-lock.json
      - run: npm ci
      - run: npm test
