name: One-time Edge Lockfile Generator

on:
  push:
    branches: ["platform-production-hardening"]
    paths:
      - ".github/workflows/edge-lockfile-generator.yml"

permissions:
  contents: write

concurrency:
  group: edge-lockfile-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: platform-production-hardening
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate public-registry lockfile without package scripts
        working-directory: cloudflare/edge-gateway
        run: >-
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund
          --registry=https://registry.npmjs.org
      - name: Verify lockfile provenance and exact direct pins
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set -euo pipefail
          test -f package-lock.json
          ! grep -q 'internal.api.openai.org' package-lock.json
          node - <<'NODE'
          const lock = require('./package-lock.json');
          const root = lock.packages?.[''];
          if (!root) throw new Error('lockfile root package missing');
          const expected = {
            '@cloudflare/workers-types': '4.20260702.1',
            typescript: '5.9.3',
            vitest: '3.2.6',
            wrangler: '4.107.0',
          };
          for (const [name, version] of Object.entries(expected)) {
            if (root.devDependencies?.[name] !== version) {
              throw new Error(`direct pin mismatch for ${name}`);
            }
          }
          NODE
      - name: Commit generated lockfile
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "agroai-release-bot"
          git config user.email "actions@users.noreply.github.com"
          git add cloudflare/edge-gateway/package-lock.json
          if git diff --cached --quiet; then
            echo "Lockfile already current"
            exit 0
          fi
          git commit -m "Lock Cloudflare edge transitive dependencies"
          git push origin HEAD:platform-production-hardening
