name: Field Intelligence Staging Credential Preflight

on:
  push:
    branches: [ops/field-intelligence-staging-provision]
    paths:
      - .github/workflows/field-intelligence-staging-credential-preflight.yml

permissions:
  contents: read

jobs:
  preflight:
    name: Check authenticated provisioning capabilities without changing resources
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}
      RENDER_WORKSPACE_ID: ${{ secrets.RENDER_WORKSPACE_ID }}
      OPENAI_ADMIN_KEY: ${{ secrets.OPENAI_ADMIN_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      INFRA_GITHUB_TOKEN: ${{ secrets.INFRA_GITHUB_TOKEN }}
      GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
      PRODUCTION_API_SERVICE_ID: ${{ vars.PRODUCTION_API_SERVICE_ID }}
      PRODUCTION_WORKER_SERVICE_ID: ${{ vars.PRODUCTION_WORKER_SERVICE_ID }}
      PRODUCTION_PORTAL_PROJECT: ${{ vars.PRODUCTION_PORTAL_PROJECT }}
      PRODUCTION_DATABASE_RESOURCE_FINGERPRINT: ${{ vars.PRODUCTION_DATABASE_RESOURCE_FINGERPRINT }}
      PRODUCTION_OBJECT_BUCKET_FINGERPRINT: ${{ vars.PRODUCTION_OBJECT_BUCKET_FINGERPRINT }}
    steps:
      - name: Emit redacted capability matrix
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p preflight
          python3 - <<'PY'
          import json, os

          names = [
              "CLOUDFLARE_API_TOKEN",
              "CLOUDFLARE_ACCOUNT_ID",
              "RENDER_API_KEY",
              "RENDER_OWNER_ID",
              "RENDER_WORKSPACE_ID",
              "OPENAI_ADMIN_KEY",
              "OPENAI_API_KEY",
              "INFRA_GITHUB_TOKEN",
              "GH_ADMIN_TOKEN",
              "PRODUCTION_API_SERVICE_ID",
              "PRODUCTION_WORKER_SERVICE_ID",
              "PRODUCTION_PORTAL_PROJECT",
              "PRODUCTION_DATABASE_RESOURCE_FINGERPRINT",
              "PRODUCTION_OBJECT_BUCKET_FINGERPRINT",
          ]
          present = {name: bool((os.environ.get(name) or "").strip()) for name in names}
          matrix = {
              "contract": "field-intelligence-staging-credential-preflight-v1",
              "resource_changes": False,
              "present": present,
              "capabilities": {
                  "cloudflare_resource_provisioning": present["CLOUDFLARE_API_TOKEN"] and present["CLOUDFLARE_ACCOUNT_ID"],
                  "render_resource_provisioning": present["RENDER_API_KEY"] and (present["RENDER_OWNER_ID"] or present["RENDER_WORKSPACE_ID"]),
                  "dedicated_openai_project_key": present["OPENAI_ADMIN_KEY"],
                  "existing_openai_runtime_key": present["OPENAI_API_KEY"],
                  "github_environment_bootstrap": present["INFRA_GITHUB_TOKEN"] or present["GH_ADMIN_TOKEN"],
                  "production_fingerprints_complete": all(present[name] for name in [
                      "PRODUCTION_API_SERVICE_ID",
                      "PRODUCTION_PORTAL_PROJECT",
                      "PRODUCTION_DATABASE_RESOURCE_FINGERPRINT",
                      "PRODUCTION_OBJECT_BUCKET_FINGERPRINT",
                  ]),
              },
          }
          with open("preflight/credential-matrix.json", "w", encoding="utf-8") as handle:
              json.dump(matrix, handle, indent=2, sort_keys=True)
          print(json.dumps(matrix, sort_keys=True))
          PY

      - name: Verify Cloudflare token identity without mutation
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            https://api.cloudflare.com/client/v4/user/tokens/verify \
            | python3 -c 'import json,sys; p=json.load(sys.stdin); assert p.get("success") is True; print("cloudflare_token_valid=true")'

      - name: Verify Render token identity without mutation
        if: ${{ env.RENDER_API_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            'https://api.render.com/v1/owners?limit=20' \
            | python3 -c 'import json,sys; p=json.load(sys.stdin); assert isinstance(p, list); print("render_token_valid=true")'

      - uses: actions/upload-artifact@v4
        with:
          name: field-intelligence-staging-credential-preflight-${{ github.sha }}
          path: preflight/credential-matrix.json
          retention-days: 3
