name: Deploy (Build to ECR + Terraform Apply)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-west-1
  TF_DIR: terraform
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  build_push:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.out.outputs.image_tag }}
      image_uri: ${{ steps.out.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail fast if ECR repo var is empty
        shell: bash
        run: |
          echo "ECR_REPOSITORY='${{ vars.ECR_REPOSITORY }}'"
          test -n "${{ vars.ECR_REPOSITORY }}" || (echo "ERROR: vars.ECR_REPOSITORY is empty" && exit 1)

      - name: Fail fast if AWS role secret is empty
        shell: bash
        run: |
          test -n "${{ secrets.AWS_ROLE_ARN }}" || (echo "ERROR: secrets.AWS_ROLE_ARN is empty" && exit 1)

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Who am I (STS)
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest

      - name: Export image uri + tag
        id: out
        shell: bash
        run: |
          IMAGE_TAG="${GITHUB_SHA}"
          IMAGE_URI="${{ steps.ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${IMAGE_URI}"

  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build_push]

    # IMPORTANT: This is what makes var.openweather_api_key non-empty in Terraform.
    # Terraform maps TF_VAR_openweather_api_key -> var.openweather_api_key
    env:
      TF_VAR_openweather_api_key: ${{ secrets.OPENWEATHER_API_KEY }}

      # Optional: only enable if your Terraform has matching variables.
      # TF_VAR_image_tag: ${{ needs.build_push.outputs.image_tag }}
      # TF_VAR_image_uri: ${{ needs.build_push.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail fast if AWS role secret is empty
        shell: bash
        run: |
          test -n "${{ secrets.AWS_ROLE_ARN }}" || (echo "ERROR: secrets.AWS_ROLE_ARN is empty" && exit 1)

      # This proves the secret exists IN THE RUNNER, without printing it.
      - name: Fail fast if OpenWeather key is missing (safe)
        shell: bash
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: |
          if [ -z "$OPENWEATHER_API_KEY" ]; then
            echo "ERROR: OPENWEATHER_API_KEY secret is missing/empty in this repo/run"
            exit 1
          fi
          echo "OPENWEATHER_API_KEY length: ${#OPENWEATHER_API_KEY}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt (check)
        run: terraform -chdir=${{ env.TF_DIR }} fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_DIR }} init

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_DIR }} validate

      - name: Terraform plan
        run: terraform -chdir=${{ env.TF_DIR }} plan -out=tfplan

      - name: Terraform apply
        run: terraform -chdir=${{ env.TF_DIR }} apply -auto-approve tfplan

