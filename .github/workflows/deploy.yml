name: Deploy (Build to ECR + Terraform Apply)

on:
  push:
    branches: ["main"]
    paths:
      - "agroai_api/**"
      - "terraform/**"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-1
  # Fallback protects you from the exact error you're seeing (missing repo name).
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'agroai-manulife-pilot-api' }}

jobs:
  build_and_push:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail fast if ECR repo var is empty
        run: |
          set -euo pipefail
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}"
          test -n "${ECR_REPOSITORY}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Who am I (STS)
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::12}"
          REGISTRY="${{ steps.login_ecr.outputs.registry }}"
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${TAG}"

          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

          echo "Will build/push: ${IMAGE_URI}"

      - name: Build & Push image
        run: |
          set -euo pipefail
          docker build -t "${{ steps.meta.outputs.image_uri }}" .
          docker push "${{ steps.meta.outputs.image_uri }}"

  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build_and_push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Sanity check required repo variables (fail fast)
        working-directory: terraform
        run: |
          set -euo pipefail
          test -n "${{ vars.PROJECT }}"
          test -n "${{ vars.VPC_ID }}"
          test -n "${{ vars.PUBLIC_SUBNET_IDS }}"
          test -n "${{ vars.ECS_SUBNET_IDS }}"
          echo "Repo vars look non-empty ✅"

      - name: Validate subnet vars are JSON arrays
        working-directory: terraform
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          pub = json.loads(r'''${{ vars.PUBLIC_SUBNET_IDS }}''')
          ecs = json.loads(r'''${{ vars.ECS_SUBNET_IDS }}''')
          assert isinstance(pub, list) and all(isinstance(x,str) for x in pub), pub
          assert isinstance(ecs, list) and all(isinstance(x,str) for x in ecs), ecs
          print("Subnet vars are valid JSON arrays ✅")
          PY

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -diff -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: terraform
        env:
          TF_VAR_project: ${{ vars.PROJECT }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ vars.PUBLIC_SUBNET_IDS }}
          TF_VAR_ecs_subnet_ids: ${{ vars.ECS_SUBNET_IDS }}
          TF_VAR_image_uri: ${{ needs.build_and_push.outputs.image_uri }}
          TF_VAR_openweather_api_key: ${{ secrets.OPENWEATHER_API_KEY }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_project: ${{ vars.PROJECT }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ vars.PUBLIC_SUBNET_IDS }}
          TF_VAR_ecs_subnet_ids: ${{ vars.ECS_SUBNET_IDS }}
          TF_VAR_image_uri: ${{ needs.build_and_push.outputs.image_uri }}
          TF_VAR_openweather_api_key: ${{ secrets.OPENWEATHER_API_KEY }}
        run: terraform apply -auto-approve -input=false tfplan

