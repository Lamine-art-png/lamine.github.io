name: Deploy (Build to ECR + Terraform Apply)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# Critical for OIDC to work
permissions:
  id-token: write
  contents: read

# Prevent “cancelled terraform apply” leaving DynamoDB locks behind
concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-west-1
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  build_and_push:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: agroai_api/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Export image URI
        id: meta
        run: echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

  terraform_apply:
    name: Terraform Apply
    needs: build_and_push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_openweather_api_key: ${{ secrets.OPENWEATHER_API_KEY }}

          # Required variables your error is complaining about
          TF_VAR_project: ${{ vars.TF_PROJECT }}
          TF_VAR_vpc_id: ${{ vars.TF_VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ vars.TF_PUBLIC_SUBNET_IDS }}
          TF_VAR_ecs_subnet_ids: ${{ vars.TF_ECS_SUBNET_IDS }}

          # Optional: only matters if your Terraform declares a variable for image
          TF_VAR_image_uri: ${{ needs.build_and_push.outputs.image_uri }}
        run: terraform apply -auto-approve -input=false

