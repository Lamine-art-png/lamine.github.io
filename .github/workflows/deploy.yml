name: Cloudflare Production Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PORTAL_PROJECT: agroai-portal
  PORTAL_URL: https://app.agroai-pilot.com
  API_URL: https://app.agroai-pilot.com
  UPSTREAM_HEALTH_URL: https://api-preview.agroai-pilot.com/v1/health
  UPSTREAM_RELEASE_CONTRACT_URL: https://api-preview.agroai-pilot.com/v1/internal/release/health

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json

      - name: Validate enterprise portal
        working-directory: figma-enterprise-v4
        env:
          VITE_API_BASE_URL: ${{ env.API_URL }}
        run: |
          npm ci
          npm run test:i18n
          npm run build

      - name: Validate edge gateway
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm run check
          secrets_file="$(mktemp)"
          trap 'rm -f "$secrets_file"' EXIT
          printf '%s' '{"QUEUE_PUBLISH_TOKEN":"ci-dry-run-only","QUEUE_CONSUMER_TOKEN":"ci-dry-run-only","EDGE_ORIGIN_AUTH_TOKEN":"ci-dry-run-only"}' > "$secrets_file"
          npx wrangler deploy --dry-run --config ../../wrangler.toml --secrets-file "$secrets_file"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agroai_api/requirements.txt

      - name: Validate backend queue and release contracts
        working-directory: agroai_api
        run: |
          python -m pip install -q -r requirements.txt pytest
          python -m compileall -q app alembic scripts
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q --tb=short \
            tests/unit/test_cloudflare_task_queue.py \
            tests/unit/test_cloudflare_queue_runtime.py \
            tests/unit/test_cloudflare_queue_routes.py \
            tests/unit/test_cloudflare_queue_rotation.py \
            tests/unit/test_connector_task_processor_contract.py \
            tests/unit/test_task_outbox.py \
            tests/unit/test_ingestion_job_leases.py \
            tests/unit/test_object_storage.py \
            tests/unit/test_runtime_origin_and_route_contract.py \
            tests/unit/test_production_readiness.py \
            tests/unit/test_i18n_catalog_contract.py

  deploy-edge:
    name: Deploy API edge and queues
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      QUEUE_PUBLISH_TOKEN: ${{ secrets.QUEUE_PUBLISH_TOKEN }}
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
      EDGE_ORIGIN_AUTH_TOKEN: ${{ secrets.EDGE_ORIGIN_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cloudflare/edge-gateway/package-lock.json

      - name: Fail closed on missing deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID QUEUE_PUBLISH_TOKEN QUEUE_CONSUMER_TOKEN EDGE_ORIGIN_AUTH_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required production secret: ${name}"
              exit 1
            fi
          done

      - name: Install locked edge tooling
        working-directory: cloudflare/edge-gateway
        run: npm ci --no-audit --no-fund

      - name: Verify current upstream health
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 "${UPSTREAM_HEALTH_URL}" | jq -e '.status == "ok"' >/dev/null

      - name: Wait for exact backend build, schema, storage, and Queue contract
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            payload="$(curl --fail --silent --show-error --max-time 20 \
              -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN}" \
              "${UPSTREAM_RELEASE_CONTRACT_URL}" 2>/dev/null || true)"
            if printf '%s' "$payload" | jq -e --arg sha "$GITHUB_SHA" \
              '.status == "ok" and .contract == "agroai-release-v1" and .build_sha == $sha and .schema_current == true and .queue_configured == true and .object_storage_configured == true and .object_storage_reachable == true and .production_ready == true' \
              >/dev/null 2>&1; then
              printf '%s' "$payload" > upstream-release-contract.json
              echo "Exact backend build, schema, storage, and Queue contract is ready"
              exit 0
            fi
            sleep 10
          done
          echo "Exact backend release contract did not become ready; refusing to change the public edge"
          exit 1

      - name: Upload upstream release contract evidence
        uses: actions/upload-artifact@v4
        with:
          name: upstream-release-contract-${{ github.sha }}
          path: upstream-release-contract.json
          retention-days: 30

      - name: Ensure connector queues exist
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set -euo pipefail
          ensure_queue() {
            local queue_name="$1"
            if npx wrangler queues info "$queue_name" >/dev/null 2>&1; then
              echo "Queue already exists: $queue_name"
            else
              npx wrangler queues create "$queue_name"
            fi
          }
          ensure_queue "agroai-connector-tasks"
          ensure_queue "agroai-connector-tasks-dlq"

      - name: Deploy API edge gateway with exact Queue secrets
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set -euo pipefail
          secrets_file="${RUNNER_TEMP}/agroai-edge-secrets-${GITHUB_RUN_ID}.json"
          umask 077
          trap 'rm -f "$secrets_file"' EXIT
          jq -n \
            --arg publish "$QUEUE_PUBLISH_TOKEN" \
            --arg consumer "$QUEUE_CONSUMER_TOKEN" \
            --arg edge_origin_auth "$EDGE_ORIGIN_AUTH_TOKEN" \
            '{QUEUE_PUBLISH_TOKEN: $publish, QUEUE_CONSUMER_TOKEN: $consumer, EDGE_ORIGIN_AUTH_TOKEN: $edge_origin_auth}' > "$secrets_file"
          npx wrangler deploy --config ../../wrangler.toml --secrets-file "$secrets_file"
          rm -f "$secrets_file"
          trap - EXIT

      - name: Smoke exact public edge and upstream
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --max-time 15 "${API_URL}/v1/edge-health" | jq -e '.status == "ok"' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              echo "Edge health check failed"
              exit 1
            fi
            sleep 3
          done
          curl --fail --silent --show-error --max-time 30 "${API_URL}/v1/health" | jq -e '.status == "ok"' >/dev/null
          curl --fail --silent --show-error --max-time 30 \
            -H "Authorization: Bearer ${QUEUE_CONSUMER_TOKEN}" \
            "${API_URL}/v1/internal/release/health" | \
            jq -e --arg sha "$GITHUB_SHA" '.status == "ok" and .contract == "agroai-release-v1" and .build_sha == $sha and .schema_current == true and .queue_configured == true and .object_storage_configured == true and .object_storage_reachable == true and .production_ready == true' >/dev/null

  deploy-portal:
    name: Deploy enterprise portal
    needs: [validate, deploy-edge]
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json

      - name: Build exact enterprise portal
        working-directory: figma-enterprise-v4
        env:
          VITE_API_BASE_URL: ${{ env.API_URL }}
        run: |
          npm ci
          npm run test:i18n
          npm run build

      - name: Deploy portal to Pages
        run: npx --yes wrangler@4.107.0 pages deploy figma-enterprise-v4/dist --project-name "${PORTAL_PROJECT}" --branch main --commit-hash "${GITHUB_SHA}"

      - name: Smoke production portal and global language bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p portal-smoke/assets
          ready=0
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error --location --max-time 20 "${PORTAL_URL}/" -o portal-smoke/index.html; then
              title="$(sed -n 's:.*<title>\(.*\)</title>.*:\1:p' portal-smoke/index.html | head -1)"
              if [ "$title" = "AGRO-AI Enterprise Portal" ]; then
                ready=1
                break
              fi
            fi
            sleep 5
          done
          test "$ready" -eq 1
          grep -oE '/assets/[A-Za-z0-9._/-]+\.js' portal-smoke/index.html | sed 's#^/##' > portal-smoke/queue.txt
          : > portal-smoke/seen.txt
          for pass in 1 2 3 4; do
            sort -u portal-smoke/queue.txt -o portal-smoke/queue.txt
            while IFS= read -r asset; do
              [ -n "$asset" ] || continue
              grep -Fx "$asset" portal-smoke/seen.txt >/dev/null 2>&1 && continue
              echo "$asset" >> portal-smoke/seen.txt
              target="portal-smoke/assets/$(basename "$asset")"
              curl --fail --silent --show-error --max-time 20 "${PORTAL_URL}/${asset}" -o "$target"
              grep -oE 'assets/[A-Za-z0-9._/-]+\.js' "$target" >> portal-smoke/queue.txt || true
              grep -oE '\./[A-Za-z0-9._/-]+\.js' "$target" | sed 's#^\./#assets/#' >> portal-smoke/queue.txt || true
            done < portal-smoke/queue.txt
          done
          cat portal-smoke/assets/*.js > portal-smoke/all-js.txt
          grep -F 'Kiswahili' portal-smoke/all-js.txt >/dev/null
          grep -F 'Українська' portal-smoke/all-js.txt >/dev/null
          grep -F '日本語' portal-smoke/all-js.txt >/dev/null
          grep -F 'agroai_ui_catalog_v4:' portal-smoke/all-js.txt >/dev/null
          grep -F 'Full UI translation unavailable' portal-smoke/all-js.txt >/dev/null
          printf 'portal_global_language_bundle=ok\n'

  release-evidence:
    name: Record release evidence
    needs: [deploy-edge, deploy-portal]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Emit immutable release summary
        env:
          EDGE_RESULT: ${{ needs.deploy-edge.result }}
          PORTAL_RESULT: ${{ needs.deploy-portal.result }}
        run: |
          {
            echo "release_sha=${GITHUB_SHA}"
            echo "edge_result=${EDGE_RESULT}"
            echo "portal_result=${PORTAL_RESULT}"
            echo "api_url=${API_URL}"
            echo "portal_url=${PORTAL_URL}"
          } | tee release-evidence.txt
          test "$EDGE_RESULT" = "success"
          test "$PORTAL_RESULT" = "success"
      - uses: actions/upload-artifact@v4
        with:
          name: cloudflare-production-release-${{ github.sha }}
          path: release-evidence.txt
          retention-days: 30
