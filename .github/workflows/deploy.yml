name: Cloudflare Production Release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  PORTAL_PROJECT: agroai-portal
  PORTAL_URL: https://app.agroai-pilot.com
  API_URL: https://api.agroai-pilot.com
  UPSTREAM_HEALTH_URL: https://api-preview.agroai-pilot.com/v1/health

jobs:
  validate:
    name: Validate release candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json

      - name: Validate enterprise portal
        working-directory: figma-enterprise-v4
        env:
          VITE_API_BASE_URL: ${{ env.API_URL }}
        run: |
          npm ci
          npm run test:i18n
          npm run build

      - name: Validate edge gateway
        working-directory: cloudflare/edge-gateway
        run: |
          npm install --no-audit --no-fund
          npm run check
          npx wrangler deploy --dry-run --config ../../wrangler.toml

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: agroai_api/requirements.txt

      - name: Validate backend queue integration
        working-directory: agroai_api
        run: |
          python -m pip install -q -r requirements.txt pytest
          python -m compileall -q app alembic scripts
          PYTEST_DISABLE_PLUGIN_AUTOLOAD=1 python -m pytest -q --tb=short \
            tests/unit/test_cloudflare_task_queue.py \
            tests/unit/test_cloudflare_queue_runtime.py \
            tests/unit/test_cloudflare_queue_routes.py \
            tests/unit/test_task_outbox.py \
            tests/unit/test_production_readiness.py

  deploy-edge:
    name: Deploy API edge and queues
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      QUEUE_PUBLISH_TOKEN: ${{ secrets.QUEUE_PUBLISH_TOKEN }}
      QUEUE_CONSUMER_TOKEN: ${{ secrets.QUEUE_CONSUMER_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fail closed on missing deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID QUEUE_PUBLISH_TOKEN QUEUE_CONSUMER_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required production secret: ${name}"
              exit 1
            fi
          done

      - name: Install edge tooling
        working-directory: cloudflare/edge-gateway
        run: npm install --no-audit --no-fund

      - name: Verify current upstream before changing public edge
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 30 "${UPSTREAM_HEALTH_URL}" | jq -e '.status == "ok"' >/dev/null

      - name: Ensure connector queues exist
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set -euo pipefail
          ensure_queue() {
            local queue_name="$1"
            if npx wrangler queues info "$queue_name" >/dev/null 2>&1; then
              echo "Queue already exists: $queue_name"
            else
              npx wrangler queues create "$queue_name"
            fi
          }
          ensure_queue "agroai-connector-tasks"
          ensure_queue "agroai-connector-tasks-dlq"

      - name: Deploy API edge gateway
        working-directory: cloudflare/edge-gateway
        run: npx wrangler deploy --config ../../wrangler.toml

      - name: Provision Worker queue secrets
        working-directory: cloudflare/edge-gateway
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$QUEUE_PUBLISH_TOKEN" | npx wrangler secret put QUEUE_PUBLISH_TOKEN --config ../../wrangler.toml
          printf '%s' "$QUEUE_CONSUMER_TOKEN" | npx wrangler secret put QUEUE_CONSUMER_TOKEN --config ../../wrangler.toml

      - name: Smoke edge and upstream health
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --max-time 15 "${API_URL}/v1/edge-health" | jq -e '.status == "ok"' >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              echo "Edge health check failed"
              exit 1
            fi
            sleep 3
          done
          curl --fail --silent --show-error --max-time 30 "${API_URL}/v1/health" | jq -e '.status == "ok"' >/dev/null

  deploy-portal:
    name: Deploy enterprise portal
    needs: [validate, deploy-edge]
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json

      - name: Build exact enterprise portal
        working-directory: figma-enterprise-v4
        env:
          VITE_API_BASE_URL: ${{ env.API_URL }}
        run: |
          npm ci
          npm run test:i18n
          npm run build

      - name: Deploy portal to Pages
        run: npx --yes wrangler@4 pages deploy figma-enterprise-v4/dist --project-name "${PORTAL_PROJECT}" --branch main --commit-hash "${GITHUB_SHA}"

      - name: Smoke production portal
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --location --max-time 20 "${PORTAL_URL}" >/dev/null; then
              exit 0
            fi
            sleep 3
          done
          echo "Portal smoke check failed"
          exit 1

  release-evidence:
    name: Record release evidence
    needs: [deploy-edge, deploy-portal]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Emit immutable release summary
        env:
          EDGE_RESULT: ${{ needs.deploy-edge.result }}
          PORTAL_RESULT: ${{ needs.deploy-portal.result }}
        run: |
          {
            echo "release_sha=${GITHUB_SHA}"
            echo "edge_result=${EDGE_RESULT}"
            echo "portal_result=${PORTAL_RESULT}"
            echo "api_url=${API_URL}"
            echo "portal_url=${PORTAL_URL}"
          } | tee release-evidence.txt
          test "$EDGE_RESULT" = "success"
          test "$PORTAL_RESULT" = "success"
      - uses: actions/upload-artifact@v4
        with:
          name: cloudflare-production-release-${{ github.sha }}
          path: release-evidence.txt
          retention-days: 30
