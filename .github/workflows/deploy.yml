name: Deploy (Build to ECR + Terraform Apply)

on:
  push:
    branches: ["main"]
    paths:
      - "agroai_api/**"
      - "terraform/**"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-1
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  build_and_push:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image metadata
        id: meta
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::12}"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ steps.login_ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:$TAG" >> "$GITHUB_OUTPUT"

      - name: Build & Push image
        run: |
          set -euo pipefail
          docker build -t "${{ steps.meta.outputs.image_uri }}" .
          docker push "${{ steps.meta.outputs.image_uri }}"

  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build_and_push]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Sanity check required repo variables (fail fast)
        working-directory: terraform
        run: |
          set -euo pipefail
          test -n "${{ vars.PROJECT }}"
          test -n "${{ vars.VPC_ID }}"
          test -n "${{ vars.PUBLIC_SUBNET_IDS }}"
          test -n "${{ vars.ECS_SUBNET_IDS }}"
          test -n "${{ vars.ECR_REPOSITORY }}"
          echo "Repo vars look non-empty ✅"

      - name: Terraform fmt
        working-directory: terraform
        run: terraform fmt -check -diff -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform plan
        working-directory: terraform
        env:
          TF_VAR_project: ${{ vars.PROJECT }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ toJson(fromJson(vars.PUBLIC_SUBNET_IDS)) }}
          TF_VAR_ecs_subnet_ids: ${{ toJson(fromJson(vars.ECS_SUBNET_IDS)) }}
          TF_VAR_image_uri: ${{ needs.build_and_push.outputs.image_uri }}
          TF_VAR_openweather_api_key: ${{ secrets.OPENWEATHER_API_KEY }}
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Terraform apply
        working-directory: terraform
        env:
          TF_VAR_project: ${{ vars.PROJECT }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          TF_VAR_public_subnet_ids: ${{ toJson(fromJson(vars.PUBLIC_SUBNET_IDS)) }}
          TF_VAR_ecs_subnet_ids: ${{ toJson(fromJson(vars.ECS_SUBNET_IDS)) }}
          TF_VAR_image_uri: ${{ needs.build_and_push.outputs.image_uri }}
          TF_VAR_openweather_api_key: ${{ secrets.OPENWEATHER_API_KEY }}
        run: terraform apply -auto-approve -input=false tfplan

