name: Deploy (Build to ECR + Terraform Apply)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: us-west-1
  TF_DIR: terraform

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build_push:
    name: Build & Push (ECR)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag + URI
        id: meta
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          IMAGE_URI="${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${IMAGE_TAG}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Build image (agroai_api/Dockerfile)
        run: |
          docker build \
            -f agroai_api/Dockerfile \
            -t "${{ steps.meta.outputs.image_uri }}" \
            .

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.image_uri }}"

  terraform_apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build_push
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_DIR }} init -input=false

      - name: Terraform Apply
        run: |
          terraform -chdir=${{ env.TF_DIR }} apply -auto-approve \
            -var="project=${{ vars.PROJECT }}" \
            -var="vpc_id=${{ vars.VPC_ID }}" \
            -var='public_subnet_ids=${{ vars.PUBLIC_SUBNET_IDS }}' \
            -var='ecs_subnet_ids=${{ vars.ECS_SUBNET_IDS }}' \
            -var="ecr_repository=${{ vars.ECR_REPOSITORY }}" \
            -var="image_tag=${{ needs.build_push.outputs.image_tag }}"

