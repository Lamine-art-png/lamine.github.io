name: Deploy (Build to ECR + Terraform Apply)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

# Required for GitHub OIDC → AWS role assumption
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-west-1
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Sanity checks (BEFORE configure-aws-credentials) ----
      - name: Fail fast if role ARN secret missing
        run: |
          if [ -z "${{ secrets.AWS_OIDC_ROLE_ARN }}" ]; then
            echo "Missing secret AWS_OIDC_ROLE_ARN (Repo Settings → Actions → Secrets)"
            exit 1
          fi
          if [ -z "${{ env.ECR_REPOSITORY }}" ]; then
            echo "Missing repo variable ECR_REPOSITORY (Repo Settings → Actions → Variables)"
            exit 1
          fi
          echo "AWS_REGION=${AWS_REGION}"
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ---- Identity check (RIGHT AFTER configure-aws-credentials) ----
      - name: Who am I (AWS)
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR (using terraform/Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: terraform/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Export image URI for Terraform
        id: image
        run: echo "image_uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_openweather_api_key: ${{ secrets.OPENWEATHER_API_KEY }}
          TF_VAR_image_uri: ${{ steps.image.outputs.image_uri }}
        run: terraform apply -auto-approve

      # Optional: force a new ECS deployment if you store these as repo variables
      - name: Force new ECS deployment (optional)
        env:
          ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
          ECS_SERVICE: ${{ vars.ECS_SERVICE }}
        run: |
          if [ -n "$ECS_CLUSTER" ] && [ -n "$ECS_SERVICE" ]; then
            aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --force-new-deployment
          else
            echo "Skipping ECS force deployment (vars.ECS_CLUSTER / vars.ECS_SERVICE not set)"
          fi

