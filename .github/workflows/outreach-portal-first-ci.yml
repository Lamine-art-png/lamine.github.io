name: Portal-First Outreach CI

on:
  pull_request:
    branches: [main]
    paths:
      - "agroai_api/app/outreach/**"
      - "agroai_api/tests/unit/test_outreach_*.py"
      - ".github/workflows/outreach-portal-first-ci.yml"

permissions:
  contents: read

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: agroai_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agroai_api/requirements.txt
      - name: Install backend and test dependencies
        run: pip install -r requirements.txt pytest==8.3.5
      - name: Compile outreach package
        run: python -m compileall app/outreach
      - name: Run production outreach tests
        run: >-
          python -m pytest
          tests/unit/test_outreach_portal_first_email.py
          tests/unit/test_outreach_production_mount.py
          tests/unit/test_outreach_live_demo_email.py
          -q --tb=short
