name: Deploy URNRD Capability Review

on:
  push:
    branches: ["main"]
    paths:
      - "client/public/urnrd-capability-review-2026/**"
      - "cloudflare/urnrd-review-worker/**"
      - ".github/workflows/deploy-urnrd-capability-review.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: urnrd-capability-review-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy and prove live review routes
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      REVIEW_URL: https://agroai-pilot.com/urnrd-capability-review-2026/
      ENGINEERING_URL: https://agroai-pilot.com/urnrd-capability-review-2026/engineering/
      UNSAFE_MONOREPO_URL: https://github.com/Lamine-art-png/lamine.github.io
      SAFE_ENGINEERING_REPO_URL: https://github.com/Lamine-art-png/agro-ai-public-engineering
      SAFE_ENGINEERING_REPO_API: https://api.github.com/repos/Lamine-art-png/agro-ai-public-engineering
      SAFE_ENGINEERING_README: https://raw.githubusercontent.com/Lamine-art-png/agro-ai-public-engineering/main/README.md
    steps:
      - uses: actions/checkout@v4

      - name: Fail closed on missing Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"

      - name: Validate source review documents
        shell: bash
        run: |
          set -euo pipefail
          test -s client/public/urnrd-capability-review-2026/index.html
          test -s client/public/urnrd-capability-review-2026/engineering/index.html
          grep -F "AGRO-AI Capability & Selected Work" client/public/urnrd-capability-review-2026/index.html >/dev/null
          grep -F "Upper Republican Natural Resources District" client/public/urnrd-capability-review-2026/index.html >/dev/null
          grep -F "AGRO-AI Public Engineering Portfolio" client/public/urnrd-capability-review-2026/engineering/index.html >/dev/null
          grep -F "Public-safe technical overview" client/public/urnrd-capability-review-2026/engineering/index.html >/dev/null
          if grep -F "${UNSAFE_MONOREPO_URL}" client/public/urnrd-capability-review-2026/engineering/index.html >/dev/null; then
            echo "Unsafe monorepo URL found in public engineering portfolio"
            exit 1
          fi

      - name: Verify safe public GitHub repository
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL "${SAFE_ENGINEERING_REPO_API}" -o repo.json
          grep -F '"full_name": "Lamine-art-png/agro-ai-public-engineering"' repo.json >/dev/null
          grep -F '"private": false' repo.json >/dev/null
          curl -fsSL "${SAFE_ENGINEERING_README}" -o engineering-readme.md
          grep -F "AGRO-AI Public Engineering" engineering-readme.md >/dev/null
          grep -F "This repository does not contain" engineering-readme.md >/dev/null
          if grep -F "${UNSAFE_MONOREPO_URL}" engineering-readme.md >/dev/null; then
            echo "Unsafe monorepo URL found in safe engineering README"
            exit 1
          fi

      - name: Validate Worker bundle
        shell: bash
        run: |
          set -euo pipefail
          npx --yes wrangler@4.107.0 deploy --dry-run --config cloudflare/urnrd-review-worker/wrangler.toml

      - name: Deploy narrow production route
        shell: bash
        run: |
          set -euo pipefail
          npx --yes wrangler@4.107.0 deploy --config cloudflare/urnrd-review-worker/wrangler.toml

      - name: Prove live customer URLs and security boundary
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            review_status="$(curl -sS -L -o review.html -w '%{http_code}' --max-time 20 "${REVIEW_URL}" || true)"
            engineering_status="$(curl -sS -L -o engineering.html -w '%{http_code}' --max-time 20 "${ENGINEERING_URL}" || true)"

            review_safe=false
            engineering_safe=false

            if [ "$review_status" = "200" ] && \
               grep -F "AGRO-AI Capability & Selected Work" review.html >/dev/null && \
               grep -F "Upper Republican Natural Resources District" review.html >/dev/null && \
               grep -F "Public engineering repository" review.html >/dev/null && \
               grep -F "${SAFE_ENGINEERING_REPO_URL}" review.html >/dev/null && \
               ! grep -F "${UNSAFE_MONOREPO_URL}" review.html >/dev/null; then
              review_safe=true
            fi

            if [ "$engineering_status" = "200" ] && \
               grep -F "AGRO-AI Public Engineering Portfolio" engineering.html >/dev/null && \
               grep -F "Public-safe technical overview" engineering.html >/dev/null && \
               grep -F "Security boundary" engineering.html >/dev/null && \
               ! grep -F "${UNSAFE_MONOREPO_URL}" engineering.html >/dev/null; then
              engineering_safe=true
            fi

            if [ "$review_safe" = "true" ] && [ "$engineering_safe" = "true" ]; then
              echo "review_url=${REVIEW_URL}"
              echo "safe_engineering_repo=${SAFE_ENGINEERING_REPO_URL}"
              echo "review_route=verified_safe"
              echo "engineering_repository=verified_safe"
              exit 0
            fi

            sleep 5
          done

          echo "URNRD review routes did not become healthy and safe"
          exit 1
