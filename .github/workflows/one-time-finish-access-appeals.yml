name: One-time finish access appeals

on:
  push:
    branches:
      - security/legacy-account-appeals-six

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: figma-enterprise-v4/package-lock.json
      - name: Patch integration points
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  raise SystemExit(f"missing anchor in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace(
              "agroai_api/app/models/saas.py",
              '    locked_until = Column(DateTime, nullable=True, index=True)\n',
              '    locked_until = Column(DateTime, nullable=True, index=True)\n'
              '    access_restriction_reason = Column(String, nullable=True, index=True)\n'
              '    access_restricted_at = Column(DateTime, nullable=True, index=True)\n'
              '    access_restriction_notified_at = Column(DateTime, nullable=True)\n',
          )
          replace(
              "agroai_api/app/models/saas.py",
              '    security_events = relationship("SecurityAuditEvent", back_populates="user")\n',
              '    security_events = relationship("SecurityAuditEvent", back_populates="user")\n'
              '    access_appeals = relationship("AccountAccessAppeal", back_populates="user", foreign_keys="AccountAccessAppeal.user_id", cascade="all, delete-orphan")\n',
          )
          replace(
              "agroai_api/app/models/saas.py",
              '    security_events = relationship("SecurityAuditEvent", back_populates="organization")\n',
              '    security_events = relationship("SecurityAuditEvent", back_populates="organization")\n'
              '    access_appeals = relationship("AccountAccessAppeal", back_populates="organization", cascade="all, delete-orphan")\n',
          )
          replace(
              "agroai_api/app/models/saas.py",
              '\n\nclass OrganizationMembership(Base):\n',
              '''\n\nclass AccountAccessAppeal(Base):\n    __tablename__ = "account_access_appeals"\n\n    id = Column(String, primary_key=True, default=new_id, index=True)\n    user_id = Column(String, ForeignKey("users.id", ondelete="CASCADE"), nullable=False, index=True)\n    organization_id = Column(String, ForeignKey("organizations.id", ondelete="SET NULL"), nullable=True, index=True)\n    token_hash = Column(String(64), nullable=False, unique=True, index=True)\n    token_expires_at = Column(DateTime, nullable=False, index=True)\n    token_used_at = Column(DateTime, nullable=True)\n    status = Column(String, default="link_sent", nullable=False, index=True)\n    full_name = Column(String, nullable=True)\n    professional_role = Column(String, nullable=True)\n    organization_name = Column(String, nullable=True)\n    website_url = Column(String, nullable=True)\n    professional_profile_url = Column(String, nullable=True)\n    agricultural_use_case = Column(Text, nullable=True)\n    acres_or_sites = Column(String, nullable=True)\n    planned_data_sources = Column(Text, nullable=True)\n    explanation = Column(Text, nullable=True)\n    supporting_evidence_url = Column(String, nullable=True)\n    submitted_at = Column(DateTime, nullable=True, index=True)\n    reviewed_at = Column(DateTime, nullable=True, index=True)\n    reviewed_by_user_id = Column(String, ForeignKey("users.id", ondelete="SET NULL"), nullable=True, index=True)\n    review_notes = Column(Text, nullable=True)\n    created_at = Column(DateTime, default=datetime.utcnow, nullable=False, index=True)\n    updated_at = Column(DateTime, default=datetime.utcnow, onupdate=datetime.utcnow, nullable=False)\n\n    user = relationship("User", foreign_keys=[user_id], back_populates="access_appeals")\n    organization = relationship("Organization", back_populates="access_appeals")\n    reviewed_by = relationship("User", foreign_keys=[reviewed_by_user_id])\n\n\nclass OrganizationMembership(Base):\n''',
          )

          replace(
              "agroai_api/app/main.py",
              '    "users": {"id", "email", "email_verified_at", "email_verification_status", "credentials_changed_at", "account_status", "failed_login_attempts", "locked_until"},\n',
              '    "users": {"id", "email", "email_verified_at", "email_verification_status", "credentials_changed_at", "account_status", "failed_login_attempts", "locked_until", "access_restriction_reason", "access_restricted_at"},\n',
          )
          replace(
              "agroai_api/app/main.py",
              '    "security_audit_events": {"id", "event_type", "outcome", "subject_hash", "ip_hash", "created_at"},\n',
              '    "security_audit_events": {"id", "event_type", "outcome", "subject_hash", "ip_hash", "created_at"},\n'
