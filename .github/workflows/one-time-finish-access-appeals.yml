              '                "message": "This account is restricted pending organization reverification.",\n'
              '                "appeal_available": getattr(user, "account_status", "") == "suspended_pending_appeal",\n'
              '                "appeal_path": "/appeal",\n',
          )
          replace(
              "agroai_api/app/api/v1/auth.py",
              '            detail={"code": "account_access_restricted", "message": "This account is not approved for portal access."},\n',
              '            detail={"code": "account_access_restricted", "message": "This account is restricted pending organization reverification.", "appeal_available": user.account_status == "suspended_pending_appeal", "appeal_path": "/appeal"},\n',
          )

          replace(
              "agroai_api/app/api/v1/platform_admin.py",
              'from fastapi import APIRouter, Depends, Query, Response\n',
              'from fastapi import APIRouter, Depends, HTTPException, Query, Response, status\nfrom pydantic import BaseModel, Field\n',
          )
          replace(
              "agroai_api/app/api/v1/platform_admin.py",
              'from app.models.saas import Organization, OrganizationMembership, UsageEvent, User, Workspace\n',
              'from app.models.saas import AccountAccessAppeal, Organization, OrganizationMembership, UsageEvent, User, Workspace\nfrom app.services.account_access_email import send_appeal_decision\nfrom app.services.security_audit import record_security_event\n',
          )
          replace(
              "agroai_api/app/api/v1/platform_admin.py",
              '                "auth_provider": user.auth_provider or "password",\n',
              '                "auth_provider": user.auth_provider or "password",\n'
              '                "account_status": user.account_status,\n'
              '                "access_restriction_reason": user.access_restriction_reason,\n'
              '                "access_restricted_at": user.access_restricted_at.isoformat() if user.access_restricted_at else None,\n',
          )
          p = Path("agroai_api/app/api/v1/platform_admin.py")
          p.write_text(p.read_text(encoding="utf-8") + '''\n\nclass AppealDecisionRequest(BaseModel):\n    action: Literal["approve", "reject", "request_information"]\n    notes: str | None = Field(default=None, max_length=3000)\n\n\ndef _serialize_appeal(appeal: AccountAccessAppeal) -> dict:\n    return {\n        "id": appeal.id,\n        "status": appeal.status,\n        "user": {"id": appeal.user.id, "name": appeal.user.name, "email": appeal.user.email, "account_status": appeal.user.account_status},\n        "organization": {"id": appeal.organization.id, "name": appeal.organization.name, "verification_status": appeal.organization.verification_status} if appeal.organization else None,\n        "full_name": appeal.full_name,\n        "professional_role": appeal.professional_role,\n        "organization_name": appeal.organization_name,\n        "website_url": appeal.website_url,\n        "professional_profile_url": appeal.professional_profile_url,\n        "agricultural_use_case": appeal.agricultural_use_case,\n        "acres_or_sites": appeal.acres_or_sites,\n        "planned_data_sources": appeal.planned_data_sources,\n        "explanation": appeal.explanation,\n        "supporting_evidence_url": appeal.supporting_evidence_url,\n        "submitted_at": appeal.submitted_at.isoformat() if appeal.submitted_at else None,\n        "reviewed_at": appeal.reviewed_at.isoformat() if appeal.reviewed_at else None,\n        "review_notes": appeal.review_notes,\n        "created_at": appeal.created_at.isoformat() if appeal.created_at else None,\n    }\n\n\n@router.get("/access-appeals")\ndef list_access_appeals(\n    response: Response,\n    appeal_status: str = Query(default="pending", alias="status", max_length=60),\n    limit: int = Query(default=100, ge=1, le=200),\n    ctx: AuthContext = Depends(require_platform_admin),\n    db: Session = Depends(get_db),\n) -> dict:\n    _no_store(response)\n    query = db.query(AccountAccessAppeal)\n    if appeal_status != "all":\n        query = query.filter(AccountAccessAppeal.status == appeal_status)\n    appeals = query.order_by(AccountAccessAppeal.submitted_at.desc(), AccountAccessAppeal.created_at.desc()).limit(limit).all()\n    logger.info("Platform access appeals viewed actor_user_id=%s count=%s status=%s", ctx.user.id, len(appeals), appeal_status)\n    return {"appeals": [_serialize_appeal(appeal) for appeal in appeals], "count": len(appeals), "status": appeal_status}\n\n\n@router.post("/access-appeals/{appeal_id}/decision")\ndef decide_access_appeal(\n    appeal_id: str,\n    payload: AppealDecisionRequest,\n    ctx: AuthContext = Depends(require_platform_admin),\n    db: Session = Depends(get_db),\n) -> dict:\n    appeal = db.get(AccountAccessAppeal, appeal_id)\n    if not appeal:\n        raise HTTPException(status_code=status.HTTP_404_NOT_FOUND, detail="Appeal not found")\n    user = appeal.user\n    organization = appeal.organization\n    now = datetime.utcnow()\n    if payload.action == "approve":\n        user.is_active = True\n        user.account_status = "active"\n        user.access_restriction_reason = None\n        user.access_restricted_at = None\n        user.credentials_changed_at = now\n        if organization:\n            organization.verification_status = "approved_manual_appeal"\n            organization.verified_at = now\n        appeal.status = "approved"\n    elif payload.action == "request_information":\n        user.is_active = False\n        user.account_status = "suspended_pending_appeal"\n        appeal.status = "additional_information_required"\n    else:\n        user.is_active = False\n        user.account_status = "suspended_pending_appeal"\n        appeal.status = "rejected"\n    appeal.review_notes = (payload.notes or "").strip() or None\n    appeal.reviewed_at = now\n    appeal.reviewed_by_user_id = ctx.user.id\n    appeal.updated_at = now\n    record_security_event(\n        db,\n        event_type="access_appeal_decision",\n        outcome=payload.action,\n        organization_id=organization.id if organization else None,\n        user_id=user.id,\n        subject=user.email,\n        metadata={"appeal_id": appeal.id, "reviewed_by_user_id": ctx.user.id},\n    )\n    db.commit()\n    try:\n        send_appeal_decision(user, action=payload.action, notes=appeal.review_notes)\n    except Exception:\n        logger.exception("Access appeal decision email failed appeal_id=%s", appeal.id)\n    db.refresh(appeal)\n    return {"appeal": _serialize_appeal(appeal)}\n''', encoding="utf-8")

          replace(
              "figma-enterprise-v4/src/app/routes.tsx",
              'import { VerifyEmailPage } from "./components/VerifyEmail";\n',
              'import { VerifyEmailPage } from "./components/VerifyEmail";\nimport { AccessAppealPage } from "./components/AccessAppeal";\n',
          )
          replace(
              "figma-enterprise-v4/src/app/routes.tsx",
              '  { path: "/verify-email", Component: VerifyEmailPage, errorElement: <PortalRouteError /> },\n',
              '  { path: "/verify-email", Component: VerifyEmailPage, errorElement: <PortalRouteError /> },\n  { path: "/appeal", Component: AccessAppealPage, errorElement: <PortalRouteError /> },\n',
          )
          replace(
              "figma-enterprise-v4/src/app/routes.tsx",
              '  { path: "admin/customers", lazy: lazyComponent(() => import("./components/Admin"), "CustomerAccountsPage") },\n',
              '  { path: "admin/customers", lazy: lazyComponent(() => import("./components/Admin"), "CustomerAccountsPage") },\n  { path: "admin/access-appeals", lazy: lazyComponent(() => import("./components/AccessAppealsAdmin"), "AccessAppealsAdminPage") },\n',
          )

          replace(
              "figma-enterprise-v4/src/app/api/client.ts",
              'export type PlatformAdminCustomerFilters = { search?: string; verification?: "all" | "verified" | "unverified"; active?: "all" | "active" | "inactive"; plan?: string; sort?: "newest" | "oldest" | "recent_login"; limit?: number; offset?: number };\n',
              'export type PlatformAdminCustomerFilters = { search?: string; verification?: "all" | "verified" | "unverified"; active?: "all" | "active" | "inactive"; plan?: string; sort?: "newest" | "oldest" | "recent_login"; limit?: number; offset?: number };\n'
              'export type AccessAppealSubmission = { full_name: string; professional_role: string; organization_name: string; website_url?: string; professional_profile_url?: string; agricultural_use_case: string; acres_or_sites: string; planned_data_sources: string; explanation: string; supporting_evidence_url?: string };\n'
              'export type AccessAppealDecision = { action: "approve" | "reject" | "request_information"; notes?: string };\n',
          )
          replace(
              "figma-enterprise-v4/src/app/api/client.ts",
              '  auth: { register: (payload: RegisterPayload) => post("/v1/auth/register", payload), login: (payload: LoginPayload) => post("/v1/auth/login", payload), logout: () => post("/v1/auth/logout"), me: () => get("/v1/auth/me"), requestEmailVerification: (payload?: EmailVerificationRequestPayload) => post("/v1/auth/email-verification/request", payload), confirmEmailVerification: (payload: EmailVerificationConfirmPayload) => post("/v1/auth/email-verification/confirm", payload) },\n',
              '  auth: { register: (payload: RegisterPayload) => post("/v1/auth/register", payload), login: (payload: LoginPayload) => post("/v1/auth/login", payload), logout: () => post("/v1/auth/logout"), me: () => get("/v1/auth/me"), requestEmailVerification: (payload?: EmailVerificationRequestPayload) => post("/v1/auth/email-verification/request", payload), confirmEmailVerification: (payload: EmailVerificationConfirmPayload) => post("/v1/auth/email-verification/confirm", payload) },\n'
              '  accessAppeals: { request: (payload: { email: string }) => post("/v1/access-appeals/request", payload, null), form: (token: string) => get(`/v1/access-appeals/form/${encodeURIComponent(token)}`, null), submit: (token: string, payload: AccessAppealSubmission) => post(`/v1/access-appeals/submit/${encodeURIComponent(token)}`, payload, null) },\n',
          )
          replace(
              "figma-enterprise-v4/src/app/api/client.ts",
              '    exportCustomers: (filters: PlatformAdminCustomerFilters = {}) => {\n      const query = platformAdminCustomerQuery(filters);\n      return download(`/v1/platform-admin/customers.csv${query ? `?${query}` : ""}`);\n    },\n',
              '    exportCustomers: (filters: PlatformAdminCustomerFilters = {}) => {\n      const query = platformAdminCustomerQuery(filters);\n      return download(`/v1/platform-admin/customers.csv${query ? `?${query}` : ""}`);\n    },\n'
              '    appeals: (status = "pending") => get(`/v1/platform-admin/access-appeals?status=${encodeURIComponent(status)}`),\n'
              '    decideAppeal: (appealId: string, payload: AccessAppealDecision) => post(`/v1/platform-admin/access-appeals/${encodeURIComponent(appealId)}/decision`, payload),\n',
          )

          replace(
              "figma-enterprise-v4/src/app/components/Admin.tsx",
              'function safe(value: unknown, fallback = "—") {\n',
              'const ACCESS_APPEALS_LABEL = "Access appeals";\n\nfunction safe(value: unknown, fallback = "—") {\n',
          )
          replace(
              "figma-enterprise-v4/src/app/components/Admin.tsx",
              '{platformAdmin ? <PortalButton onClick={() => window.location.assign("/admin/customers")}>Customer accounts</PortalButton> : null}\n',
              '{platformAdmin ? <PortalButton onClick={() => window.location.assign("/admin/customers")}>Customer accounts</PortalButton> : null}\n'
              '{platformAdmin ? <PortalButton variant="secondary" onClick={() => window.location.assign("/admin/access-appeals")}>{ACCESS_APPEALS_LABEL}</PortalButton> : null}\n',
          )
          replace(
              "figma-enterprise-v4/src/app/components/Admin.tsx",
              '  verification_status: string;\n',
              '  verification_status: string;\n  account_status: string;\n  access_restriction_reason?: string | null;\n  access_restricted_at?: string | null;\n',
          )
          replace(
              "figma-enterprise-v4/src/app/components/Admin.tsx",
              "{['Customer', 'Registered', 'Verification', 'Last login', 'Organization', 'Plan', 'Workspaces', 'Activity'].map",
              "{['Customer', 'Registered', 'Verification', 'Access', 'Last login', 'Organization', 'Plan', 'Workspaces', 'Activity'].map",
          )
          replace("figma-enterprise-v4/src/app/components/Admin.tsx", 'colSpan={8}', 'colSpan={9}')
          replace("figma-enterprise-v4/src/app/components/Admin.tsx", 'colSpan={8}', 'colSpan={9}')
          replace(
              "figma-enterprise-v4/src/app/components/Admin.tsx",
              '                       <td className="px-4 py-4"><StatusBadge label={customer.verification_status === "verified" ? "Verified" : "Unverified"} tone={customer.verification_status === "verified" ? "good" : "warning"} /></td>\n                       <td className="px-4 py-4 text-[12px]" style={{ color: TEXT }}>{displayDate(customer.last_login_at)}</td>\n',
              '                       <td className="px-4 py-4"><StatusBadge label={customer.verification_status === "verified" ? "Verified" : "Unverified"} tone={customer.verification_status === "verified" ? "good" : "warning"} /></td>\n'
              '                       <td className="px-4 py-4"><StatusBadge label={customer.account_status === "active" ? "Active" : customer.account_status.replaceAll("_", " ")} tone={customer.account_status === "active" ? "good" : "warning"} /></td>\n'
              '                       <td className="px-4 py-4 text-[12px]" style={{ color: TEXT }}>{displayDate(customer.last_login_at)}</td>\n',
          )

          replace(
              "figma-enterprise-v4/src/app/components/AuthScreen.tsx",
              'const organizationTypes = [\n',
              'const ACCESS_APPEAL_LABEL = "Access restricted? Submit an appeal.";\n\nconst organizationTypes = [\n',
          )
          replace(
              "figma-enterprise-v4/src/app/components/AuthScreen.tsx",
              '                  <Button type="submit" disabled={isSubmitting} className="w-full bg-[#10231B] text-white hover:bg-[#183528]">\n                    {isSubmitting ? <Loader2 className="h-4 w-4 animate-spin" /> : null}\n                    Sign in\n                  </Button>\n',
              '                  <Button type="submit" disabled={isSubmitting} className="w-full bg-[#10231B] text-white hover:bg-[#183528]">\n                    {isSubmitting ? <Loader2 className="h-4 w-4 animate-spin" /> : null}\n                    Sign in\n                  </Button>\n'
              '                  <a href="/appeal" className="block text-center text-[12px] font-medium text-[#2D6A4F] hover:underline">{ACCESS_APPEAL_LABEL}</a>\n',
          )

          # Keep the deterministic literal inventory in sync with the new public/admin pages.
          import importlib.util, json, sys
          checker_path = Path("figma-enterprise-v4/scripts/check_ui_literals.py")
          spec = importlib.util.spec_from_file_location("ui_literal_checker", checker_path)
          module = importlib.util.module_from_spec(spec)
          assert spec and spec.loader
          spec.loader.exec_module(module)
          expected = module.build_catalog()
          paths = sorted(Path("shared").glob("ui-literals.en.*.json"))
          current_locations = {}
          parts = []
          for path in paths:
              data = json.loads(path.read_text(encoding="utf-8"))
              parts.append(data)
              for key in data:
                  current_locations[key] = len(parts) - 1
          rebuilt = [dict() for _ in paths]
          for key, value in expected.items():
              target = current_locations.get(key, len(paths) - 1)
              rebuilt[target][key] = value
          for path, data in zip(paths, rebuilt):
              path.write_text(json.dumps(dict(sorted(data.items())), ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
      - name: Install backend dependencies
        working-directory: agroai_api
        run: python -m pip install -q -r requirements.txt pytest
      - name: Validate backend
        working-directory: agroai_api
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          python -m compileall -q app alembic/versions
          python -m pytest -q --tb=short tests/unit/test_account_verification_security.py tests/unit/test_platform_admin.py tests/unit/test_alembic_revisions.py
          python -m pytest -q --tb=short tests/unit
      - name: Validate portal
        working-directory: figma-enterprise-v4
        run: |
          npm ci --no-audit --no-fund
          npm run test:i18n
          npm run build
      - name: Commit implementation and remove workflow
        run: |
          git config user.name "AGRO-AI Security Automation"
          git config user.email "security@agroai-pilot.com"
          git add agroai_api figma-enterprise-v4 shared
          git commit -m "Complete secure account suspension and appeal review"
          git rm .github/workflows/one-time-finish-access-appeals.yml
          git commit -m "Remove one-time access appeal workflow"
          git push origin HEAD:security/legacy-account-appeals-six
