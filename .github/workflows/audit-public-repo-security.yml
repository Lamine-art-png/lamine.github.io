name: Audit Public Repository Security

on:
  pull_request:
    paths:
      - ".github/workflows/audit-public-repo-security.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          set -euo pipefail
          go install github.com/gitleaks/gitleaks/v8@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Scan all reachable Git history for secrets
        shell: bash
        run: |
          set -euo pipefail
          gitleaks git . --redact --report-format json --report-path /tmp/gitleaks.json --exit-code 0
          python - <<'PY'
          import json
          from collections import Counter
          report_path = "/tmp/gitleaks.json"
          try:
              findings = json.load(open(report_path, encoding="utf-8"))
          except FileNotFoundError:
              findings = []
          print(f"GITLEAKS_FINDING_COUNT={len(findings)}")
          by_rule = Counter(item.get("RuleID", "unknown") for item in findings)
          for rule, count in sorted(by_rule.items()):
              print(f"GITLEAKS_RULE {rule} {count}")
          paths = sorted({item.get("File", "") for item in findings if item.get("File")})
          for path in paths[:100]:
              print(f"GITLEAKS_PATH {path}")
          if len(paths) > 100:
              print(f"GITLEAKS_PATHS_TRUNCATED={len(paths)-100}")
          PY

      - name: Inventory exposed product source and internal material
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          roots = [
              "agroai_api", "terraform", "cloudflare", "agroai-cloudflare-worker",
              "apps", "figma-enterprise-v4", "docs", ".github/workflows"
          ]
          code_exts = {".py", ".ts", ".tsx", ".js", ".jsx", ".tf", ".sql", ".sh", ".yml", ".yaml"}
          docs_exts = {".md", ".txt", ".html"}
          total = code = docs = 0
          for root in roots:
              p = Path(root)
              if not p.exists():
                  continue
              files = [f for f in p.rglob("*") if f.is_file()]
              root_code = sum(f.suffix.lower() in code_exts for f in files)
              root_docs = sum(f.suffix.lower() in docs_exts for f in files)
              print(f"EXPOSED_ROOT {root} files={len(files)} code={root_code} docs={root_docs}")
              total += len(files); code += root_code; docs += root_docs
          print(f"EXPOSED_TOTAL files={total} code={code} docs={docs}")

          sensitive_terms = {
              "customer_or_agency_names": ["Manulife", "PGIM", "Fox Canyon", "Upper Republican", "URNRD", "Gladstone", "Waterford"],
              "integration_partners": ["John Deere", "WiseConn", "Talgil", "OpenET", "Salesforce", "Dropbox", "Microsoft", "Google"],
              "internal_delivery_language": ["PILOT-READY", "delivery summary", "pilot playbook", "Codex", "Claude instructions", "runtime diagnosis"],
          }
          readable = [f for root in roots for f in Path(root).rglob("*") if f.is_file() and f.stat().st_size < 2_000_000]
          for category, terms in sensitive_terms.items():
              hit_paths = set()
              for f in readable:
                  try:
                      text = f.read_text(encoding="utf-8", errors="ignore")
                  except Exception:
                      continue
                  if any(term.lower() in text.lower() for term in terms):
                      hit_paths.add(str(f))
              print(f"SENSITIVE_CATEGORY {category} files={len(hit_paths)}")
              for path in sorted(hit_paths)[:40]:
                  print(f"SENSITIVE_PATH {category} {path}")
              if len(hit_paths) > 40:
                  print(f"SENSITIVE_PATHS_TRUNCATED {category} {len(hit_paths)-40}")
          PY

      - name: Check current tree for high-confidence credential prefixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path
          patterns = {
              "aws_access_key": re.compile(r"\b(?:AKIA|ASIA)[A-Z0-9]{16}\b"),
              "google_api_key": re.compile(r"\bAIza[0-9A-Za-z_-]{35}\b"),
              "github_token": re.compile(r"\bgh[pousr]_[A-Za-z0-9_]{20,}\b"),
              "stripe_secret": re.compile(r"\bsk_(?:live|test)_[0-9A-Za-z]{16,}\b"),
              "slack_token": re.compile(r"\bxox[baprs]-[0-9A-Za-z-]{20,}\b"),
              "private_key": re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"),
              "openai_style_key": re.compile(r"\bsk-[A-Za-z0-9_-]{24,}\b"),
          }
          ignored = {".git", "node_modules", "dist", "build", ".venv", "venv"}
          findings = []
          for f in Path('.').rglob('*'):
              if not f.is_file() or any(part in ignored for part in f.parts) or f.stat().st_size > 2_000_000:
                  continue
              try:
                  text = f.read_text(encoding='utf-8', errors='ignore')
              except Exception:
                  continue
              for name, pattern in patterns.items():
                  if pattern.search(text):
                      findings.append((name, str(f)))
          print(f"HIGH_CONFIDENCE_CURRENT_COUNT={len(findings)}")
          for name, path in sorted(set(findings)):
              print(f"HIGH_CONFIDENCE_CURRENT {name} {path}")
          PY
