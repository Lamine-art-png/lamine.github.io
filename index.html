  <body>
    <div id="root"></div>
    <script>
      (() => {
        const addCareersLink = () => {
          document.querySelectorAll('a[href="/about"]').forEach((aboutLink) => {
            const parent = aboutLink.parentElement;
            if (!parent || parent.querySelector('a[href="/careers"]')) return;
            const hasDemoLink = Array.from(parent.querySelectorAll("a")).some((link) =>
              /book a demo/i.test(link.textContent || "")
            );
            if (!hasDemoLink) return;

            const careersLink = aboutLink.cloneNode(true);
            careersLink.href = "/careers";
            careersLink.textContent = "Careers";
            careersLink.setAttribute("aria-label", "Careers");
            aboutLink.insertAdjacentElement("afterend", careersLink);
          });
        };

        const shouldOpenConnectors = () => {
          const params = new URLSearchParams(window.location.search || "");
          return Boolean(
            params.get("connector") ||
              params.get("provider") ||
              params.get("connection_id") ||
              params.get("open") === "connectors" ||
              params.get("view") === "connectors" ||
              params.get("module") === "connectors" ||
              (window.location.hash || "").toLowerCase().includes("connectors")
          );
        };

        const connectorsPageIsVisible = () => {
          const text = (document.body.textContent || "").replace(/\s+/g, " ").toLowerCase();
          return (
            text.includes("wiseconn") &&
            text.includes("dropbox") &&
            text.includes("google drive") &&
            (text.includes("manage connection") || text.includes("ready to authorize") || text.includes("connected"))
          );
        };

        const fireClick = (element) => {
          if (!element) return;
          ["pointerdown", "mousedown", "pointerup", "mouseup", "click"].forEach((type) => {
            element.dispatchEvent(new MouseEvent(type, { bubbles: true, cancelable: true, view: window }));
          });
          if (typeof element.click === "function") element.click();
        };

        const clickableChain = (node) => {
          const chain = [];
          let current = node;
          for (let depth = 0; current && depth < 6; depth += 1, current = current.parentElement) {
            if (current instanceof HTMLElement) chain.push(current);
          }
          const preferred = node.closest?.('button,a,[role="button"],[data-testid],nav *,aside *');
          if (preferred instanceof HTMLElement) chain.unshift(preferred);
          return Array.from(new Set(chain));
        };

        const openConnectorsView = () => {
          if (!shouldOpenConnectors()) return true;
          if (connectorsPageIsVisible()) return true;

          const nodes = Array.from(document.querySelectorAll('button,a,[role="button"],nav *,aside *,[tabindex],div,span'));
          const connectorTextNodes = nodes.filter((node) => {
            const text = (node.textContent || "").replace(/\s+/g, " ").trim().toLowerCase();
            return text === "connectors";
          });

          connectorTextNodes.forEach((node) => clickableChain(node).forEach(fireClick));
          return connectorsPageIsVisible();
        };

        addCareersLink();
        const observer = new MutationObserver(() => {
          addCareersLink();
          openConnectorsView();
        });
        observer.observe(document.documentElement, { childList: true, subtree: true });

        if (shouldOpenConnectors()) {
          let attempts = 0;
          const timer = window.setInterval(() => {
            attempts += 1;
            if (openConnectorsView() || attempts > 160) window.clearInterval(timer);
          }, 100);
        }
      })();
    </script>
